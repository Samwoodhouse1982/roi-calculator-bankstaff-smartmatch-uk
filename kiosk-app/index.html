<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Match: Workforce ROI Calculator | RLDatix</title>
  <meta name="description" content="Estimate the cash and staff time your NHS organisation could release with Smart Match, a BankStaff+ feature. Indicative, conservative and editable." />
  <!-- DM Sans is self-hosted (bundled from @fontsource-variable/dm-sans in main.jsx); no font CDN dependency. -->
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { width: 100%; }
    body { margin: 0; padding: 0; width: 100%; min-height: 100vh; -webkit-font-smoothing: antialiased; background: #0E1726; font-family: 'DM Sans Variable', 'DM Sans', sans-serif; }
    #root { width: 100%; }
    input[type=range] { -webkit-appearance: none; height: 12px; border-radius: 6px; background: #243454; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 30px; height: 30px; border-radius: 50%; background: #00D4AA; cursor: pointer; border: 3px solid #0E1726; box-shadow: 0 2px 12px rgba(0,212,170,0.5); }
    input[type=range]::-moz-range-thumb { width: 30px; height: 30px; border-radius: 50%; background: #00D4AA; cursor: pointer; border: 3px solid #0E1726; }
    select { background: #1B2B4B; color: #EEF1F7; border-color: #2C4070; }
    input[type=number] { background: #1B2B4B; color: #00D4AA; border-color: #2C4070; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0E1726; }
    ::-webkit-scrollbar-thumb { background: #2C4070; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root">
    <div id="js-fallback" style="color:#A9B6CE;text-align:center;padding:120px 32px;font-family:DM Sans,sans-serif;font-size:16px;">
      <div style="font-size:24px;font-weight:700;color:#00D4AA;margin-bottom:16px;">Loading calculator...</div>
      <div>This calculator needs JavaScript. If this message persists, please contact your RLDatix representative.</div>
    </div>
  </div>
  <script>window.onerror=function(m,s,l,c,e){var f=document.getElementById('js-fallback');if(f)f.innerHTML='<div style="color:#00D4AA;font-size:20px;font-weight:700;">Something went wrong</div><div style="margin-top:12px;color:#A9B6CE;">'+m+'</div>';}</script>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
