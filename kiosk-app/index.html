<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Match: Workforce ROI Calculator | RLDatix</title>
  <meta name="description" content="Estimate the cash and staff time your NHS organisation could release with Smart Match, a BankStaff+ feature. Indicative, conservative and editable." />
  <!-- DM Sans is self-hosted (bundled from @fontsource-variable/dm-sans in main.jsx); no font CDN dependency. -->
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { width: 100%; }
    body { margin: 0; padding: 0; width: 100%; min-height: 100vh; -webkit-font-smoothing: antialiased; background: #EEF6F4; font-family: 'DM Sans Variable', 'DM Sans', sans-serif; }
    #root { width: 100%; }
    input[type=range] { -webkit-appearance: none; height: 12px; border-radius: 6px; background: #D4E0DD; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 30px; height: 30px; border-radius: 50%; background: #0F4146; cursor: pointer; border: 3px solid #fff; box-shadow: 0 2px 10px rgba(15,65,70,0.35); }
    input[type=range]::-moz-range-thumb { width: 30px; height: 30px; border-radius: 50%; background: #0F4146; cursor: pointer; border: 3px solid #fff; }
    select { background: #fff; color: #0F4146; border-color: #D4E0DD; }
    input[type=number] { background: #fff; color: #0F4146; border-color: #D4E0DD; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #EEF6F4; }
    ::-webkit-scrollbar-thumb { background: #C2D4D0; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root">
    <div id="js-fallback" style="color:#3D5A5E;text-align:center;padding:120px 32px;font-family:DM Sans,sans-serif;font-size:16px;">
      <div style="font-size:24px;font-weight:700;color:#0F4146;margin-bottom:16px;">Loading calculator...</div>
      <div>This calculator needs JavaScript. If this message persists, please contact your RLDatix representative.</div>
    </div>
  </div>
  <script>window.onerror=function(m,s,l,c,e){var f=document.getElementById('js-fallback');if(f)f.innerHTML='<div style="color:#0F4146;font-size:20px;font-weight:700;">Something went wrong</div><div style="margin-top:12px;color:#3D5A5E;">'+m+'</div>';}</script>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
