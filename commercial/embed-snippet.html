<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<title>Smart Match ROI Calculator: embed reference</title>
</head>
<body>
<!--
  ============================================================
  EMBED SNIPPET: Smart Match Workforce ROI Calculator
  ============================================================
  Paste the <iframe> + <script> below into any host page (CMS,
  landing page, HubSpot, etc.). The calculator auto-resizes its
  iframe to fit its content via postMessage, no fixed height,
  no inner scrollbar.

  Notes:
  - Point `src` at /roi-calculator (NOT / which redirects, and NOT
    /roi-calculator.html, which Vercel's cleanUrls 308-redirects to
    /roi-calculator anyway - the extensionless path serves directly).
  - Serve over HTTPS. The calculator loads React, Babel and jsPDF
    from public CDNs inside the iframe (its own origin).
  - The host page CSP must allow the calculator's domain in
    frame-src, and the iframe's CSP must allow the CDNs.
  ============================================================
-->

<iframe
  id="smartmatch-roi"
  src="https://YOUR-DOMAIN/roi-calculator"
  title="Smart Match Workforce ROI Calculator"
  scrolling="no"
  loading="lazy"
  style="width:100%;border:none;min-height:900px;display:block;"
></iframe>

<script>
  (function () {
    var iframe = document.getElementById("smartmatch-roi");
    var motion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches ? "auto" : "smooth";
    window.addEventListener("message", function (e) {
      var d = e.data || {};
      // Optional: verify e.origin === "https://YOUR-DOMAIN" before acting.
      if (d.type === "smartmatch-roi-resize" && typeof d.height === "number") {
        iframe.style.height = d.height + "px";
      }
      // "↑ Adjust inputs": scroll the host page back to the top of the calculator.
      if (d.type === "smartmatch-roi-scroll-top") {
        iframe.scrollIntoView({ behavior: motion, block: "start" });
      }
      // "Calculate my savings": d.top is the results offset inside the iframe;
      // add the iframe's own position to scroll the host page to the results.
      if (d.type === "smartmatch-roi-scroll" && typeof d.top === "number") {
        var y = iframe.getBoundingClientRect().top + (window.pageYOffset || 0) + d.top - 16;
        window.scrollTo({ top: Math.max(0, y), behavior: motion });
      }
    });
  })();
</script>

</body>
</html>
