<div id="root"></div>

<!-- Library loading (audit #10): every library tries cdnjs -> jsDelivr -> unpkg,
     so one blocked or down CDN (common on locked-down NHS networks) no longer
     breaks the page - previously React/ReactDOM/Babel were single-CDN with no
     fallback, so a blocked cdnjs meant a blank calculator. For a fully air-gapped
     deployment, prepend a same-origin "./vendor/<lib>.js" to each list below. -->
<script>

<script type="text/babel" data-presets="react">
const { useState, useMemo, useEffect, useRef, useId } = React;

/* ===== THEME: RLDatix Galen suite (deep teal + seafoam) ===== */
const C = { navy:"#0F4146", navyMid:"#1A5459", navyLight:"#E8FAF6", teal:"#0F4146", tealMid:"#1A8A7A", tealLight:"#D6F7EE", seafoam:"#34DEC2", border:"#D4E0DD", text:"#0F4146", textMid:"#3D5A5E", textLight:"#5F787C", rose:"#93405A" };  // textLight + rose darkened to >=4.5:1 on white (WCAG AA)
const RAMP = ["#0F4146","#1A8A7A","#34DEC2","#73D2E1","#8FB3AE"];

/* ===== FORMATTERS: en-GB / £ (AU-ready: swap LOCALE + SYMBOL) ===== */
const LOCALE="en-GB", SYMBOL="£";
const fmt    = n => SYMBOL + Math.round(n||0).toLocaleString(LOCALE);
const fmtK   = n => { n=n||0; return n>=1e6 ? `${SYMBOL}${(n/1e6).toFixed(2)}m` : n>=1000 ? `${SYMBOL}${Math.round(n/1000).toLocaleString(LOCALE)}k` : fmt(n); };
const fmtNum = n => Math.round(n||0).toLocaleString(LOCALE);
const fmtDays = m => m==null ? "n/a" : Math.round(m*365/12).toLocaleString(LOCALE)+" days";
const fmtMult = m => m==null ? "n/a" : (m>=10 ? Math.round(m) : Math.round(m*10)/10)+"×";
const pct    = n => `${Math.round(n)}%`;
const num    = (v,f=0) => { const n=parseFloat(String(v).replace(/[^0-9.\-]/g,"")); return isNaN(n)?f:n; };  // strips £, commas, spaces from pasted figures

/* ===== MODEL CONSTANTS (conservative; flagged for validation) =====
   Cash saving (corrected v9, brief §3) is the AGENCY PREMIUM DISPLACED,
   anchored to agency exposure, never bank payroll:
     bank_shift_cost   = (pay/1957.5) × hours × (1+oncost)
     agency_shift_cost = bank_shift_cost × (1+premium)
     displaced_shifts  = (agency_spend / agency_shift_cost) × displaceable_share × displacement
     CASH SAVING       = displaced_shifts × bank_shift_cost × premium
   Admin (B) and capacity/temp-duties (C) are kept strictly separate. */
const AFC_DIVISOR = 1957.5;
const SHIFT_HOURS_DEFAULT = 8;
const BANK_ONCOST_DEFAULT = 0.20;     // affects shift counts only, not the cash headline
const PLATFORM_COST_DEFAULT = 17000;
/* [G-Cloud] Annual BankStaff+ licence fee (ex VAT) by number of Licensed Users
   (≈ bank-staff size). The published G-Cloud bands are quoted as ranges with gaps
   (1,401–1,500 then 2,001–2,200, …); a bank whose size lands in a gap licences the
   tier that COVERS it, so we round UP to the next band (e.g. 2,000 → the 2,001–2,200
   fee, £15,167.54). Pairs are [inclusive upper bound, annual fee]; top band unbounded.
   Auto-linked to bank size; fully editable. */
const GCLOUD_LICENCE = [[600,9486.54],[700,9855.27],[1000,11321.21],[1500,13280.66],[2200,15167.54],[3200,18400.20],[4200,20900.78],[5200,22793.38],[6500,25284.06],[Infinity,29101.79]];
function platformCostFor(totalBankHeadcount){
  const h = num(totalBankHeadcount);
  for (const [ceil,fee] of GCLOUD_LICENCE) if (h <= ceil) return fee;
  return GCLOUD_LICENCE[GCLOUD_LICENCE.length-1][1];
}
/* Admin (Rev B): per member of the temporary staffing team. Client said 2.5 h/day @ £18; 2.5 is optimistic, default lower. */
const ADMIN_HRS_PER_DAY_DEFAULT = 1.0;
const ADMIN_WORKING_DAYS = 225;
const ADMIN_LOADED_HOURLY = 18;
/* Simple variant embedded defaults */
const SIMPLE_SHIFTS_PER_WORKER_YR = 60;   // bank work is ad-hoc/top-up, not full-time
const SIMPLE_BLENDED_BANK_PAY = 34000;    // AfC 2026/27 band-mix weighted midpoint
const RECRUIT_COST_PER_WORKER = 1000;     // recruit + onboard a bank worker
const RECRUIT_RECOVERY_RATE = 0.10;       // share recovered by activating idle capacity
/* [Benchmark brief §4] Displaceable share: only part of agency spend can realistically move to bank
   (excludes break-glass / safety-critical cover and hard-to-fill specialist roles bank can't cover).
   Displacement is applied to this share only, so the tool never implies 100% of agency is bankable. */
const DISPLACEABLE_SHARE_DEFAULT = 0.80;
/* [Benchmark brief §1] Agency spend as a share of turnover, by type — used to estimate a typical
   agency spend when only turnover is known (acute large/teaching banks ~1%, medium DGH ~3-4%, etc.). */
const AGENCY_PCT_OF_TURNOVER = { acute:0.035, "acute-large":0.01, mental:0.042, community:0.03, ambulance:0.018, ics:0.03 };
function agencySpendFromTurnover(turnover, type){ return num(turnover) * (AGENCY_PCT_OF_TURNOVER[type]!=null ? AGENCY_PCT_OF_TURNOVER[type] : 0.03); }
/* [Benchmark brief §5] Agency-intensity regime from agency % of turnover: <1% mature/low, 1-4% typical, >4% high. */
function agencyRegime(totSpend, turnover){ const t=num(turnover); if(!(t>0)) return { pct:null, key:null }; const pct=(totSpend/t)*100; return { pct, key: pct<1?"low":(pct<=4?"typical":"high") }; }

/* AfC 2026/27 England midpoints (NHS Employers, +3.3% confirmed from 1 Apr 2026).
   Per-group bank pay drives like-for-like costs; the agency PREMIUM is a single, official
   cost mechanic (default 20%, editable) applied across groups, not a per-group figure. */
const BAND_PILL = { "Band 2":["#EEF6F4","#3D5A5E"], "Band 3":["#EEF6F4","#3D5A5E"], "Band 5":["#E8FAF6","#0F4146"], "Band 5/6":["#E8FAF6","#1A5459"], "Band 6":["#D6F7EE","#0F4146"], "Band 2/3":["#EEF6F4","#3D5A5E"], "SAS / ST3+":["#0F4146","#FFFFFF"] };
const bandPill = b => { const p = BAND_PILL[b] || ["#E8FAF6","#0F4146"]; return { background:p[0], color:p[1] }; };
const G = (id,role,band,bankPay,headcount,agencySpend) => ({ id, role, band, bankPay, headcount, agencySpend });
/* Per-type organisation templates: each carries a realistic staff-group profile
   (role, band, bank pay, headcount, agency spend) summing to that type's totals.
   2026/27 AfC pay. Every value is a starting point and fully editable; the two
   size headlines (total headcount + total agency spend) rescale the mix via
   scaleGroupsTo(). */
const ORG_TYPES = {
  acute: { label:"Acute trust (district general)", desc:"~2,200 bank · ~£15m agency", turnover:430000000, groups:[
    G("rn","Registered nurses","Band 5",34592,900,6500000),
    G("sn","Senior nurses","Band 6",42170,350,2500000),
    G("ahp","AHPs (physio / OT)","Band 5/6",38400,300,1500000),
    G("hca","Healthcare assistants","Band 2/3",25900,550,500000),
    G("doc","Medics (locum / SAS)","SAS / ST3+",60000,100,4000000),
  ]},
  community: { label:"Community / specialist", desc:"~700 bank · ~£7m agency", turnover:235000000, groups:[
    G("cn","Community / district nurses","Band 6",42170,200,2500000),
    G("rn","Registered nurses","Band 5",34592,180,1800000),
    G("ahp","AHPs (physio / OT / SLT)","Band 5/6",38400,200,2000000),
    G("hca","Healthcare assistants","Band 2/3",25900,100,400000),
    G("doc","Medics (locum / SAS)","SAS / ST3+",60000,20,300000),
  ]},
  mental: { label:"Mental health trust", desc:"~1,000 bank · ~£10m agency", turnover:235000000, groups:[
    G("rmn","Mental health nurses (RMN)","Band 5",34592,450,4500000),
    G("sn","Senior nurses","Band 6",42170,150,2000000),
    G("hca","Healthcare assistants","Band 2/3",25900,300,1500000),
    G("ahp","AHPs (OT / psychology)","Band 5/6",38400,50,500000),
    G("doc","Medics (locum psych)","SAS / ST3+",60000,50,1500000),
  ]},
  ambulance: { label:"Ambulance trust", desc:"~400 bank · ~£4m agency", turnover:220000000, groups:[
    G("para","Paramedics","Band 6",42170,180,2200000),
    G("emt","EMTs / care assistants","Band 3",26618,100,700000),
    G("rn","Nurses (111 / UCC)","Band 5",34592,60,600000),
    G("call","Call handlers / dispatch","Band 3",26618,50,300000),
    G("doc","Medics (locum)","SAS / ST3+",60000,10,200000),
  ]},
  ics: { label:"ICS / provider collaborative", desc:"~5,000 bank · ~£30m agency", turnover:1000000000, groups:[
    G("rn","Registered nurses","Band 5",34592,1900,12000000),
    G("sn","Senior nurses","Band 6",42170,900,5000000),
    G("ahp","AHPs","Band 5/6",38400,800,4000000),
    G("hca","Healthcare assistants","Band 2/3",25900,1200,2000000),
    G("doc","Medics (locum / SAS)","SAS / ST3+",60000,200,7000000),
  ]},
};
const AFC_BANDS = [["Band 2",25272],["Band 3",26618],["Band 5",34592],["Band 5/6",38400],["Band 6",42170],["Band 2/3",25900],["SAS / ST3+",60000]];
const buildOrg = key => (ORG_TYPES[key]||ORG_TYPES.acute).groups.map(g=>({ ...g }));
function scaleGroupsTo(groups,key,target){
  const vals=groups.map(g=>num(g[key])); const cur=vals.reduce((a,b)=>a+b,0);
  if(cur<=0||!(target>0))return groups;
  const unit=key==="agencySpend"?1000:1, tU=Math.round(target/unit); if(tU<=0)return groups;
  const pos=vals.map(v=>v>0), nPos=pos.filter(Boolean).length;
  if(tU<nPos){ const ord=vals.map((v,i)=>({i,v})).sort((a,b)=>b.v-a.v); const out=vals.map(()=>0); for(let j=0;j<tU;j++)out[ord[j].i]=1; return groups.map((g,i)=>({...g,[key]:out[i]*unit})); }
  const raw=vals.map(v=>(v/cur)*tU); const fl=raw.map((x,i)=>pos[i]?Math.max(1,Math.floor(x)):0);
  let rem=tU-fl.reduce((a,b)=>a+b,0);
  const ord=raw.map((x,i)=>({i,f:x-Math.floor(x),pos:pos[i]})).filter(o=>o.pos).sort((a,b)=>b.f-a.f); let k=0;
  while(rem>0&&ord.length){ fl[ord[k%ord.length].i]++; rem--; k++; }
  while(rem<0){ let bi=-1,bv=1; for(let i=0;i<fl.length;i++)if(fl[i]>bv){bv=fl[i];bi=i;} if(bi<0)break; fl[bi]--; rem++; }
  return groups.map((g,i)=>({...g,[key]:fl[i]*unit}));
}

function stance(d){
  if (d<=18) return { key:"Conservative", color:C.navy, bg:C.navyLight, note:"Conservative (≈13%): about half the effect measured in a pilot study. Recommended default for public/self-serve use: defensible without organisation-specific evidence." };
  if (d<=30) return { key:"Moderate", color:C.navyMid, bg:C.navyLight, note:"Moderate (≈26%): the effect measured at one community site (agency fill 8.1%→6.0%). Single-site and partly attributable, so best used in a guided commercial conversation." };
  return { key:"Optimistic", color:C.teal, bg:C.tealLight, note:"Optimistic: above a pilot study's result — the higher the setting, the bolder the assumption. Use only with strong, organisation-specific evidence." };
}

/* ===== PURE CALC ENGINE (shared by Quick + Detailed + the kiosk variant) ===== */
function calc(input){
  const { groups, premium, displacement, shiftHours, oncost, platformCost, admin, recruit, fillRateNow, perGroupPremium } = input;
  const p=premium/100, d=displacement/100, oc=oncost/100;
  const ds = input.displaceableShare!=null ? num(input.displaceableShare) : DISPLACEABLE_SHARE_DEFAULT;
  let totSpend=0, totSaving=0, totDisplaced=0, totBaseline=0, totHead=0, totCapacityValue=0;
  const rows = groups.map(g=>{
    const head=num(g.headcount), spend=num(g.agencySpend), pay=num(g.bankPay);
    const gp=((perGroupPremium && g.premium!=null)?num(g.premium):premium)/100, gd=(g.displacement!=null?num(g.displacement):displacement)/100;
    const bankShiftCost = (pay/AFC_DIVISOR) * shiftHours * (1+oc);
    const agencyShiftCost = bankShiftCost * (1+gp);
    const baseline = agencyShiftCost>0 ? spend/agencyShiftCost : 0;
    const displaced = baseline*ds*gd;   // displaceable share only
    const saving = displaced * (agencyShiftCost - bankShiftCost);  // = displaced × bankShiftCost × group premium
    const capacityValue = displaced * bankShiftCost;               // gross bank backfill cost (NON-cash)
    totSpend+=spend; totSaving+=saving; totDisplaced+=displaced; totBaseline+=baseline; totHead+=head; totCapacityValue+=capacityValue;
    return { ...g, head, spend, bankShiftCost, agencyShiftCost, baseline, displaced, saving, capacityValue };
  });
  const _dW = totDisplaced||1;   // duties-weighted average shift rates (for the premium-basis panel)
  const bankShiftCost = rows.reduce((a,x)=>a+x.bankShiftCost*x.displaced,0)/_dW;
  const agencyShiftCost = rows.reduce((a,x)=>a+x.agencyShiftCost*x.displaced,0)/_dW;
  // B: admin (per manager/day) + time saved/week (a co-headline; shown regardless of cash toggle)
  const mgrs=num(admin.managers), hpd=num(admin.hoursPerDay);
  const timeSavedWeek = mgrs * hpd * 5;
  const adminSaving = admin.enabled ? mgrs * hpd * num(admin.workingDays) * num(admin.loadedHourly) : 0;
  // B(optional): recovered recruitment/onboarding waste
  const recruitSaving = (recruit && recruit.enabled) ? num(recruit.workers)*num(recruit.costPerWorker)*num(recruit.recoveryRate) : 0;

  const grossBenefit = totSaving + adminSaving + recruitSaving;
  const netSaving = grossBenefit - num(platformCost);
  const roiPct = platformCost>0 ? (netSaving/platformCost)*100 : null;   // n/a (not 0%) when no platform cost
  const roiMultiple = platformCost>0 ? netSaving/platformCost : null;   // net return on the licence fee (net saving ÷ cost)
  const paybackMonths = grossBenefit>0 ? platformCost/(grossBenefit/12) : null;
  const exceedsSpend = totSaving>totSpend && totSpend>0;
  const adminOnly = totSaving<=0 && (adminSaving>0 || recruitSaving>0);   // reachable sanity check: saving is admin time only
  const implausibleRoi = roiPct!=null && roiPct>3000;
  const fillNow=num(fillRateNow), fillAfter=fillNow*(1-ds*d);   // reduction on the displaceable share only, consistent with the modelled shift counts
  const reg = agencyRegime(totSpend, input.turnover);
  return { rows, totSpend, totSaving, totDisplaced, totBaseline, totHead, totCapacityValue,
    adminSaving, recruitSaving, timeSavedWeek, grossBenefit, netSaving, roiPct, roiMultiple, paybackMonths,
    exceedsSpend, adminOnly, implausibleRoi, fillNow, fillAfter, bankShiftCost, agencyShiftCost, shiftHours,
    displaceableShare:ds, turnover:num(input.turnover), agencyPctOfTurnover:reg.pct, regime:reg.key };
}

/* Build the engine input for the SIMPLE 3-input variant */
function simpleToInput(s, shared){
  const a = num(s.agencyFillRate)/100;
  const bankShifts = num(s.bankPool) * SIMPLE_SHIFTS_PER_WORKER_YR;
  const totalTemp = a<1 ? bankShifts/(1-a) : bankShifts;     // bank fills the non-agency share
  const agencyShifts = totalTemp * a;
  const bankShiftCost = (SIMPLE_BLENDED_BANK_PAY/AFC_DIVISOR) * shared.shiftHours * (1+shared.oncost/100);
  const agencyShiftCost = bankShiftCost * (1+shared.premium/100);
  const agencySpend = agencyShifts * agencyShiftCost;
  return {
    groups:[{ id:"all", role:"Whole bank pool", bankPay:SIMPLE_BLENDED_BANK_PAY, headcount:num(s.bankPool), agencySpend }],
    premium:shared.premium, displacement:shared.displacement, shiftHours:shared.shiftHours, oncost:shared.oncost,
    platformCost:shared.platformCost, fillRateNow:s.agencyFillRate,
    displaceableShare: shared.displaceableShare!=null?shared.displaceableShare:DISPLACEABLE_SHARE_DEFAULT, turnover: shared.turnover,
    admin:{ enabled:s.includeAdmin!==false, managers:num(s.numManagers), hoursPerDay:ADMIN_HRS_PER_DAY_DEFAULT, workingDays:ADMIN_WORKING_DAYS, loadedHourly:ADMIN_LOADED_HOURLY },
    recruit:{ enabled:false },
  };
}

/* Respect prefers-reduced-motion: skip count-ups, the calibrating pause and smooth scrolling. */
const REDUCE_MOTION = typeof window!=="undefined" && window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
/* Embedded (iframe) detection: the auto-resized iframe is always full height, so
   window.scrollTo / scrollIntoView are no-ops inside it (and cross-origin parents
   won't scroll for us). Instead we post scroll requests to the host page, which
   the embed snippet translates into host-page scrolls. */
const EMBEDDED = typeof window!=="undefined" && window.self!==window.top;
function hostScroll(top){ window.parent.postMessage(top==null ? {type:"smartmatch-roi-scroll-top"} : {type:"smartmatch-roi-scroll",top}, "*"); }
function useCountUp(target, ms=900){
  const [v,setV]=useState(target); const prev=useRef(target); const raf=useRef();
  useEffect(()=>{ if(REDUCE_MOTION){ prev.current=target; setV(target); return; }
    const from=prev.current,to=target,start=performance.now(); cancelAnimationFrame(raf.current);
    const tick=now=>{ const t=Math.min(1,(now-start)/ms),e=1-Math.pow(1-t,3); setV(from+(to-from)*e); if(t<1)raf.current=requestAnimationFrame(tick); else prev.current=to; };
    raf.current=requestAnimationFrame(tick); return ()=>cancelAnimationFrame(raf.current); },[target,ms]);
  return v;
}

/* Size headline input: commits on blur / Enter (not per keystroke) so typing a
   new total does not progressively rescale and collapse the staff-group mix. */
function SizeField({label, value, prefix, hint, info, onCommit}){

  useEffect(()=>{ setTxt(String(value)); },[value]);

    <label htmlFor={id}>{label}{info && <InfoTip text={info}/>}</label>

        onChange={e=>setTxt(e.target.value)} onBlur={commit} onKeyDown={e=>{ if(e.key==="Enter") e.target.blur(); }} />

    {hint && <span className="hint">{hint}</span>}

function Method({formula, your, source, strength}){

/* ===== MAIN APP ===== */
function App(){

              <label style={{display:"flex",alignItems:"center",gap:8,fontSize:13,fontWeight:600,color:C.navy,cursor:"pointer"}}>
                <input type="checkbox" checked={admin.enabled} onChange={e=>setAdmin(a=>({...a,enabled:e.target.checked}))}/> Include admin time saving in cash (off by default)
                <InfoTip text="Off by default, treated as a secondary recommendation. Time released for your temporary staffing team — bank/temp coordinators, officers and administrators — via self-booking automation. Time-saved-per-week is always shown; tick to add its cash value to the saving total."/>
              </label>
              <div className="inputs-grid" style={{marginTop:12}}>
                <Field label="Temporary staffing team" value={admin.managers} min="0" onChange={v=>setAdmin(a=>({...a,managers:num(v)}))} info="Your temporary staffing team — bank/temp coordinators, officers and administrators."/>
                <Field label="Hours saved / day each" value={admin.hoursPerDay} min="0" step={0.25} onChange={v=>setAdmin(a=>({...a,hoursPerDay:num(v)}))} info="Some teams report up to 2.5 h/day — that's optimistic (a third of every day). Default is a conservative 1.0; validate locally."/>
                <Field label="Working days / year" value={admin.workingDays} min="0" onChange={v=>setAdmin(a=>({...a,workingDays:num(v)}))}/>
                <Field label="Loaded hourly rate (£)" prefix="£" value={admin.loadedHourly} min="0" onChange={v=>setAdmin(a=>({...a,loadedHourly:num(v)}))}/>
              </div>
            </div>

            <div className="card" style={{marginTop:12}}>
              <label style={{display:"flex",alignItems:"center",gap:8,fontSize:13,fontWeight:600,color:C.navy,cursor:"pointer"}}>
                <input type="checkbox" checked={recruit.enabled} onChange={e=>setRecruit(a=>({...a,enabled:e.target.checked}))}/> Include recovered recruitment / onboarding waste (optional)
                <InfoTip text="Cost of recruiting and onboarding bank workers who then go under-utilised. Smart Match recovers some of it by activating idle capacity. Conservative and off by default."/>
              </label>
              {recruit.enabled && <div className="inputs-grid" style={{marginTop:12}}>
                <Field label="Under-utilised bank workers" value={recruit.workers} min="0" onChange={v=>setRecruit(a=>({...a,workers:num(v)}))}/>
                <Field label="Recruit + onboard cost each (£)" prefix="£" value={recruit.costPerWorker} min="0" step={100} onChange={v=>setRecruit(a=>({...a,costPerWorker:num(v)}))}/>
                <Field label="Share recovered" value={recruit.recoveryRate} min="0" max="1" step={0.05} onChange={v=>setRecruit(a=>({...a,recoveryRate:num(v)}))} info="Fraction of that waste Smart Match recovers (e.g. 0.10 = 10%). Keep conservative."/>
              </div>}
            </div>
          </div>
        </>
        )}

        {/* RESULTS (shared) */}
        {!calculated && (
          <div className="section" style={{textAlign:"center",padding:"1.5rem 0 0"}}>
            <button className="btn primary" style={{fontSize:16,padding:"14px 34px"}} onClick={runCalc}>Calculate my savings →</button>
            <p className="step-sub" style={{margin:"12px 0 0"}}>We'll model your bank pool and agency exposure, then adjust anything and the report updates live.</p>
          </div>
        )}
        {calculated && (
        <div className="section" id="results">
          <p className="sr-only" role="status">Results ready. Your estimated annual impact is shown below and updates live as you adjust inputs.</p>
          <div className="step-label"><div className="step-num">{isQuick?2:3}</div><h2>Your potential impact</h2></div>
          <div className="results-box">
            <div className="roi-header">
              <div className="roi-eyebrow">Estimated annual impact (indicative)</div>
              <div className="roi-co">
                {noNet ? (
                <div><div className="roi-hero" style={{fontSize:"1.7rem",lineHeight:1.15,color:"#E9B949"}}>No net cash saving at this scale</div><div className="roi-desc" style={{marginTop:8}}>The {fmt(platformCost)}/yr licence fee is larger than the {fmtK(r.totSaving)} agency premium you'd displace at these inputs. The value here is the released capacity and time; the cash case grows with a larger bank or more agency spend moved to bank.</div></div>
                ) : (
                <div><div className="roi-hero"><AnimMoney v={r.netSaving}/></div><div className="roi-cap">Potential annual cash saving</div><div className="roi-desc">What you could save each year by filling more shifts from your bank instead of agency — the agency premium you stop paying.</div></div>
                )}
                <div><div className="roi-hero">{Math.round(tswAnim).toLocaleString(LOCALE)}<small> hrs</small></div><div className="roi-cap">Administrative time released per week</div><div className="roi-desc">Time your temporary staffing team gets back each week as Smart Match automates shift booking and matching, scaled to your team's size.</div></div>
              </div>
              <div className="roi-sub">
                <span>Payback <b>{noNet?"n/a":fmtDays(r.paybackMonths)}</b></span>
                <span>Gross benefit <b>{fmtK(r.grossBenefit)}</b></span>
                <span>Return <b>{noNet?"n/a":<>{r.implausibleRoi?"⚠ ":""}{fmtMult(r.roiMultiple)}</>}</b></span>
                <span>Agency premium avoided <b>{fmtK(r.totSaving)}</b></span>
              </div>
            </div>

            <div className="summary-grid">
              <div className="s-card hl"><div className="s-lbl">Net annual saving</div><div className="s-val">{noNet?"n/a":<AnimMoney v={r.netSaving}/>}</div><div className="s-sub">{noNet?"licence fee exceeds the modelled premium":<>after {fmt(platformCost)} licence fee</>}</div></div>
              <div className="s-card"><div className="s-lbl">Agency premium avoided</div><div className="s-val"><AnimMoney v={r.totSaving}/></div><div className="s-sub">agency vs bank gap, before licence</div></div>
              {r.adminSaving>0 && (()=>{ const aM=isQuick?num(simple.numManagers):num(admin.managers), aH=isQuick?ADMIN_HRS_PER_DAY_DEFAULT:num(admin.hoursPerDay), aD=isQuick?ADMIN_WORKING_DAYS:num(admin.workingDays), aR=isQuick?ADMIN_LOADED_HOURLY:num(admin.loadedHourly);
                return <div className="s-card"><div className="s-lbl">Admin saving <InfoTip text={aM+" "+(aM===1?"person":"people")+" × "+aH+" h/day × "+aD+" working days × £"+aR+"/h (loaded) = "+fmt(r.adminSaving)}/></div><div className="s-val"><AnimMoney v={r.adminSaving}/></div><div className="s-sub">modelled, conservative</div></div>; })()}
              <div className="s-card"><div className="s-lbl">Time saved / week</div><div className="s-val">{Math.round(r.timeSavedWeek).toLocaleString(LOCALE)}<span style={{fontSize:13}}> hrs</span></div><div className="s-sub">across the temporary staffing team</div></div>
            </div>

            {!noNet && <p style={{padding:"0 1.5rem",margin:"1rem 0 0",fontSize:12,color:C.textLight,lineHeight:1.6}}>
              This is the agency premium you stop paying by filling more shifts from your own bank instead of agency{r.adminSaving>0?<>, plus <b style={{color:C.textMid}}>{fmtK(r.adminSaving)}</b> of admin time</>:""}{r.recruitSaving>0?<> and <b style={{color:C.textMid}}>{fmtK(r.recruitSaving)}</b> of recruitment waste recovered</>:""}, shown as an annual figure after the <b style={{color:C.textMid}}>{fmt(platformCost)}/yr</b> licence fee.
            </p>}

            {r.exceedsSpend && <div className="callout navy"><p className="title">⚠ Check your inputs</p><p>The modelled saving exceeds total agency spend, which isn't possible. Lower the premium or displacement, or check the agency-spend figures.</p></div>}
            {r.adminOnly && !noNet && <div className="callout navy"><p className="title">Admin time only</p><p>No agency premium saving is modelled (agency spend is zero). This figure is the admin-time value on its own. {isQuick?"Set an agency fill rate above 0":"Add your agency spend"} to model the agency-displacement saving.</p></div>}
            {r.implausibleRoi && !noNet && <div className="callout navy"><p className="title">⚠ Unusually high return</p><p>At these inputs the modelled saving is more than 30 times the licence fee, which usually reflects a very large bank or agency book. Sense-check against your organisation's real agency spend before quoting it.</p></div>}

            {/* How the cash saving is worked out — bank vs agency rate vs the premium gap (the defensible basis) */}
            <div className="panel">
              <div className="panel-title">How the cash saving is worked out</div>
              <p style={{fontSize:12.5,color:C.textMid,lineHeight:1.6,margin:"0 0 .6rem"}}>We only ever bank the <b>gap</b> between an agency shift and the same shift on your own bank — never the whole agency cost — and only on the shifts you realistically move to bank (the {Math.round(r.displaceableShare*100)}% displaceable share × your confidence level).</p>
              {(()=>{ const hrs=r.shiftHours||8, bankHr=r.bankShiftCost/hrs, agHr=r.agencyShiftCost/hrs, gapS=r.agencyShiftCost-r.bankShiftCost, gapHr=gapS/hrs, m2=v=>"£"+(v||0).toFixed(2);
                const rate=(s,h)=>(<>{fmt(s)} <small style={{color:C.textLight,fontWeight:400}}>/shift · {m2(h)}/hr</small></>);
                // Round each term first so the displayed premium - licence = net equation adds up exactly.
                const grossR=Math.round(r.totSaving), adminR=Math.round(r.adminSaving||0), recR=Math.round(r.recruitSaving||0), licR=Math.round(num(platformCost)), netR=grossR+adminR+recR-licR;
                return <>
                  <div className="arow"><span>Your own bank (blended rate, all-in)</span><span>{rate(r.bankShiftCost,bankHr)}</span></div>
                  <div className="arow"><span>{perGroupPremium?"Agency, same shift (your per-group premiums)":"Agency, same shift (at "+premium+"% premium)"}</span><span>{rate(r.agencyShiftCost,agHr)}</span></div>
                  <div className="arow"><span style={{fontWeight:700,color:C.navy}}>Premium displaced = the saving</span><span>{rate(gapS,gapHr)}</span></div>
                  <p style={{fontSize:12.5,color:C.textMid,lineHeight:1.6,margin:".6rem 0 0"}}><b style={{color:C.navy}}>{m2(gapHr)}/hr</b> on each of <b style={{color:C.navy}}>{fmtNum(r.totDisplaced)}</b> shifts moved to bank = <b style={{color:C.navy}}>{fmt(r.totSaving)}</b> gross a year.</p>
                  <p style={{fontSize:12.5,lineHeight:1.7,margin:".6rem 0 0",padding:"10px 14px",background:netR>0?"#EFF9F6":"#FBF6EC",border:"1px solid "+(netR>0?"#BFE5DB":"#E8D9B8"),borderRadius:8,color:C.textMid}}>
                    <b style={{color:C.navy}}>{fmt(grossR)}</b> premium{adminR>0?<> + <b style={{color:C.navy}}>{fmt(adminR)}</b> admin time</>:""}{recR>0?<> + <b style={{color:C.navy}}>{fmt(recR)}</b> recruitment</>:""} − <b style={{color:C.navy}}>{fmt(licR)}</b> licence fee = <b style={{color:netR>0?C.teal:"#8A6508"}}>{netR>=0?fmt(netR):"−"+fmt(-netR)}</b> net{netR>0?", the headline saving shown at the top.":", so the licence fee is larger than the premium at these inputs."}
                  </p>
                </>; })()}
              <p style={{fontSize:11.5,color:C.textLight,marginTop:".6rem",lineHeight:1.6}}>Bank rate = 2026/27 AfC blended midpoint, already including the employer on-cost (default 20%, employer NI + pension), so on-costs are counted once, not added on top. Premium defaults to the official ~20% House of Commons Library average — deliberately conservative and contested at shift level (nursing ~35–50%, medics ~80–120%). Set your own premium and every figure updates.{isQuick?<> Your agency spend is modelled from your bank pool and fill rate ({fmtK(r.totSpend)}), assuming ~60 ad-hoc shifts per bank worker a year — for a figure built on your real spend, switch to Detailed.</>:""}</p>
            </div>

            {/* Single annual steady-state (Rev D: ramp removed) */}
            <div className="panel">
              <div className="panel-title">Annual, ongoing saving</div>
              <p style={{fontSize:12.5,color:C.textMid,lineHeight:1.6,margin:0}}>This is a <b>single annual, steady-state figure</b>, not a multi-year projection. Smart Match savings start once it is live and recur every year it is in use; the licence fee shown is an annual cost, so the net saving repeats each year.</p>
            </div>

            {!isQuick && r.regime && <div className="panel">
              <div className="panel-title">Agency intensity: {r.agencyPctOfTurnover.toFixed(1)}% of turnover</div>
              <p style={{fontSize:12.5,color:C.textMid,lineHeight:1.6,margin:0}}>{r.regime==="low" ? <>This is a <b>mature, low-agency</b> model (under 1% of turnover): rate-arbitrage savings are small, so the stronger story is <b>admin time released, fill-rate improvement and bank-rate control</b> rather than the cash premium.</> : r.regime==="high" ? <>This trust is <b>highly agency-reliant</b> (over 4% of turnover): <b>the cash saving from displacing the agency premium dominates</b> — the strongest rate-arbitrage case.</> : <>This is <b>typical</b> agency reliance (1–4% of turnover): <b>the cash saving from the agency premium</b> is the headline, with admin time a secondary benefit.</>} Displacement is applied to the <b>{Math.round(displaceableShare*100)}% displaceable share</b> only.</p>
            </div>}

            {!isQuick && <div className="table-wrap"><table>
              <thead><tr><th>Staff group</th><th className="num">Bank pool</th><th className="num">Agency spend</th>{perGroupPremium && <th className="num">Premium</th>}<th className="num">Duties displaced</th><th className="num">Cash saving</th></tr></thead>
              <tbody>
                {r.rows.map(x=>(<tr key={x.id}><td>{x.role}</td><td className="num">{fmtNum(x.head)}</td><td className="num">{fmt(x.spend)}</td>{perGroupPremium && <td className="num">{(x.premium!=null?x.premium:premium)}%</td>}<td className="num">{fmtNum(x.displaced)}</td><td className="num">{fmt(x.saving)}</td></tr>))}
                <tr className="total-row"><td>Total</td><td className="num">{fmtNum(r.totHead)}</td><td className="num">{fmt(r.totSpend)}</td>{perGroupPremium && <td className="num">n/a</td>}<td className="num">{fmtNum(r.totDisplaced)}</td><td className="num">{fmt(r.totSaving)}</td></tr>
              </tbody></table></div>}

            <div className="panel">
              <div className="panel-title">{isQuick?"Saving by source":"Cash saving by staff group"}</div>
              {isQuick ? (
                [["Agency premium displaced",r.totSaving],["Admin time saving",r.adminSaving],["Recruitment waste recovered",r.recruitSaving]]
                  .filter(x=>x[1]>0).map(([lbl,val],i)=>{ const mx=Math.max(r.totSaving,r.adminSaving,r.recruitSaving,1);
                  return (<div className="bar-row" key={lbl}><div className="blbl">{lbl}</div><div className="btrack"><div className="bfill" style={{width:Math.round((val/mx)*100)+"%",background:RAMP[i%RAMP.length]}}></div></div><div className="bval">{fmt(val)}</div></div>); })
              ) : (
                r.rows.map((x,i)=>(<div className="bar-row" key={x.id}><div className="blbl">{x.role}</div><div className="btrack"><div className="bfill" style={{width:Math.round((x.saving/maxSaving)*100)+"%",background:RAMP[i%RAMP.length]}}></div></div><div className="bval">{fmt(x.saving)}</div></div>))
              )}
            </div>

            <div className="capacity">
              <span className="cap-tag">Capacity: not a cash saving</span>
              <p style={{fontSize:12,color:C.textMid,margin:".55rem 0 0",lineHeight:1.55,maxWidth:560}}>Additional shifts covered by your own staff rather than agency — reducing reliance on agency and supporting continuity of care.</p>
              <div className="cap-grid">
                <div className="cap-item"><div className="cv"><AnimNum v={r.totDisplaced}/></div><div className="cl">more shifts filled from your own bank each year (off agency)</div></div>
                <div className="cap-item"><div className="cv">{fmtK(r.totCapacityValue)}</div><div className="cl">bank backfill cost to deliver them <b>(spend, not saving)</b></div></div>
                <div className="cap-item"><div className="cv">{r.fillNow?pct(r.fillNow)+" → "+r.fillAfter.toFixed(1)+"%":"n/a"}</div><div className="cl">illustrative agency reliance reduction</div></div>
              </div>
              <p style={{fontSize:11.5,color:C.textLight,marginTop:".85rem",lineHeight:1.6}}>Filling more shifts from your own bank is real operational value — steadier rosters, better continuity of care and less last-minute agency reliance. It is deliberately kept separate from the cash saving above and never added to it.</p>
            </div>

            <div className="callout navy">
              <p className="title">The value goes beyond the numbers</p>
              <p>These figures capture cash savings only. Smart Match also supports safer staffing, better continuity of care and a fairer, more flexible experience for your bank workers — real benefits we've deliberately not put a pound figure on.</p>
            </div>

            <div className="callout quote">
              <p className="quote-txt">"I've just received my first Smart Match duty offer. Clicking the notification took me straight to the shift details and I booked it straight away, so easy. You're not constantly looking on a loop, frightened you'll miss something."</p>
              <p className="quote-by">Bank staff member, a community trust (Smart Match programme; anonymised)</p>
            </div>

            <div className="lead">
              <h4>Want a copy, or to pressure-test these numbers?</h4>
              <p className="sub">Optional: the calculator and PDF are open to everyone. Leave your details and a Smart Match specialist can validate the figures against your organisation's own bank and agency rates.</p>
              {lead.sent ? <p style={{color:C.navy,fontWeight:600,fontSize:14}}>Thanks, we'll be in touch. 👋</p> :
              <form onSubmit={submitLead}><div className="lead-grid">
                <input aria-label="Name" autoComplete="name" placeholder="Name" value={lead.name} onChange={e=>setLead(l=>({...l,name:e.target.value}))}/>
                <input type="email" required aria-label="Work email" autoComplete="email" placeholder="Work email" value={lead.email} onChange={e=>setLead(l=>({...l,email:e.target.value}))}/>
                <input aria-label="Trust or organisation" autoComplete="organization" placeholder="Trust / organisation" value={lead.org} onChange={e=>setLead(l=>({...l,org:e.target.value}))}/>
                <button className="btn primary" type="submit" disabled={!lead.consent||lead.busy}>{lead.busy?"Sending…":"Send to a specialist"}</button>
              </div>
              <label className="consent" style={{display:"flex",alignItems:"flex-start",gap:8,cursor:"pointer",marginTop:".6rem"}}><input type="checkbox" required checked={!!lead.consent} onChange={e=>setLead(l=>({...l,consent:e.target.checked}))} style={{marginTop:3}}/><span>I agree RLDatix may contact me about Smart Match and process these details in line with the RLDatix privacy notice.</span></label>
              {lead.err==="failed" && <p className="consent" style={{color:C.rose}}>Sorry, that didn't send. Please try again, or contact your RLDatix representative.</p>}
              {lead.err==="unconfigured" && <p className="consent" style={{color:C.rose}}>Lead capture isn't switched on yet. Your RLDatix contact can enable it (HubSpot portal + form ID).</p>}
              </form>}
            </div>

            <div className="actions">
              <button className="btn primary" onClick={downloadPDF} disabled={pdfBusy}>{pdfBusy?"Generating…":"⬇ Download PDF estimate"}</button>
              <button className="btn" onClick={()=>{ if(EMBEDDED) hostScroll(null); else window.scrollTo({top:0,behavior:REDUCE_MOTION?"auto":"smooth"}); }}>↑ Adjust inputs</button>
            </div>

            <div className="assumptions">
              <div className="panel-title">Assumptions &amp; methodology</div>
              <div className="arow"><span>Saving basis</span><span>Agency premium displaced (cash)</span></div>
              <div className="arow explain"><span className="albl">Why not the full shift value? <span className="conf high">CORE</span></span><span className="adesc">Filling a bank shift is expenditure. A trust only saves when a duty that would have been agency is covered by bank instead: the saving is the <b>difference</b> (the premium), not the whole shift. Gross shift value sits under Capacity.</span></div>
              <Method formula={"bank_shift_cost  = (pay / 1957.5) × hours × (1 + on-cost)\nagency_shift_cost= bank_shift_cost × (1 + premium)\ndisplaced_duties = (agency_spend / agency_shift_cost) × displaceable_share × displacement\nCASH SAVING      = displaced_duties × bank_shift_cost × premium"}
                your={<>Agency spend {fmt(r.totSpend)} · displaceable share {Math.round(r.displaceableShare*100)}% · premium {premium}%{perGroupPremium?" (default; per-group overrides on)":""} · displacement {displacement}% ({st.key}) → <b>{fmt(r.totSaving)}</b>.</>}
                source="Cash saving = agency_spend × displaceable_share × displacement × premium/(1+premium); driven by agency spend, the displaceable share, premium and displacement, not bank payroll." strength={{c:"high",t:"method"}}/>
              <div className="arow"><span>Time saved / week (co-headline)</span><span>{Math.round(r.timeSavedWeek).toLocaleString(LOCALE)} hours</span></div>
              <div className="arow explain"><span className="albl">Admin model (per person) <span className="conf low">low</span></span><span className="adesc">team size × hours/day × 5. Cash: × {ADMIN_WORKING_DAYS} working days × loaded rate. Roles: bank/temp staffing coordinators, officers and administrators (the people who do the day-to-day booking). Some teams report up to 2.5 h/day @ £18, treated as optimistic; default is a conservative 1.0 h/day. Validate locally.</span></div>
              <div className="arow"><span>Agency premium {perGroupPremium?"(per staff group)":"(single, editable)"}</span><span>{premium}%{perGroupPremium?" default":""} <span className="contested">contested</span></span></div>
              <div className="arow explain"><span className="albl">Source: premium</span><span className="adesc">~20% average (House of Commons Library CBP-10539, Mar 2026); disputed at shift level; May 2026 REC FOI data show NHS bank can cost more than price-capped agency on some shifts. Treat as a range (nursing ~35–50%, medics ~80–120%) and use your own rates.</span></div>
              <div className="arow"><span>Displaceable share of agency</span><span>{Math.round(r.displaceableShare*100)}%</span></div>
              <div className="arow explain"><span className="albl">Source: displaceable share</span><span className="adesc">Only part of agency spend can realistically move to bank — excludes break-glass / safety-critical cover and specialist roles bank can't fill. Displacement applies to this share only (benchmark default 80%, editable in Detailed).</span></div>
              <div className="arow"><span>Confidence level</span><span>{displacement}%, {st.key}</span></div>
              <div className="arow explain"><span className="albl">Source: displacement <span className="conf low">low</span></span><span className="adesc">Conservative by default. The programme saw agency fill fall 8.1%→6.0% at one community site (26% relative), the observed upper end, single-site, partly attributable to wider scheduling/engagement changes. Health-economist validation pending.</span></div>
              <div className="arow"><span>Bank-utilisation programme signal</span><span>+17% (one site)</span></div>
              <div className="arow explain"><span className="albl">Source: programme (4 trusts; 2-site data) <span className="conf low">low–mod</span></span><span className="adesc">Utilisation +17% at one community site (170→199 workers); the other reporting site was ~+1.75% (a "13%" figure in the client doc is a known error). Temp duties filled +17% (351→411) / +16%. Self-booking +26% / +15%. Engagement/coverage measures, not payroll uplift; they inform the stance, not the saving. Anonymised pending client sign-off.</span></div>
              <div className="arow"><span>Pay scale</span><span>2026/27 NHS AfC midpoints <span className="conf high">high</span></span></div>
              <div className="arow explain"><span className="albl">Source: pay</span><span className="adesc">NHS Employers 2026/27 (+3.3% confirmed from 1 Apr 2026): Band 2 ~£25,272; Band 3 ~£26,618; Band 5 mid ~£34,592; Band 6 mid ~£42,170. Medics use the SAS / specialty-doctor scale (~£52.5k–£67.5k, 2026/27); medical T&amp;Cs, not AfC. Add London HCAS (Inner 20% / Outer 15% / Fringe 5%) where relevant. Band 2/3 may rise further via the pending Staff Council structure reform.</span></div>
              <div className="arow"><span>Hourly divisor / shift length</span><span>1,957.5 h/yr · {shiftHours} h</span></div>
              <div className="arow"><span>Licence fee (ROI denominator, G-Cloud)</span><span>{fmt(platformCost)}/yr</span></div>
              {r.recruitSaving>0 && <><div className="arow"><span>Recruitment waste recovered (optional)</span><span>{fmt(r.recruitSaving)}</span></div>
              <div className="arow explain"><span className="albl">Source: recruitment <span className="conf low">low</span></span><span className="adesc">under-utilised workers × recruit/onboard cost × recovery share. No strong public benchmark, conservative and clearly optional.</span></div></>}
              <div className="arow explain"><span className="albl">Strategy &amp; framing</span><span className="adesc">Framed against the NHS 10 Year Plan + Workforce Paper and the Staff Health &amp; Wellbeing CQUIN. A pilot study is a small (2-site), vendor-collected sample, encouraging but indicative, not solely attributable to Smart Match, and anonymised pending client sign-off.</span></div>
            </div>
          </div>
        </div>
        )}
      </main>

      <footer><p>Built by <strong>RLDatix Smart Match</strong> · Cash saving = agency premium displaced (not gross shift value) · 2026/27 NHS AfC pay scales · Figures are <strong>indicative</strong>, conservative and editable · validate with your organisation's own rates ·Pilot study = 2-site data within a 4-trust programme, anonymised pending client sign-off; outcomes vary and are not solely attributable to the platform.</p></footer>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
