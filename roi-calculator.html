<script type="text/babel" data-presets="react">
const { useState, useMemo, useEffect, useRef } = React;

/* ===== THEME — RLDatix corporate (navy + coral) ===== */
const C = { navy:"#1B2B4B", navyMid:"#2C4070", navyLight:"#EEF1F7", coral:"#E8392A", coralMid:"#F05C50", coralLight:"#FDECEA", border:"#DDE0E8", text:"#1B2B4B", textMid:"#4A5568", textLight:"#8A95A8" };
const RAMP = ["#1B2B4B","#2C4070","#E8392A","#F05C50","#8A95A8"];

/* ===== FORMATTERS — en-GB / £ (AU-ready: swap LOCALE + SYMBOL) ===== */
const LOCALE="en-GB", SYMBOL="£";
const fmt    = n => SYMBOL + Math.round(n||0).toLocaleString(LOCALE);
const fmtK   = n => { n=n||0; return n>=1e6 ? `${SYMBOL}${(n/1e6).toFixed(2)}m` : n>=1000 ? `${SYMBOL}${Math.round(n/1000).toLocaleString(LOCALE)}k` : fmt(n); };
const fmtNum = n => Math.round(n||0).toLocaleString(LOCALE);
const pct    = n => `${Math.round(n)}%`;
const num    = (v,f=0) => { const n=parseFloat(v); return isNaN(n)?f:n; };

/* ===== MODEL CONSTANTS (conservative; flagged for validation) =====
   Cash saving (corrected v9, brief §3) is the AGENCY PREMIUM DISPLACED,
   anchored to agency exposure — never bank payroll:
     bank_shift_cost   = (pay/1957.5) × hours × (1+oncost)
     agency_shift_cost = bank_shift_cost × (1+premium)
     displaced_shifts  = (agency_spend / agency_shift_cost) × displacement
     CASH SAVING       = displaced_shifts × bank_shift_cost × premium
   Admin (B) and capacity/temp-duties (C) are kept strictly separate. */
const AFC_DIVISOR = 1957.5;
const SHIFT_HOURS_DEFAULT = 8;
const BANK_ONCOST_DEFAULT = 0.20;     // affects shift counts only, not the cash headline
const PLATFORM_COST_DEFAULT = 17000;
/* Admin (Rev B): per admin/roster manager. Client said 2.5 h/day @ £18 — 2.5 is optimistic, default lower. */
const ADMIN_HRS_PER_DAY_DEFAULT = 1.0;
const ADMIN_WORKING_DAYS = 225;

function stance(d){
  if (d<=12) return { key:"Conservative", color:C.navy, bg:C.navyLight, note:"Conservative: only a small share of agency shifts is assumed to move to bank. Closest to a defensible business-case default." };
  if (d<=22) return { key:"Moderate", color:C.navyMid, bg:C.navyLight, note:"Moderate: a meaningful share of agency shifts moves to bank as utilisation improves. Reasonable where agency dependency is well documented." };
  return { key:"Optimistic", color:"#9B1C12", bg:C.coralLight, note:"Optimistic: approaches the programme's observed upper end (one site, 26% relative agency-fill reduction). Use only with strong, trust-specific evidence." };
}

/* ===== PURE CALC ENGINE (shared by Quick + Detailed + the kiosk variant) ===== */
function calc(input){
  const { groups, premium, displacement, shiftHours, oncost, platformCost, admin, recruit, fillRateNow } = input;
  const p=premium/100, d=displacement/100, oc=oncost/100;
  let totSpend=0, totSaving=0, totDisplaced=0, totBaseline=0, totHead=0, totCapacityValue=0;
  const rows = groups.map(g=>{
    const head=num(g.headcount), spend=num(g.agencySpend), pay=num(g.bankPay);
    const bankShiftCost = (pay/AFC_DIVISOR) * shiftHours * (1+oc);
    const agencyShiftCost = bankShiftCost * (1+p);
    const baseline = agencyShiftCost>0 ? spend/agencyShiftCost : 0;
    const displaced = baseline*d;
    const saving = displaced * (agencyShiftCost - bankShiftCost);  // = displaced × bankShiftCost × p
    const capacityValue = displaced * bankShiftCost;               // gross bank backfill cost (NON-cash)
    totSpend+=spend; totSaving+=saving; totDisplaced+=displaced; totBaseline+=baseline; totHead+=head; totCapacityValue+=capacityValue;
    return { ...g, head, spend, bankShiftCost, agencyShiftCost, baseline, displaced, saving, capacityValue };
  });
  // B — admin (per manager/day) + time saved/week (a co-headline; shown regardless of cash toggle)
  const mgrs=num(admin.managers), hpd=num(admin.hoursPerDay);
  const timeSavedWeek = mgrs * hpd * 5;
  const adminSaving = admin.enabled ? mgrs * hpd * num(admin.workingDays) * num(admin.loadedHourly) : 0;
  // B(optional) — recovered recruitment/onboarding waste
  const recruitSaving = (recruit && recruit.enabled) ? num(recruit.workers)*num(recruit.costPerWorker)*num(recruit.recoveryRate) : 0;

  const grossBenefit = totSaving + adminSaving + recruitSaving;
  const netSaving = grossBenefit - num(platformCost);
  const roiPct = platformCost>0 ? (netSaving/platformCost)*100 : 0;
  const paybackMonths = grossBenefit>0 ? platformCost/(grossBenefit/12) : null;
  const exceedsSpend = totSaving>totSpend && totSpend>0;
  const implausibleRoi = roiPct>3000;
  const fillNow=num(fillRateNow), fillAfter=fillNow*(1-d);
  return { rows, totSpend, totSaving, totDisplaced, totBaseline, totHead, totCapacityValue,
    adminSaving, recruitSaving, timeSavedWeek, grossBenefit, netSaving, roiPct, paybackMonths,
    exceedsSpend, implausibleRoi, fillNow, fillAfter };
}

/* Build the engine input for the SIMPLE 3-input variant */
function simpleToInput(s, shared){
  const a = num(s.agencyFillRate)/100;
  const bankShifts = num(s.bankPool) * SIMPLE_SHIFTS_PER_WORKER_YR;
  const totalTemp = a<1 ? bankShifts/(1-a) : bankShifts;     // bank fills the non-agency share
  const agencyShifts = totalTemp * a;
  const bankShiftCost = (SIMPLE_BLENDED_BANK_PAY/AFC_DIVISOR) * shared.shiftHours * (1+shared.oncost/100);
  const agencyShiftCost = bankShiftCost * (1+shared.premium/100);
  const agencySpend = agencyShifts * agencyShiftCost;
  return {
    groups:[{ id:"all", role:"Whole bank pool", bankPay:SIMPLE_BLENDED_BANK_PAY, headcount:num(s.bankPool), agencySpend }],
    premium:shared.premium, displacement:shared.displacement, shiftHours:shared.shiftHours, oncost:shared.oncost,
    platformCost:shared.platformCost, fillRateNow:s.agencyFillRate,
    admin:{ enabled:true, managers:num(s.numManagers), hoursPerDay:ADMIN_HRS_PER_DAY_DEFAULT, workingDays:ADMIN_WORKING_DAYS, loadedHourly:ADMIN_LOADED_HOURLY },
    recruit:{ enabled:false },
  };
}

/* ===== HOOKS + SMALL COMPONENTS ===== */
function useCountUp(target, ms=900){
  const [v,setV]=useState(target); const prev=useRef(target); const raf=useRef();
  useEffect(()=>{ const from=prev.current,to=target,start=performance.now(); cancelAnimationFrame(raf.current);
    const tick=now=>{ const t=Math.min(1,(now-start)/ms),e=1-Math.pow(1-t,3); setV(from+(to-from)*e); if(t<1)raf.current=requestAnimationFrame(tick); else prev.current=to; };
    raf.current=requestAnimationFrame(tick); return ()=>cancelAnimationFrame(raf.current); },[target,ms]);
  return v;
}
const AnimMoney = ({v}) => fmt(useCountUp(v));
const AnimNum   = ({v}) => fmtNum(useCountUp(v));

function InfoTip({text}){
  const [open,setOpen]=useState(false);
  return (<span style={{position:"relative",display:"inline-flex"}}>
    <button type="button" aria-label={"More info: "+text} onClick={()=>setOpen(o=>!o)} onBlur={()=>setOpen(false)}
      style={{width:16,height:16,borderRadius:"50%",border:"1px solid "+C.border,background:"#fff",color:C.textLight,fontSize:10,fontWeight:700,cursor:"pointer",lineHeight:1,padding:0}}>i</button>
    {open && <span role="tooltip" style={{position:"absolute",bottom:"130%",left:"50%",transform:"translateX(-50%)",background:C.navy,color:"#fff",fontSize:11,fontWeight:400,lineHeight:1.5,padding:"8px 10px",borderRadius:8,width:230,boxShadow:"0 8px 24px rgba(0,0,0,.25)",zIndex:50}}>{text}</span>}
  </span>);
}
function Field({label, value, onChange, min, step=1, prefix, info, hint}){
  const id="f_"+label.replace(/\W/g,"");
  return (<div className="field">
    <label htmlFor={id}>{label}{info && <InfoTip text={info}/>}</label>
    <div style={{position:"relative",display:"flex",alignItems:"center"}}>
      {prefix && <span style={{position:"absolute",left:10,color:C.textLight,fontSize:14}}>{prefix}</span>}
      <input id={id} type="number" value={value} min={min} step={step} style={prefix?{paddingLeft:22}:null} onChange={e=>onChange(e.target.value)} />
    </div>
    {hint && <span className="hint">{hint}</span>}
  </div>);
}
function Method({formula, your, source, strength}){
  return (<details className="method"><summary>How we calculated this</summary><div className="mbody">
    {formula && <><b>Formula</b><code className="formula">{formula}</code></>}

    {source && <><b>Source</b> {strength && <span className={"conf "+strength.c}>{strength.t}</span>}<div style={{marginTop:4}}>{source}</div></>}

}

            <div className="disp-note" style={{background:st.bg,color:st.color}}>{st.note}</div>
            <div className="params-grid" style={{marginTop:12}}>
              <Field label="Smart Match platform cost (£/yr)" prefix="£" value={platformCost} min="0" step={1000} onChange={v=>setPC(num(v,17000))} info="ROI denominator. Confirm it includes implementation, not licence alone. Indicative £10,200–£36,000 by trust size." hint="Used for ROI &amp; payback"/>
              <Field label="Current agency fill rate (%)" value={fillRateNow} min="0" max="100" step={0.5} onChange={v=>setFill(num(v,8))} info="Used for the capacity narrative (agency reliance reduced)."/>
              {showAdv && <Field label="Shift length (hours)" value={shiftHours} min="1" step={0.5} onChange={v=>setSH(num(v,8))}/>}
              {showAdv && <Field label="Bank on-cost (%)" value={oncost} min="0" step={1} onChange={v=>setOncost(num(v))} info="Employer NI + pension where applicable. Affects duty counts only, not the cash headline."/>}
            </div>
            <button className="adv-toggle" onClick={()=>setAdv(a=>!a)}>{showAdv?"Hide":"Show"} advanced inputs (on-costs, shift length)</button>

            <div className="card" style={{marginTop:12}}>
              <label style={{display:"flex",alignItems:"center",gap:8,fontSize:13,fontWeight:600,color:C.navy,cursor:"pointer"}}>
                <input type="checkbox" checked={admin.enabled} onChange={e=>setAdmin(a=>({...a,enabled:e.target.checked}))}/> Include admin time saving in cash (off by default)
                <InfoTip text="Time released for roster managers, bank admins and temp/agency managers via self-booking automation. Time-saved-per-week is always shown; tick to add its cash value to the saving total."/>
              </label>
              <div className="inputs-grid" style={{marginTop:12}}>
                <Field label="Admin / roster managers" value={admin.managers} min="0" onChange={v=>setAdmin(a=>({...a,managers:num(v)}))} info="Roster Managers, Bank Staff Administrators, Temp/Agency Managers."/>
                <Field label="Hours saved / day each" value={admin.hoursPerDay} min="0" step={0.25} onChange={v=>setAdmin(a=>({...a,hoursPerDay:num(v)}))} info="Client suggested 2.5 h/day — that's optimistic (a third of every day). Default is a conservative 1.0; validate locally."/>
                <Field label="Working days / year" value={admin.workingDays} min="0" onChange={v=>setAdmin(a=>({...a,workingDays:num(v)}))}/>
                <Field label="Loaded hourly rate (£)" prefix="£" value={admin.loadedHourly} min="0" onChange={v=>setAdmin(a=>({...a,loadedHourly:num(v)}))}/>
              </div>
            </div>

            <div className="card" style={{marginTop:12}}>
              <label style={{display:"flex",alignItems:"center",gap:8,fontSize:13,fontWeight:600,color:C.navy,cursor:"pointer"}}>
                <input type="checkbox" checked={recruit.enabled} onChange={e=>setRecruit(a=>({...a,enabled:e.target.checked}))}/> Include recovered recruitment / onboarding waste (optional)
                <InfoTip text="Cost of recruiting and onboarding bank workers who then go under-utilised. Smart Match recovers some of it by activating idle capacity. Conservative and off by default."/>
              </label>
              {recruit.enabled && <div className="inputs-grid" style={{marginTop:12}}>
                <Field label="Under-utilised bank workers" value={recruit.workers} min="0" onChange={v=>setRecruit(a=>({...a,workers:num(v)}))}/>
                <Field label="Recruit + onboard cost each (£)" prefix="£" value={recruit.costPerWorker} min="0" step={100} onChange={v=>setRecruit(a=>({...a,costPerWorker:num(v)}))}/>
                <Field label="Share recovered" value={recruit.recoveryRate} min="0" max="1" step={0.05} onChange={v=>setRecruit(a=>({...a,recoveryRate:num(v)}))} info="Fraction of that waste Smart Match recovers (e.g. 0.10 = 10%). Keep conservative."/>
              </div>}
            </div>
          </div>
        </>
        )}

        {/* RESULTS (shared) */}
        <div className="section">
          <div className="step-label"><div className="step-num">{isQuick?2:3}</div><h2>Your potential impact</h2></div>
          <div className="results-box">
            <div className="roi-header">
              <div className="roi-eyebrow">Estimated annual impact — indicative</div>
              <div className="roi-co">
                <div><div className="roi-hero"><AnimMoney v={r.netSaving}/></div><div className="roi-cap">net cash saving / year</div></div>
                <div><div className="roi-hero">{Math.round(tswAnim).toLocaleString(LOCALE)}<small> hrs</small></div><div className="roi-cap">admin time saved / week</div></div>
              </div>
              <div className="roi-sub">
                <span>Payback <b>{r.paybackMonths?r.paybackMonths.toFixed(1)+" mo":"—"}</b></span>
                <span>Gross benefit <b>{fmtK(r.grossBenefit)}</b></span>
                <span>ROI (net) <b>{r.implausibleRoi?"⚠ ":""}{Math.round(r.roiPct).toLocaleString(LOCALE)}%</b></span>
                <span>Agency premium displaced <b>{fmtK(r.totSaving)}</b></span>
              </div>
            </div>

            <div className="summary-grid">
              <div className="s-card hl"><div className="s-lbl">Net annual saving</div><div className="s-val"><AnimMoney v={r.netSaving}/></div><div className="s-sub">after {fmt(platformCost)} platform cost</div></div>
              <div className="s-card"><div className="s-lbl">Agency premium displaced</div><div className="s-val"><AnimMoney v={r.totSaving}/></div><div className="s-sub">the genuine cash saving</div></div>
              <div className="s-card"><div className="s-lbl">Admin saving {(!isQuick&&!admin.enabled)?"(off)":""}</div><div className="s-val"><AnimMoney v={r.adminSaving}/></div><div className="s-sub">{r.adminSaving>0?"modelled, conservative":"tick to include"}</div></div>
              <div className="s-card"><div className="s-lbl">Time saved / week</div><div className="s-val">{Math.round(r.timeSavedWeek).toLocaleString(LOCALE)}<span style={{fontSize:13}}> hrs</span></div><div className="s-sub">across the roster/admin team</div></div>
            </div>

            {r.exceedsSpend && <div className="callout navy"><p className="title">⚠ Check your inputs</p><p>The modelled saving exceeds total agency spend, which isn't possible — lower the premium or displacement, or check the agency-spend figures.</p></div>}

            {!isQuick && <div className="table-wrap"><table>
              <thead><tr><th>Staff group</th><th className="num">Bank pool</th><th className="num">Agency spend</th><th className="num">Duties displaced</th><th className="num">Cash saving</th></tr></thead>
              <tbody>
                {r.rows.map(x=>(<tr key={x.id}><td>{x.role}</td><td className="num">{fmtNum(x.head)}</td><td className="num">{fmt(x.spend)}</td><td className="num">{fmtNum(x.displaced)}</td><td className="num">{fmt(x.saving)}</td></tr>))}
                <tr className="total-row"><td>Total</td><td className="num">{fmtNum(r.totHead)}</td><td className="num">{fmt(r.totSpend)}</td><td className="num">{fmtNum(r.totDisplaced)}</td><td className="num">{fmt(r.totSaving)}</td></tr>
              </tbody></table></div>}

            <div className="panel">
              <div className="panel-title">{isQuick?"Saving by source":"Cash saving by staff group"}</div>
              {isQuick ? (
                [["Agency premium displaced",r.totSaving],["Admin time saving",r.adminSaving],["Recruitment waste recovered",r.recruitSaving]]
                  .filter(x=>x[1]>0).map(([lbl,val],i)=>{ const mx=Math.max(r.totSaving,r.adminSaving,r.recruitSaving,1);
                  return (<div className="bar-row" key={lbl}><div className="blbl">{lbl}</div><div className="btrack"><div className="bfill" style={{width:Math.round((val/mx)*100)+"%",background:RAMP[i%RAMP.length]}}></div></div><div className="bval">{fmt(val)}</div></div>); })
              ) : (
                r.rows.map((x,i)=>(<div className="bar-row" key={x.id}><div className="blbl">{x.role}</div><div className="btrack"><div className="bfill" style={{width:Math.round((x.saving/maxSaving)*100)+"%",background:RAMP[i%RAMP.length]}}></div></div><div className="bval">{fmt(x.saving)}</div></div>))
              )}
            </div>

            <div className="capacity">
              <span className="cap-tag">Capacity — not a cash saving</span>
              <div className="cap-grid">
                <div className="cap-item"><div className="cv"><AnimNum v={r.totDisplaced}/></div><div className="cl">additional temp duties/yr filled by your own bank (off agency)</div></div>
                <div className="cap-item"><div className="cv">{fmtK(r.totCapacityValue)}</div><div className="cl">bank backfill cost to deliver them <b>(spend, not saving)</b></div></div>
                <div className="cap-item"><div className="cv">{r.fillNow?pct(r.fillNow)+" → "+r.fillAfter.toFixed(1)+"%":"—"}</div><div className="cl">illustrative agency reliance reduction</div></div>
              </div>
              <p style={{fontSize:11.5,color:C.textLight,marginTop:".85rem",lineHeight:1.6}}>This is where the old "utilisation uplift" belongs: better utilisation fills more duties and builds resilience, but filling a bank shift is expenditure — only the agency-vs-bank premium above is cash saved.</p>
            </div>

            <div className="callout navy">
              <p className="title">These figures don't capture the full picture.</p>
              <p>They reflect quantifiable cash only. They exclude the wider time-releasing benefits for managers and admin teams, and the staff-experience uplift when bank workers can find and book duties that fit their skills and lives. Those benefits are real but are kept as a separate qualitative story, not added to the ROI number.</p>
            </div>

            <div className="callout quote">
              <p className="quote-txt">"I've just received my first Smart Match duty offer. Clicking the notification took me straight to the shift details and I booked it straight away — so easy. You're not constantly looking on a loop, frightened you'll miss something."</p>
              <p className="quote-by">— Bank staff member, a community trust (Smart Match programme; anonymised)</p>
            </div>

            <div className="assumptions">
              <div className="panel-title">Assumptions &amp; methodology</div>
              <div className="arow"><span>Saving basis</span><span>Agency premium displaced (cash)</span></div>
              <div className="arow explain"><span className="albl">Why not the full shift value? <span className="conf high">CORE</span></span><span className="adesc">Filling a bank shift is expenditure. A trust only saves when a duty that would have been agency is covered by bank instead — the saving is the <b>difference</b> (the premium), not the whole shift. Gross shift value sits under Capacity.</span></div>
              <Method formula={"bank_shift_cost  = (pay / 1957.5) × hours × (1 + on-cost)\nagency_shift_cost= bank_shift_cost × (1 + premium)\ndisplaced_duties = (agency_spend / agency_shift_cost) × displacement\nCASH SAVING      = displaced_duties × bank_shift_cost × premium"}
                your={<>Agency spend {fmt(r.totSpend)} · premium {premium}% · displacement {displacement}% ({st.key}) → <b>{fmt(r.totSaving)}</b>.</>}
                source="Cash saving = agency_spend × displacement × premium/(1+premium); driven by agency spend, premium and displacement — not bank payroll." strength={{c:"high",t:"method"}}/>
              <div className="arow"><span>Time saved / week (co-headline)</span><span>{Math.round(r.timeSavedWeek).toLocaleString(LOCALE)} hours</span></div>
              <div className="arow explain"><span className="albl">Admin model (per manager) <span className="conf low">low</span></span><span className="adesc">managers × hours/day × 5. Cash: × {ADMIN_WORKING_DAYS} working days × loaded rate. Roles: Roster Managers, Bank Staff Administrators, Temp/Agency Managers. Client suggested 2.5 h/day @ £18 — treated as optimistic; default is a conservative 1.0 h/day. Validate locally.</span></div>
              <div className="arow"><span>Agency premium (default, editable)</span><span>20% <span className="contested">contested</span></span></div>
              <div className="arow explain"><span className="albl">Source — premium</span><span className="adesc">~20% average (House of Commons Library CBP-10539, Nov 2025); disputed at shift level — 2026 REC FOI data show bank can cost more than capped agency on some shifts. Most credible on your own rates.</span></div>
              <div className="arow"><span>Displacement stance</span><span>{displacement}% — {st.key}</span></div>
              <div className="arow explain"><span className="albl">Source — displacement <span className="conf low">low</span></span><span className="adesc">Conservative by default. The programme saw agency fill fall 8.1%→6.0% at one community site (26% relative) — the observed upper end, single-site, partly attributable to wider scheduling/engagement changes. Health-economist validation pending.</span></div>
              <div className="arow"><span>Bank-utilisation programme signal</span><span>+17% (one site)</span></div>
              <div className="arow explain"><span className="albl">Source — programme (4 trusts; 2-site data) <span className="conf low">low–mod</span></span><span className="adesc">Utilisation +17% at one community site (170→199 workers); the other reporting site was ~+1.75% (a "13%" figure in the client doc is a known error). Temp duties filled +17% (351→411) / +16%. Self-booking +26% / +15%. Engagement/coverage measures, not payroll uplift — they inform the stance, not the saving. Anonymised pending client sign-off.</span></div>
              <div className="arow"><span>Pay scale</span><span>2025/26 NHS AfC midpoints <span className="conf high">high</span></span></div>
              <div className="arow explain"><span className="albl">Source — pay</span><span className="adesc">NHS Employers 2025/26 (+3.6% from 1 Apr 2025): Band 2 ~£24,465; Band 5 mid ~£34,400; Band 6 mid ~£42,600. Add London HCAS (Inner 20% / Outer 15% / Fringe 5%) where relevant.</span></div>
              <div className="arow"><span>Hourly divisor / shift length</span><span>1,957.5 h/yr · {shiftHours} h</span></div>
              <div className="arow"><span>Platform cost (ROI denominator)</span><span>{fmt(platformCost)}/yr</span></div>
              {r.recruitSaving>0 && <><div className="arow"><span>Recruitment waste recovered (optional)</span><span>{fmt(r.recruitSaving)}</span></div>
              <div className="arow explain"><span className="albl">Source — recruitment <span className="conf low">low</span></span><span className="adesc">under-utilised workers × recruit/onboard cost × recovery share. No strong public benchmark — conservative and clearly optional.</span></div></>}
              <div className="arow explain"><span className="albl">Strategy &amp; framing</span><span className="adesc">Framed against the NHS 10 Year Plan + Workforce Paper and the Staff Health &amp; Wellbeing CQUIN. Pilot is a small (2-site), vendor-collected sample — encouraging but indicative, not solely attributable to Smart Match, and anonymised pending client sign-off.</span></div>
            </div>

            <div className="lead">
              <h4>Want a copy, or to pressure-test these numbers?</h4>
              <p className="sub">Optional — the calculator and PDF are open to everyone. Leave your details and a Smart Match specialist can validate the figures against your trust's own bank and agency rates.</p>
              {lead.sent ? <p style={{color:C.navy,fontWeight:600,fontSize:14}}>Thanks — we'll be in touch. 👋</p> :
              <form onSubmit={submitLead}><div className="lead-grid">
                <input placeholder="Name" value={lead.name} onChange={e=>setLead(l=>({...l,name:e.target.value}))}/>
                <input type="email" required placeholder="Work email" value={lead.email} onChange={e=>setLead(l=>({...l,email:e.target.value}))}/>
                <input placeholder="Trust / organisation" value={lead.org} onChange={e=>setLead(l=>({...l,org:e.target.value}))}/>
                <button className="btn primary" type="submit">Send to a specialist</button>
              </div><p className="consent">By submitting you agree RLDatix may contact you about Smart Match. See the RLDatix privacy notice. (GDPR consent copy to be confirmed.)</p></form>}
            </div>

            <div className="actions">
              <button className="btn primary" onClick={downloadPDF} disabled={pdfBusy}>{pdfBusy?"Generating…":"⬇ Download PDF estimate"}</button>
              <button className="btn" onClick={()=>window.scrollTo({top:0,behavior:"smooth"})}>↑ Adjust inputs</button>
            </div>
          </div>
        </div>
      </main>

      <footer><p>Built by <strong>RLDatix Smart Match</strong> · Cash saving = agency premium displaced (not gross shift value) · 2025/26 NHS AfC pay scales · Figures are <strong>indicative</strong>, conservative and editable — validate with your trust's own rates · Pilot = 2-site data within a 4-trust programme, anonymised pending client sign-off; outcomes vary and are not solely attributable to the platform.</p></footer>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
