<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy:#0F4146; --navy-dark:#0A2F31; --navy-mid:#1A5459; --navy-light:#E8FAF6;
    --teal:#0F4146; --teal-light:#D6F7EE; --teal-mid:#1A8A7A; --seafoam:#34DEC2;
    --mid-grey:#EEF6F4; --border:#D4E0DD; --text:#0F4146; --text-mid:#3D5A5E; --text-light:#5F787C; /* 4.7:1 on white (WCAG AA), matches JS C.textLight */
    --white:#fff; --radius:14px; --radius-sm:8px; --shadow:0 1px 3px rgba(15,65,70,.07),0 8px 28px rgba(15,65,70,.06);
  }
  html { -webkit-text-size-adjust:100%; }
  body { font-family:'DM Sans',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif; background:var(--mid-grey); color:var(--text); line-height:1.6; font-size:15px; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }
  #root { min-height:100vh; }
  .wrap { max-width:900px; margin:0 auto; }

  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  @keyframes barGrow { from{width:0} }
  @keyframes pulseDot { 0%,100%{transform:scaleY(.4);opacity:.5} 50%{transform:scaleY(1);opacity:1} }
  @keyframes calFill { from{width:0} to{width:100%} }

  header { background:var(--navy); color:#fff; padding:3rem 2rem 2.5rem; }
  .logo { font-size:18px; font-weight:500; letter-spacing:.08em; text-transform:uppercase; opacity:.9; margin-bottom:1.25rem; display:flex; align-items:center; flex-wrap:wrap; }
  .logo b { color:var(--seafoam); opacity:1; font-size:22px; letter-spacing:.04em; font-weight:700; }
  .logo .divider { opacity:.3; font-size:14px; margin:0 8px; }
  header h1 { font-family:'DM Serif Display',Georgia,serif; font-size:clamp(2rem,5vw,3rem); font-weight:400; line-height:1.15; margin-bottom:1rem; }
  header h1 em { color:var(--seafoam); font-style:normal; }
  header p { font-size:16px; opacity:.82; max-width:600px; line-height:1.7; }

  .intro-advice { font-size:14.5px; color:var(--text-mid); line-height:1.6; margin-bottom:1.1rem; max-width:640px; }
  .intro-advice strong { color:var(--navy); }
  .strategy { background:var(--navy-light); border-bottom:1px solid var(--border); font-size:12px; color:var(--text-mid); }
  .strategy .wrap { padding:.85rem 2rem; line-height:1.6; }

  main { padding:2rem; }
  .section { margin-bottom:2.5rem; }
  .step-label { display:flex; align-items:center; gap:10px; margin-bottom:1rem; }
  .step-num { width:28px; height:28px; background:var(--teal); color:#fff; border-radius:50%; font-size:13px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .step-label h2 { font-family:'DM Serif Display',Georgia,serif; font-size:1.3rem; font-weight:400; color:var(--navy); }
  .step-sub { font-size:13px; color:var(--text-light); margin:-.4rem 0 1rem 38px; }

  /* MODE TOGGLE */
  .mode-toggle { display:inline-flex; background:var(--navy-light); border:1px solid var(--border); border-radius:999px; padding:4px; margin-bottom:1.5rem; }
  .mode-toggle button { font-family:inherit; font-size:13px; font-weight:600; border:none; background:none; color:var(--text-mid); padding:8px 18px; border-radius:999px; cursor:pointer; transition:.15s; display:flex; flex-direction:column; align-items:center; gap:2px; line-height:1.25; }
  .mode-toggle button.active { background:var(--teal); color:#fff; }
  .mode-toggle button small { font-size:10px; font-weight:500; opacity:.9; } /* .65 fell to ~3:1 on the pill background */
  .mode-toggle button.active small { opacity:.85; }

  .instructions { background:var(--navy-light); border:1px solid #C8D0E0; border-radius:var(--radius); padding:1.5rem; margin-bottom:2rem; }
  .instructions h3 { font-family:'DM Serif Display',Georgia,serif; font-size:1.05rem; font-weight:400; color:var(--navy); margin-bottom:1rem; }
  .inst-steps { display:flex; flex-direction:column; gap:10px; }
  .inst-step { display:flex; gap:12px; align-items:flex-start; }
  .inst-num { width:22px; height:22px; border-radius:50%; background:var(--navy); color:#fff; font-size:11px; font-weight:600; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px; }
  .inst-step p { font-size:13px; color:var(--text-mid); line-height:1.6; }

  .presets { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:1.25rem; }
  .preset { flex:1 1 150px; background:var(--white); border:1px solid var(--border); border-radius:var(--radius); padding:.85rem 1rem; cursor:pointer; transition:.15s; text-align:left; font-family:inherit; }
  .preset:hover { border-color:var(--teal-mid); box-shadow:var(--shadow); }
  .preset.active { border-color:var(--teal); box-shadow:0 0 0 2px rgba(15,118,110,.15); background:var(--teal-light); }
  .preset .pt { font-size:13px; font-weight:600; color:var(--navy); }
  .preset .pd { font-size:11px; color:var(--text-light); margin-top:2px; line-height:1.4; }

  .card { background:var(--white); border:1px solid var(--border); border-radius:var(--radius); padding:1.25rem; margin-bottom:12px; transition:box-shadow .2s; }
  .card:hover { box-shadow:var(--shadow); }
  .groups-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  @media (max-width:760px){ .groups-grid{ grid-template-columns:1fr; } }
  .grp-name { font-size:14px; font-weight:600; color:var(--navy); border:none; background:transparent; font-family:inherit; padding:2px 0; width:100%; min-width:0; border-bottom:1px dashed transparent; }
  .grp-name:hover { border-bottom-color:var(--border); }

  .grp-name:focus-visible { outline:2px solid var(--teal-mid); outline-offset:2px; } /* keyboard users get a real focus ring */
  .grp-remove { border:none; background:none; color:var(--text-light); font-size:20px; line-height:1; cursor:pointer; padding:0 4px; border-radius:6px; flex-shrink:0; }
  .grp-remove:hover:not(:disabled) { color:var(--teal-mid); background:var(--navy-light); }
  .grp-remove:disabled { opacity:.3; cursor:not-allowed; }
  .grp-band { width:100%; border:1px solid var(--border); border-radius:8px; padding:8px 10px; font-family:inherit; font-size:13px; color:var(--navy); background:var(--mid-grey); cursor:pointer; }
  .add-group { background:var(--navy-light); border:1px dashed var(--teal-mid); color:var(--teal-mid); font-family:inherit; font-size:13px; font-weight:600; padding:12px; border-radius:var(--radius); cursor:pointer; width:100%; margin-top:12px; transition:.15s; }
  .add-group:hover { background:var(--teal-light); }
  .stance-btns { display:flex; gap:6px; margin:2px 0 10px; }
  .stance-btn { flex:1; border:1px solid var(--border); background:#fff; border-radius:8px; padding:7px 6px; font-family:inherit; font-size:12px; font-weight:700; color:var(--text-mid); cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:1px; transition:.15s; }
  .stance-btn small { font-weight:600; font-size:10px; opacity:.9; } /* .7 fell to ~3.5:1 on white */
  .stance-btn:hover { border-color:var(--teal-mid); }
  .stance-btn.active { background:var(--navy); border-color:var(--navy); color:#fff; }
  .staff-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; flex-wrap:wrap; gap:8px; }
  .staff-title { display:flex; align-items:center; gap:10px; }
  .band-pill { font-size:11px; font-weight:600; padding:3px 9px; border-radius:20px; }
  .staff-name { font-size:14px; font-weight:600; color:var(--navy); }
  .saving-badge { font-size:13px; font-weight:600; padding:4px 12px; border-radius:var(--radius-sm); background:var(--navy-light); color:var(--navy); }
  .saving-badge-sub { font-size:10px; color:var(--text-light); margin-top:4px; line-height:1.4; text-align:right; max-width:210px; }
  .inputs-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; }
  .field { display:flex; flex-direction:column; gap:5px; }
  .field label { font-size:12px; color:var(--text-light); display:flex; align-items:center; gap:5px; }
  .flabel { display:flex; align-items:center; gap:5px; font-size:12px; color:var(--text-light); } /* label + InfoTip side by side; the tip sits OUTSIDE the label so its text never joins the control's accessible name */
  .field input[type=number] { border:1px solid var(--border); border-radius:var(--radius-sm); padding:8px 10px; font-family:inherit; font-size:14px; color:var(--navy); background:var(--mid-grey); width:100%; transition:border-color .15s,box-shadow .15s; }
  .field input[type=number]:focus { outline:none; border-color:var(--teal); box-shadow:0 0 0 3px rgba(15,118,110,.12); background:#fff; }
  .hint { font-size:11px; color:var(--text-light); line-height:1.5; }
  .adv-toggle { background:none; border:none; color:var(--navy-mid); font-family:inherit; font-size:12px; font-weight:600; cursor:pointer; padding:6px 0 0; text-decoration:underline; }

  /* QUICK WIZARD: step indicator, nav, yes/no */
  .qsteps { display:flex; gap:6px; margin-bottom:1.5rem; }
  .qstep { flex:1; text-align:center; font-family:inherit; font-size:11.5px; font-weight:600; color:var(--text-light); background:none; border:none; border-top:3px solid var(--border); padding:9px 4px 0; cursor:pointer; line-height:1.35; transition:.15s; }
  .qstep .qn { display:block; font-size:10px; font-weight:700; opacity:.7; margin-bottom:1px; }
  .qstep:hover { color:var(--navy-mid); }
  .qstep.done { color:var(--teal-mid); border-top-color:var(--teal-mid); }
  .qstep.active { color:var(--navy); border-top-color:var(--teal); }
  .qnav { display:flex; align-items:center; gap:10px; margin-top:1.5rem; }
  .skip-link { background:none; border:none; color:var(--text-light); font-family:inherit; font-size:12.5px; font-weight:600; cursor:pointer; padding:6px 2px; text-decoration:underline; }
  .skip-link:hover { color:var(--navy-mid); }
  .yesno { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  @media (max-width:520px){ .yesno{ grid-template-columns:1fr; } }
  .yn { text-align:left; font-family:inherit; background:var(--white); border:1px solid var(--border); border-radius:var(--radius); padding:1rem 1.1rem; cursor:pointer; font-size:14px; font-weight:600; color:var(--navy); transition:.15s; }
  .yn small { display:block; font-size:11.5px; font-weight:400; color:var(--text-light); margin-top:4px; line-height:1.5; }
  .yn:hover { border-color:var(--teal-mid); }
  .yn.active { border-color:var(--teal); box-shadow:0 0 0 2px rgba(15,118,110,.15); background:var(--teal-light); }
  .yn.active small { color:var(--text-mid); }

  .params-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; background:var(--white); border:1px solid var(--border); border-radius:var(--radius); padding:1.25rem; }
  @media (max-width:620px){ .params-grid{ grid-template-columns:1fr; } }
  .slider-ctx { display:flex; justify-content:space-between; font-size:11px; color:var(--text-light); margin-top:4px; }
  input[type=range] { width:100%; accent-color:var(--teal); margin-top:8px; height:6px; }
  /* Quick-mode slider control: slider + tap-to-type value readout (mobile-friendly) */
  .sfld { padding:12px 0; }
  .sfld + .sfld { border-top:1px solid var(--border); }
  .sfld-head { display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .sfld-val { display:inline-flex; align-items:baseline; font-size:19px; font-weight:700; color:var(--navy); white-space:nowrap; }
  .sfld-val input { font:inherit; color:inherit; text-align:right; border:none; background:transparent; padding:2px 0; min-width:1ch; -moz-appearance:textfield; }
  .sfld-val input::-webkit-outer-spin-button, .sfld-val input::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
  .sfld-val input:focus { outline:none; box-shadow:inset 0 -2px 0 var(--teal-mid); }
  .sfld > input[type=range] { margin-top:12px; height:8px; }   /* taller track = easier to grab on touch */
  .disp-note { margin-top:12px; font-size:12px; border-radius:var(--radius-sm); padding:9px 13px; line-height:1.5; }
  .contested { display:inline-block; font-size:10px; font-weight:600; color:var(--teal); background:var(--teal-light); padding:1px 7px; border-radius:10px; margin-left:6px; vertical-align:middle; }

  .results-box { background:var(--white); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); }
  .roi-header { background:var(--navy); color:#fff; padding:1.5rem; }
  .roi-eyebrow { font-size:11px; text-transform:uppercase; letter-spacing:.1em; opacity:.7; margin-bottom:.75rem; }
  .roi-co { display:flex; gap:2.5rem; flex-wrap:wrap; }
  .roi-hero { font-family:'DM Serif Display',Georgia,serif; font-size:clamp(2.1rem,6vw,3.2rem); line-height:1; }
  .roi-hero small { font-size:1rem; opacity:.7; font-family:'DM Sans',sans-serif; }
  .roi-cap { font-size:12px; opacity:.75; margin-top:.4rem; }
  .roi-desc { font-size:12px; opacity:.72; margin-top:.4rem; line-height:1.5; max-width:300px; }
  .roi-sub { font-size:13px; opacity:.85; margin-top:1rem; padding-top:1rem; border-top:1px solid rgba(255,255,255,.15); display:flex; gap:1.5rem; flex-wrap:wrap; }
  .roi-sub b { color:var(--seafoam); }

  .summary-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); border-bottom:1px solid var(--border); }
  .s-card { padding:1.1rem 1.25rem; border-right:1px solid var(--border); border-bottom:1px solid var(--border); }
  .s-card.hl { background:var(--navy-light); }
  .s-lbl { font-size:11px; color:var(--text-light); margin-bottom:4px; display:flex; align-items:center; gap:5px; }
  .s-card.hl .s-lbl { color:var(--navy-mid); }
  .s-val { font-size:20px; font-weight:700; color:var(--text); }
  .s-card.hl .s-val { color:var(--navy); }
  .s-sub { font-size:11px; color:var(--text-light); margin-top:3px; line-height:1.4; }

  .table-wrap { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; font-weight:600; font-size:11px; color:var(--text-light); padding:10px 14px; border-bottom:1px solid var(--border); white-space:nowrap; }
  td { padding:10px 14px; border-bottom:1px solid var(--border); color:var(--text); }
  .num { text-align:right; font-variant-numeric:tabular-nums; }
  tr.total-row td { background:var(--navy-light); font-weight:700; color:var(--navy); border-bottom:none; }

  .panel { padding:1.25rem 1.5rem; border-top:1px solid var(--border); }
  .panel-title { font-size:11px; font-weight:600; color:var(--text-light); margin-bottom:1rem; text-transform:uppercase; letter-spacing:.08em; }
  .bar-row { display:flex; align-items:flex-start; gap:12px; margin-bottom:12px; }
  .blbl { font-size:12px; color:var(--text-mid); width:190px; flex-shrink:0; }
  .btrack { flex:1; height:8px; background:var(--mid-grey); border-radius:4px; overflow:hidden; margin-top:4px; }
  .bfill { height:100%; border-radius:4px; animation:barGrow .6s cubic-bezier(.16,1,.3,1); transition:width .4s ease; }
  .bval { font-size:12px; font-weight:600; color:var(--navy); width:110px; text-align:right; font-variant-numeric:tabular-nums; }

  .capacity { padding:1.25rem 1.5rem; border-top:1px solid var(--border); background:repeating-linear-gradient(135deg,#F4FBF9,#F4FBF9 10px,#E9F6F2 10px,#E9F6F2 20px); }
  .cap-tag { display:inline-block; font-size:10px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--navy-mid); background:var(--navy-light); padding:2px 8px; border-radius:10px; margin-bottom:.75rem; }
  .cap-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:1rem; }
  .cap-item .cv { font-size:22px; font-weight:700; color:var(--navy); }
  .cap-item .cl { font-size:12px; color:var(--text-mid); margin-top:2px; line-height:1.4; }

  .callout { margin:1.25rem 1.5rem; padding:1.1rem 1.25rem; border-radius:var(--radius-sm); }
  .callout.navy { background:var(--navy-light); border-left:4px solid var(--teal); }
  .callout.quote { background:#fff; border:1px solid var(--border); }
  .callout p { font-size:13px; color:var(--text-mid); line-height:1.6; }
  .callout .title { font-size:13px; font-weight:700; color:var(--navy); margin-bottom:.4rem; }
  .quote-txt { font-size:14px; color:var(--navy); line-height:1.7; font-style:italic; margin-bottom:.6rem; }
  .quote-by { font-size:12px; color:var(--text-light); font-weight:600; }

  .assumptions { padding:1.25rem 1.5rem; border-top:1px solid var(--border); }
  .arow { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--border); font-size:12px; color:var(--text-mid); gap:1rem; }

  .arow > span:last-child { font-weight:600; color:var(--navy); text-align:right; white-space:nowrap; }
  .arow.explain { flex-direction:column; gap:3px; }
  .arow.explain .albl { font-weight:600; color:var(--navy); font-size:12px; display:flex; align-items:center; gap:6px; }
  .arow.explain .adesc { font-size:11px; color:var(--text-light); line-height:1.5; text-align:left; font-weight:400; white-space:normal; }
  .conf { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; padding:1px 6px; border-radius:8px; }

  .conf.low { background:var(--teal-light); color:var(--teal); }
  details.method { border:1px solid var(--border); border-radius:var(--radius-sm); margin-top:.5rem; }

  details.method > summary::-webkit-details-marker { display:none; }
  details.method > summary::before { content:'▸ '; }
  details.method[open] > summary::before { content:'▾ '; }
  details.method .mbody { padding:0 12px 12px; font-size:12px; color:var(--text-mid); line-height:1.6; }
  code.formula { display:block; background:var(--navy-dark); color:#cfe; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:11.5px; padding:8px 10px; border-radius:6px; margin:6px 0; white-space:pre-wrap; }

  .actions { display:flex; gap:10px; flex-wrap:wrap; padding:1.25rem 1.5rem; border-top:1px solid var(--border); }
  .btn { font-family:inherit; font-size:14px; font-weight:600; padding:11px 20px; border-radius:var(--radius-sm); cursor:pointer; border:1px solid var(--border); background:#fff; color:var(--navy); transition:.15s; }
  .btn:hover { box-shadow:var(--shadow); }
  .btn.primary { background:var(--teal); color:#fff; border-color:var(--teal); }
  .btn.primary:hover { background:var(--teal-mid); }
  .btn:disabled { opacity:.6; cursor:wait; }

  .lead { margin:1.25rem 1.5rem; padding:1.25rem; border:1px dashed var(--border); border-radius:var(--radius); background:#fcfdff; }
  .lead h4 { font-family:'DM Serif Display',Georgia,serif; font-weight:400; color:var(--navy); font-size:1.05rem; margin-bottom:.25rem; }
  .lead p.sub { font-size:12px; color:var(--text-light); margin-bottom:.85rem; }
  .lead-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  @media (max-width:560px){ .lead-grid{ grid-template-columns:1fr; } }
  .lead input { border:1px solid var(--border); border-radius:var(--radius-sm); padding:9px 11px; font-family:inherit; font-size:14px; width:100%; background:#fff; }
  .lead input:focus { outline:none; border-color:var(--teal); }

function useCountUp(target, ms=900){
  const [v,setV]=useState(target); const prev=useRef(target); const raf=useRef();
  useEffect(()=>{ if(REDUCE_MOTION){ prev.current=target; setV(target); return; }
    const from=prev.current,to=target,start=performance.now(); cancelAnimationFrame(raf.current);
    const tick=now=>{ const t=Math.min(1,(now-start)/ms),e=1-Math.pow(1-t,3); setV(from+(to-from)*e); if(t<1)raf.current=requestAnimationFrame(tick); else prev.current=to; };
    raf.current=requestAnimationFrame(tick); return ()=>cancelAnimationFrame(raf.current); },[target,ms]);
  return v;
}

/* Numeric input. Live-updates the model on every parseable keystroke, but keeps its
   own text while focused so a cleared or part-typed field ("", "12.") no longer
   snaps to 0 or a fallback mid-edit; blur clamps to min/max and restores the last
   good value if left empty. External changes (presets, band auto-fill, mode sync)
   resync the text whenever the field isn't focused. */
function Field({label, value, onChange, min, max, step=1, prefix, info, hint}){
  const id="f_"+useId();   // labels repeat across staff-group cards, so a label-derived id duplicated
  const [txt,setTxt]=useState(String(value));
  const focused=useRef(false);
  useEffect(()=>{ if(!focused.current) setTxt(String(value)); },[value]);
  const change=t=>{ setTxt(t); if(t.trim()!=="" && !isNaN(parseFloat(t))) onChange(t); };
  const blur=()=>{ focused.current=false;
    let n = (txt.trim()===""||isNaN(parseFloat(txt))) ? num(value) : num(txt);
    if(min!=null&&min!=="") n=Math.max(Number(min),n); if(max!=null&&max!=="") n=Math.min(Number(max),n);
    setTxt(String(n)); onChange(String(n)); };
  return (<div className="field">
    <span className="flabel"><label htmlFor={id}>{label}</label>{info && <InfoTip text={info}/>}</span>
    <div style={{position:"relative",display:"flex",alignItems:"center"}}>
      {prefix && <span style={{position:"absolute",left:10,color:C.textLight,fontSize:14}}>{prefix}</span>}
      <input id={id} type="number" value={txt} min={min} max={max} step={step} style={prefix?{paddingLeft:22}:null}
        onFocus={()=>{focused.current=true;}} onChange={e=>change(e.target.value)} onBlur={blur} />
    </div>
    {hint && <span className="hint">{hint}</span>}
  </div>);
}
/* Slider control with a tap-to-type value readout. Easier than a bare number box on
   mobile (big target, no fiddly cursor), but still precise: the large readout is an
   editable field and num() parses pasted "£4,294,000". The slider is coarse/touch;
   the readout is exact. Used for the Quick-estimate inputs. */
function SliderField({label, value, onChange, min=0, max=100, step=1, prefix, suffix, format, info, hint}){
  const id="sl_"+useId();
  const fmt=v=>format?format(num(v)):String(Math.round(num(v)));
  const [txt,setTxt]=useState(fmt(value));
  const editing=useRef(false);
  useEffect(()=>{ if(!editing.current) setTxt(fmt(value)); },[value]);   // resync when value changes externally (e.g. auto-estimate)
  const commit=()=>{ editing.current=false; let n=num(txt); if(n<Number(min))n=Number(min); setTxt(fmt(n)); onChange(n); };
  const typeVal=t=>{ setTxt(t); if(t.trim()!=="" && !isNaN(parseFloat(String(t).replace(/[^0-9.\-]/g,"")))) onChange(num(t)); };
  const slide=v=>{ const n=num(v); editing.current=false; setTxt(fmt(n)); onChange(n); };
  const sv=Math.max(Number(min),Math.min(Number(max),num(value)));   // clamp for the slider track only; the readout may exceed max
  return (<div className="sfld">
    <div className="sfld-head">
      <span className="flabel"><label htmlFor={id}>{label}</label>{info && <InfoTip text={info}/>}</span>
      <span className="sfld-val">{prefix}<input id={id} type="text" inputMode="decimal" value={txt} style={{width:Math.max(2,String(txt).length)+"ch"}}
        onFocus={()=>{editing.current=true;}} onChange={e=>typeVal(e.target.value)} onBlur={commit} onKeyDown={e=>{ if(e.key==="Enter") e.target.blur(); }}/>{suffix}</span>
    </div>
    <input type="range" min={min} max={max} step={step} value={sv} onChange={e=>slide(e.target.value)} aria-label={label}/>
    {hint && <span className="hint">{hint}</span>}
  </div>);
}
/* Size headline input: commits on blur / Enter (not per keystroke) so typing a
   new total does not progressively rescale and collapse the staff-group mix.
   allowZero: optional totals (turnover) can be cleared back to 0 to opt out;
   a zero displays as an empty field. Headcount/spend keep the >0 guard. */
function SizeField({label, value, prefix, hint, info, onCommit, allowZero}){
  const show=v=>(allowZero && !(num(v)>0)) ? "" : String(v);
  const [txt,setTxt]=useState(show(value));
  const focused=useRef(false);
  useEffect(()=>{ if(!focused.current) setTxt(show(value)); },[value]);
  const commit=()=>{ focused.current=false; const n=num(txt);
    if(n>0 || (allowZero && n===0)){ onCommit(n); setTxt(show(n)); } else setTxt(show(value)); };
  const id="sf_"+useId();
  return (<div className="field">
    <span className="flabel"><label htmlFor={id}>{label}</label>{info && <InfoTip text={info}/>}</span>
    <div style={{position:"relative",display:"flex",alignItems:"center"}}>
      {prefix && <span style={{position:"absolute",left:10,color:C.textLight,fontSize:14}}>{prefix}</span>}
      <input id={id} type="number" value={txt} min="0" style={prefix?{paddingLeft:22}:null}
        onFocus={()=>{focused.current=true;}} onChange={e=>setTxt(e.target.value)} onBlur={commit} onKeyDown={e=>{ if(e.key==="Enter") e.target.blur(); }} />
    </div>
    {hint && <span className="hint">{hint}</span>}
  </div>);
}

            {quickStep===1 && <>
            <div className="step-label"><div className="step-num">2</div><h2>Include admin time saving?</h2></div>

            <div className="card">
              <div className="yesno">
                <button type="button" className={"yn"+(simple.includeAdmin!==true?" active":"")} onClick={()=>setSimple(s=>({...s,includeAdmin:false}))}>No, show the hours only<small>Recommended. Keeps the headline to hard agency cash savings; the hours released are still shown on their own.</small></button>
                <button type="button" className={"yn"+(simple.includeAdmin===true?" active":"")} onClick={()=>setSimple(s=>({...s,includeAdmin:true}))}>Yes, add the £ value too<small>Adds a conservative 1.0 h/day at a loaded £18/h across your team to the cash saving.</small></button>
              </div>
            </div>
            </>}

            {quickStep===2 && <>
            <div className="step-label"><div className="step-num">3</div><h2>Confidence level</h2></div>
            <p className="step-sub">How much of today's agency work do you expect to move onto your own bank? Public/self-serve defaults to Conservative.</p>
            <div className="params-grid">
              <div className="field">

                <div className="stance-btns">{[["Conservative",13],["Moderate",26],["Optimistic",50]].map(([lbl,v])=>(<button key={v} type="button" className={"stance-btn"+(displacement===v?" active":"")} onClick={()=>setDisp(v)}>{lbl}<small>{v}%</small></button>))}</div>
                <input type="range" min="8" max="50" step="1" value={displacement} onChange={e=>setDisp(num(e.target.value))} aria-label="Confidence level, percent" aria-valuetext={displacement+"%, "+st.key}/>

              </div>
              <div style={{alignSelf:"center"}}><div className="disp-note" style={{marginTop:0,background:st.bg,color:st.color}}>{st.note}</div></div>
            </div>
            </>}

            {quickStep===3 && <>
            <div className="step-label"><div className="step-num">4</div><h2>Check the defaults</h2></div>
            <p className="step-sub">Conservative, sourced defaults, leave them as they are, or adjust to your organisation's own rates, then calculate.</p>
            <div className="params-grid">
              <Field label="Agency premium over bank (%)" value={premium} min="0" max="150" step={1} onChange={v=>setPremium(num(v))} info="Default 20% (HoC Library average); contested at shift level, use your own rate." />
              <Field label="BankStaff+ licence fee (£/yr)" prefix="£" value={platformCost} min="0" step={1000} onChange={v=>{ setPC(num(v)); setPcAuto(false); }} info="Auto-set from your bank size using G-Cloud pricing (ex VAT); fully editable. This is the ROI denominator: licence only (ex VAT); add implementation and change costs if material for your business case."/>
              <Field label="Shift length (hours)" value={shiftHours} min="1" step={0.5} onChange={v=>setSH(num(v))}/>

            <div className="qnav">
              {quickStep>0 && <button type="button" className="btn" onClick={()=>setQuickStep(s=>Math.max(0,s-1))}>← Back</button>}
              <div style={{flex:1}}/>
              {quickStep<3 && <button type="button" className="skip-link" onClick={runCalc} title="Calculate now with these values and the default assumptions">Skip to results</button>}
              {quickStep<3
                ? <button type="button" className="btn primary" onClick={()=>setQuickStep(s=>Math.min(3,s+1))}>Next →</button>

          </div>
        ) : (
        <>
          <div className="instructions">
            <h3>How to use the detailed calculator</h3>
            <div className="inst-steps">
              <div className="inst-step"><div className="inst-num">1</div><p><strong>Pick your organisation type, or build your own.</strong> Set each group's headcount, <strong>annual agency spend</strong> (the anchor for the saving) and pay; add or remove staff groups as needed.</p></div>

              <div className="inst-step"><div className="inst-num">3</div><p><strong>Read the co-headlines:</strong> net annual cash saving and admin time saved per week, with payback. Capacity (temp duties filled) is shown separately and excluded from the saving.</p></div>
            </div>
          </div>
          <div className="section">
            <div className="step-label"><div className="step-num">1</div><h2>Your organisation profile</h2></div>
            <p className="step-sub">Pick the closest profile, set your size, then fine-tune each staff group. Agency spend is the anchor for the saving, so get that right first.</p>
            <div className="presets">{Object.entries(ORG_TYPES).map(([k,p])=>(
              <button key={k} className={"preset"+(preset===k?" active":"")} onClick={()=>choosePreset(k)}><div className="pt">{p.label}</div><div className="pd">{p.desc}</div></button>))}

            {groups.map((g,i)=>(
              <div className="card" key={g.id}>
                <div className="staff-header">

                  <button type="button" className="grp-remove" title="Remove this group" onClick={()=>removeGroup(i)} disabled={groups.length<=1}>×</button>
                </div>
                <div className="saving-badge" style={{display:"inline-block",marginBottom:12}}>{fmt(r.rows[i]?r.rows[i].saving:0)} / yr <span style={{fontWeight:400,opacity:.75}}>· premium displaced</span></div>
                <div className="inputs-grid">
                  <Field label="Bank headcount" value={g.headcount} min="0" onChange={v=>setG(i,"headcount",v)}/>
                  <Field label="Annual agency spend" prefix="£" value={g.agencySpend} min="0" step={50000} onChange={v=>setG(i,"agencySpend",v)} info="Yearly agency spend for this group, the anchor for the saving." hint="The anchor for the saving"/>
                  <Field label="Bank pay (£/yr)" value={g.bankPay} min="0" step={500} onChange={v=>setG(i,"bankPay",v)} info="Actual bank rate preferred; or pick an AfC band below (2026/27 midpoints). Pay sets this group's duty counts and capacity value, the cash saving is anchored to agency spend and premium, so it does not change with pay."/>
                  <div className="field"><label>AfC band: auto-fills pay</label><select className="grp-band" aria-label="AfC band (auto-fills pay)" value={AFC_BANDS.some(x=>x[1]===g.bankPay)?g.bankPay:""} onChange={e=>{const val=e.target.value; if(val){const bd=AFC_BANDS.find(x=>String(x[1])===val); setG(i,"bankPay",num(val)); if(bd) setG(i,"band",bd[0]);}}}><option value="">Custom / typed</option>{AFC_BANDS.map(([lbl,val])=>(<option key={lbl} value={val}>{lbl} · £{val.toLocaleString("en-GB")}</option>))}</select></div>
                  {perGroupPremium && <Field label="Agency premium (%)" value={g.premium!=null?g.premium:premium} min="0" max="150" step={1} onChange={v=>setG(i,"premium",v)} info="This group's agency-over-bank premium. Defaults to the global premium; raise it for hard-to-fill groups (e.g. medics) where you have organisation-specific evidence."/>}
                </div>
              </div>
            ))}
            </div>
            <button type="button" className="add-group" onClick={addGroup}>+ Add a staff group</button>
          </div>
          <div className="section">
            <div className="step-label"><div className="step-num">2</div><h2>Agency parameters</h2></div>

              <div>
                <Field label={perGroupPremium?"Default agency premium (%)":"Agency premium over bank (%)"} value={premium} min="0" max="150" step={1} onChange={v=>setPremium(num(v))} info="A single agency-over-bank premium (~20%, reflecting figures cited in House of Commons Library research). Contested at shift level; REC data show NHS bank can cost more than capped agency in hard-to-fill roles. Use your organisation's actual rate where possible; applies across all groups unless you override per group." hint={perGroupPremium?"Default for any group you don't override below":"Default 20% · cited in House of Commons Library research · editable · contested"}/>
                <div style={{display:"flex",alignItems:"center",gap:7,marginTop:8}}><label style={{display:"flex",alignItems:"center",gap:7,fontSize:12,fontWeight:600,color:C.navy,cursor:"pointer"}}><input type="checkbox" checked={perGroupPremium} onChange={e=>setPGP(e.target.checked)}/> Set the agency premium per staff group</label> <InfoTip text="Off by default, one ~20% premium across all groups (the defensible business-case default). Tick to override the premium per column, e.g. higher for medics, where you have organisation-specific agency rates."/></div>
              </div>
              <div className="field">
                <span className="flabel">Confidence level: {displacement}% · {st.key} <InfoTip text="Share of your baseline agency usage that improved bank utilisation moves to bank, applied to the displaceable share only (default 80%, so Moderate 26% ≈ 21% of all agency). Driven by a Smart Match pilot study: agency fill 8.1%→6.0% at one community site (26% relative). Single-site and partly attributable; the commercial variant can show the Moderate case with a rep to frame the caveats."/></span>
                <div className="stance-btns">{[["Conservative",13],["Moderate",26],["Optimistic",50]].map(([lbl,v])=>(<button key={v} type="button" className={"stance-btn"+(displacement===v?" active":"")} onClick={()=>setDisp(v)}>{lbl}<small>{v}%</small></button>))}</div>
                <input type="range" min="8" max="50" step="1" value={displacement} onChange={e=>setDisp(num(e.target.value))} aria-label="Confidence level, percent" aria-valuetext={displacement+"%, "+st.key}/>
                <div className="slider-ctx"><span>8% conservative</span><span>26% moderate</span><span>50% optimistic</span></div>
              </div>
            </div>
            <div className="disp-note" style={{background:st.bg,color:st.color}}>{st.note}</div>
            <div className="params-grid" style={{marginTop:12}}>
              <Field label="BankStaff+ licence fee (£/yr)" prefix="£" value={platformCost} min="0" step={1000} onChange={v=>{ setPC(num(v)); setPcAuto(false); }} info="Auto-set from your bank size using G-Cloud pricing (ex VAT); fully editable. This is the ROI denominator: licence only (ex VAT); add implementation and change costs if material for your business case." hint={pcAuto?"Auto-scaled to your size · editable":"Used for ROI & payback"}/>
              <Field label="Current agency fill rate (%)" value={fillRateNow} min="0" max="100" step={0.5} onChange={v=>setFill(num(v))} info="Used for the capacity narrative (agency reliance reduced)."/>
              <Field label="Displaceable share of agency (%)" value={Math.round(displaceableShare*100)} min="0" max="100" step={5} onChange={v=>setDS(Math.min(1,Math.max(0,num(v)/100)))} info="Only part of agency spend can realistically move to bank: excludes break-glass / safety-critical cover and hard-to-fill specialist roles bank can't cover. Displacement is applied to this share only (benchmark default 80%), so the tool never implies 100% of agency is bankable." hint="Benchmark default 80% · editable"/>
              {showAdv && <Field label="Shift length (hours)" value={shiftHours} min="1" step={0.5} onChange={v=>setSH(num(v))}/>}
              {showAdv && <Field label="Bank on-cost (%)" value={oncost} min="0" step={1} onChange={v=>setOncost(num(v))} info="Already included in the bank rate (default 20%, employer NI + pension, below the full ~30% NHS employer rate because bank-only workers often opt out of the pension; set your local loaded rate). It changes modelled duty counts, not the cash headline."/>}
            </div>
            <button className="adv-toggle" onClick={()=>setAdv(a=>!a)}>{showAdv?"Hide":"Show"} advanced inputs (on-costs, shift length)</button>

            <div className="card" style={{marginTop:12}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <label style={{display:"flex",alignItems:"center",gap:8,fontSize:13,fontWeight:600,color:C.navy,cursor:"pointer"}}>
                  <input type="checkbox" checked={admin.enabled} onChange={e=>setAdmin(a=>({...a,enabled:e.target.checked}))}/> Include admin time saving in cash (off by default)
                </label>
                <InfoTip text="Off by default, treated as a secondary recommendation. Time released for your temporary staffing team: bank/temp coordinators, officers and administrators, via self-booking automation. Time-saved-per-week is always shown; tick to add its cash value to the saving total."/>
              </div>
              <div className="inputs-grid" style={{marginTop:12}}>
                <Field label="Temporary staffing team" value={admin.managers} min="0" onChange={v=>setAdmin(a=>({...a,managers:num(v)}))} info="Your temporary staffing team: bank/temp coordinators, officers and administrators."/>
                <Field label="Hours saved / day each" value={admin.hoursPerDay} min="0" step={0.25} onChange={v=>setAdmin(a=>({...a,hoursPerDay:num(v)}))} info="Some teams report up to 2.5 h/day, that's optimistic (a third of every day). Default is a conservative 1.0; validate locally."/>
                <Field label="Working days / year" value={admin.workingDays} min="0" onChange={v=>setAdmin(a=>({...a,workingDays:num(v)}))}/>
                <Field label="Loaded hourly rate (£)" prefix="£" value={admin.loadedHourly} min="0" onChange={v=>setAdmin(a=>({...a,loadedHourly:num(v)}))}/>
              </div>
            </div>

            <div className="card" style={{marginTop:12}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <label style={{display:"flex",alignItems:"center",gap:8,fontSize:13,fontWeight:600,color:C.navy,cursor:"pointer"}}>
                  <input type="checkbox" checked={recruit.enabled} onChange={e=>setRecruit(a=>({...a,enabled:e.target.checked}))}/> Include avoided re-recruitment cost (optional)
                </label>
                <InfoTip text="Under-utilised bank workers lapse and must be replaced. Activating idle capacity avoids part of that future re-recruitment and onboarding cost (already-spent recruitment cost is sunk and is not counted). Conservative and off by default."/>
              </div>

                <Field label="Under-utilised bank workers" value={recruit.workers} min="0" onChange={v=>setRecruit(a=>({...a,workers:num(v)}))}/>
                <Field label="Recruit + onboard cost each (£)" prefix="£" value={recruit.costPerWorker} min="0" step={100} onChange={v=>setRecruit(a=>({...a,costPerWorker:num(v)}))}/>
                <Field label="Share avoided" value={recruit.recoveryRate} min="0" max="1" step={0.05} onChange={v=>setRecruit(a=>({...a,recoveryRate:num(v)}))} info="Fraction of that future re-recruitment cost avoided (e.g. 0.10 = 10%). Keep conservative."/>
              </div>}
            </div>
          </div>
        </>
        )}

        {/* RESULTS (shared). Quick mode has its own Calculate on the wizard's last step. */}
        {!calculated && !isQuick && (
          <div className="section" style={{textAlign:"center",padding:"1.5rem 0 0"}}>
            <button className="btn primary" style={{fontSize:16,padding:"14px 34px"}} onClick={runCalc}>Calculate my savings →</button>
            <p className="step-sub" style={{margin:"12px 0 0"}}>We'll model your bank pool and agency exposure, then adjust anything and the report updates live.</p>
          </div>
        )}
        {calculated && (
        <div className="section" id="results">
          <p className="sr-only" role="status">Results ready. Your estimated annual impact is shown below and updates live as you adjust inputs.</p>

          <div className="results-box">
            <div className="roi-header">
              <div className="roi-eyebrow">Estimated annual impact (indicative)</div>
              <div className="roi-co">
                {noNet ? (
                <div><div className="roi-hero"><AnimNum v={r.totDisplaced}/><small> shifts</small></div><div className="roi-cap">Shifts you could move off agency each year</div><div className="roi-desc" style={{marginTop:6}}>At this size the value is <b>released capacity and staff time</b> rather than net cash: the {fmtK(r.totSaving)} agency premium you'd displace is below the {fmt(platformCost)}/yr licence. The cash case builds as your bank grows, at higher agency reliance, or once you enter your trust's actual agency spend.</div></div>
                ) : (
                <div><div className="roi-hero"><AnimMoney v={r.netSaving}/></div><div className="roi-cap">Potential annual cash saving</div><div className="roi-desc">What you could save each year by filling more shifts from your bank instead of agency, the agency premium you stop paying.</div></div>
                )}
                <div><div className="roi-hero">{Math.round(tswAnim).toLocaleString(LOCALE)}<small> hrs</small></div><div className="roi-cap">Administrative time released per week</div><div className="roi-desc">Time your temporary staffing team gets back each week as Smart Match automates shift booking and matching, scaled to your team's size.</div></div>
              </div>
              <div className="roi-sub">
                <span>Payback <b>{noNet?"n/a":fmtDays(r.paybackMonths)}</b></span>
                <span>Gross benefit <b>{fmtK(r.grossBenefit)}</b></span>
                <span>Return on licence fee <b>{noNet?"n/a":<>{r.implausibleRoi?"⚠ ":""}{fmtMult(r.roiMultiple)}</>}</b></span>
                <span>Agency premium avoided <b>{fmtK(r.totSaving)}</b></span>
              </div>
              {!noNet && r.roiMultiple>=5 && <p style={{fontSize:11,opacity:.7,marginTop:".6rem",lineHeight:1.5,maxWidth:560}}>The return multiple is measured against the {fmt(platformCost)}/yr licence fee alone, a small figure next to your agency book, so it reads large. <b>Payback ({fmtDays(r.paybackMonths)}) is the more grounded number</b>, and the licence is the only cost in it; add implementation/change costs for a full business case.</p>}
            </div>

            <div className="summary-grid">
              <div className="s-card hl"><div className="s-lbl">Net annual saving</div><div className="s-val">{noNet?"n/a":<AnimMoney v={r.netSaving}/>}</div><div className="s-sub">{noNet?"licence fee exceeds the modelled premium":<>after {fmt(platformCost)} licence fee</>}</div></div>
              <div className="s-card"><div className="s-lbl">Agency premium avoided</div><div className="s-val"><AnimMoney v={r.totSaving}/></div><div className="s-sub">agency vs bank gap, before licence</div></div>
              {r.adminSaving>0 && (()=>{ const aM=isQuick?num(simple.numManagers):num(admin.managers), aH=isQuick?ADMIN_HRS_PER_DAY_DEFAULT:num(admin.hoursPerDay), aD=isQuick?ADMIN_WORKING_DAYS:num(admin.workingDays), aR=isQuick?ADMIN_LOADED_HOURLY:num(admin.loadedHourly);
                return <div className="s-card"><div className="s-lbl">Admin saving <InfoTip text={aM+" "+(aM===1?"person":"people")+" × "+aH+" h/day × "+aD+" working days × £"+aR+"/h (loaded) = "+fmt(r.adminSaving)}/></div><div className="s-val"><AnimMoney v={r.adminSaving}/></div><div className="s-sub">modelled, conservative</div></div>; })()}
              <div className="s-card"><div className="s-lbl">Time saved / week</div><div className="s-val">{Math.round(r.timeSavedWeek).toLocaleString(LOCALE)}<span style={{fontSize:13}}> hrs</span></div><div className="s-sub">across the temporary staffing team</div></div>
            </div>

            {!noNet && <p style={{padding:"0 1.5rem",margin:"1rem 0 0",fontSize:12,color:C.textLight,lineHeight:1.6}}>
              This is the agency premium you stop paying by filling more shifts from your own bank instead of agency{r.adminSaving>0?<>, plus <b style={{color:C.textMid}}>{fmtK(r.adminSaving)}</b> of admin time</>:""}{r.recruitSaving>0?<> and <b style={{color:C.textMid}}>{fmtK(r.recruitSaving)}</b> of re-recruitment cost avoided</>:""}, shown as an annual figure after the <b style={{color:C.textMid}}>{fmt(platformCost)}/yr</b> licence fee.
            </p>}

            {r.exceedsSpend && <div className="callout navy"><p className="title">⚠ Check your inputs</p><p>The modelled saving exceeds total agency spend, which isn't possible. Lower the premium or displacement, or check the agency-spend figures.</p></div>}
            {r.adminOnly && !noNet && <div className="callout navy"><p className="title">Admin time only</p><p>No agency premium saving is modelled (agency spend is zero). This figure is the admin-time value on its own. Add your agency spend to model the agency-displacement saving.</p></div>}
            {r.zeroPay && <div className="callout navy"><p className="title">⚠ Check bank pay</p><p>A staff group has agency spend but no bank pay rate. Its cash saving still counts (the saving is anchored to agency spend and premium, not pay), but its duty counts and capacity value can't be modelled: set a bank pay rate or pick an AfC band.</p></div>}
            {r.implausibleRoi && !noNet && <div className="callout navy"><p className="title">⚠ Unusually high return</p><p>At these inputs the modelled saving is more than 40 times the licence fee, which usually reflects a very large bank or agency book. Sense-check against your organisation's real agency spend before quoting it.</p></div>}

            {/* How the cash saving is worked out: bank vs agency rate vs the premium gap (the defensible basis) */}
            <div className="panel">
              <h3 className="panel-title">How the cash saving is worked out</h3>
              <p style={{fontSize:12.5,color:C.textMid,lineHeight:1.6,margin:"0 0 .6rem"}}>We only ever bank the <b>gap</b> between an agency shift and the same shift on your own bank, never the whole agency cost, and only on the shifts you realistically move to bank (the {Math.round(r.displaceableShare*100)}% displaceable share × your confidence level).</p>
              {(()=>{ const hrs=r.shiftHours||8, bankHr=r.bankShiftCost/hrs, agHr=r.agencyShiftCost/hrs, gapS=r.agencyShiftCost-r.bankShiftCost, gapHr=gapS/hrs, m2=v=>"£"+(v||0).toFixed(2);
                const rate=(s,h)=>(<>{fmt(s)} <small style={{color:C.textLight,fontWeight:400}}>/shift · {m2(h)}/hr</small></>);
                // Round each term first so the displayed premium - licence = net equation adds up exactly.
                const grossR=Math.round(r.totSaving), adminR=Math.round(r.adminSaving||0), recR=Math.round(r.recruitSaving||0), licR=Math.round(num(platformCost)), netR=grossR+adminR+recR-licR;
                return <>
                  <div className="arow"><span>Your own bank (blended rate, all-in)</span><span>{rate(r.bankShiftCost,bankHr)}</span></div>
                  <div className="arow"><span>{perGroupPremium?"Agency, same shift (your per-group premiums)":"Agency, same shift (at "+premium+"% premium)"}</span><span>{rate(r.agencyShiftCost,agHr)}</span></div>
                  <div className="arow"><span style={{fontWeight:700,color:C.navy}}>Premium displaced = the saving</span><span>{rate(gapS,gapHr)}</span></div>
                  <p style={{fontSize:12.5,color:C.textMid,lineHeight:1.6,margin:".6rem 0 0"}}><b style={{color:C.navy}}>{m2(gapHr)}/hr</b> on each of <b style={{color:C.navy}}>{fmtNum(r.totDisplaced)}</b> shifts moved to bank = <b style={{color:C.navy}}>{fmt(r.totSaving)}</b> gross a year.</p>
                  <p style={{fontSize:12.5,lineHeight:1.7,margin:".6rem 0 0",padding:"10px 14px",background:netR>0?"#EFF9F6":"#FBF6EC",border:"1px solid "+(netR>0?"#BFE5DB":"#E8D9B8"),borderRadius:8,color:C.textMid}}>
                    <b style={{color:C.navy}}>{fmt(grossR)}</b> premium{adminR>0?<> + <b style={{color:C.navy}}>{fmt(adminR)}</b> admin time</>:""}{recR>0?<> + <b style={{color:C.navy}}>{fmt(recR)}</b> recruitment</>:""} − <b style={{color:C.navy}}>{fmt(licR)}</b> licence fee = <b style={{color:netR>0?C.teal:"#8A6508"}}>{netR>=0?fmt(netR):"−"+fmt(-netR)}</b> net{netR>0?", the headline saving shown at the top.":", so the licence fee is larger than the premium at these inputs."}
                  </p>
                </>; })()}
              <p style={{fontSize:11.5,color:C.textLight,marginTop:".6rem",lineHeight:1.6}}>Bank rate = 2026/27 AfC blended midpoint, already including the employer on-cost (default 20%, employer NI + pension), so on-costs are counted once, not added on top. Premium defaults to ~20%, reflecting figures cited in House of Commons Library research, deliberately conservative and contested at shift level (nursing ~35-50%, medics ~80-120%). Set your own premium and every figure updates.{isQuick?<> Quick mode anchors on your annual agency spend ({fmtK(r.totSpend)}{spendAuto?", estimated from your bank size using FY2025/26 national averages, enter your actual agency spend for accurate results":""}), for a per-staff-group model, switch to Detailed.</>:""}</p>
            </div>

            {/* Single annual steady-state (Rev D: ramp removed) */}
            <div className="panel">
              <h3 className="panel-title">Annual, ongoing saving</h3>
              <p style={{fontSize:12.5,color:C.textMid,lineHeight:1.6,margin:0}}>This is a <b>single annual, steady-state figure</b>, not a multi-year projection. Smart Match savings start once it is live and recur every year it is in use; the licence fee shown is an annual cost, so the net saving repeats each year.</p>
            </div>

            {!isQuick && r.regime && <div className="panel">
              <h3 className="panel-title">Agency intensity: {r.agencyPctOfTurnover.toFixed(1)}% of turnover</h3>
              <p style={{fontSize:12.5,color:C.textMid,lineHeight:1.6,margin:0}}>{r.regime==="low" ? <>This is a <b>mature, low-agency</b> model (under 1% of turnover): rate-arbitrage savings are small, so the stronger story is <b>admin time released, fill-rate improvement and bank-rate control</b> rather than the cash premium.</> : r.regime==="high" ? <>This trust is <b>highly agency-reliant</b> (over 4% of turnover): <b>the cash saving from displacing the agency premium dominates</b>, the strongest rate-arbitrage case.</> : <>This is <b>typical</b> agency reliance (1–4% of turnover): <b>the cash saving from the agency premium</b> is the headline, with admin time a secondary benefit.</>} Displacement is applied to the <b>{Math.round(displaceableShare*100)}% displaceable share</b> only.</p>
            </div>}

            {!isQuick && <div className="table-wrap"><table>
              <caption className="sr-only">Cash saving by staff group: bank pool, agency spend, duties displaced and cash saving for each group, with totals</caption>
              <thead><tr><th scope="col">Staff group</th><th scope="col" className="num">Bank pool</th><th scope="col" className="num">Agency spend</th>{perGroupPremium && <th scope="col" className="num">Premium</th>}<th scope="col" className="num">Duties displaced</th><th scope="col" className="num">Cash saving</th></tr></thead>
              <tbody>
                {r.rows.map(x=>(<tr key={x.id}><td>{x.role}</td><td className="num">{fmtNum(x.head)}</td><td className="num">{fmt(x.spend)}</td>{perGroupPremium && <td className="num">{(x.premium!=null?x.premium:premium)}%</td>}<td className="num">{fmtNum(x.displaced)}</td><td className="num">{fmt(x.saving)}</td></tr>))}
                <tr className="total-row"><td>Total</td><td className="num">{fmtNum(r.totHead)}</td><td className="num">{fmt(r.totSpend)}</td>{perGroupPremium && <td className="num">n/a</td>}<td className="num">{fmtNum(r.totDisplaced)}</td><td className="num">{fmt(r.totSaving)}</td></tr>
              </tbody></table></div>}

            <div className="panel">
              <h3 className="panel-title">{isQuick?"Saving by source":"Cash saving by staff group"}</h3>
              {isQuick ? (
                [["Agency premium displaced",r.totSaving],["Admin time saving",r.adminSaving],["Re-recruitment cost avoided",r.recruitSaving]]
                  .filter(x=>x[1]>0).map(([lbl,val],i)=>{ const mx=Math.max(r.totSaving,r.adminSaving,r.recruitSaving,1);
                  return (<div className="bar-row" key={lbl}><div className="blbl">{lbl}</div><div className="btrack"><div className="bfill" style={{width:Math.round((val/mx)*100)+"%",background:RAMP[i%RAMP.length]}}></div></div><div className="bval">{fmt(val)}</div></div>); })
              ) : (
                r.rows.map((x,i)=>(<div className="bar-row" key={x.id}><div className="blbl">{x.role}</div><div className="btrack"><div className="bfill" style={{width:Math.round((x.saving/maxSaving)*100)+"%",background:RAMP[i%RAMP.length]}}></div></div><div className="bval">{fmt(x.saving)}</div></div>))
              )}
            </div>

            <div className="capacity">
              <span className="cap-tag">Capacity: not a cash saving</span>
              <p style={{fontSize:12,color:C.textMid,margin:".55rem 0 0",lineHeight:1.55,maxWidth:560}}>Additional shifts covered by your own staff rather than agency, reducing reliance on agency and supporting continuity of care.</p>
              <div className="cap-grid">
                <div className="cap-item"><div className="cv"><AnimNum v={r.totDisplaced}/></div><div className="cl">more shifts filled from your own bank each year (off agency)</div></div>
                <div className="cap-item"><div className="cv">{fmtK(r.totCapacityValue)}</div><div className="cl">bank backfill cost to deliver them <b>(spend, not saving)</b></div></div>
                <div className="cap-item"><div className="cv">{r.fillNow?pct(r.fillNow)+" → "+r.fillAfter.toFixed(1)+"%":"n/a"}</div><div className="cl">illustrative agency reliance reduction</div></div>
              </div>
              <p style={{fontSize:11.5,color:C.textLight,marginTop:".85rem",lineHeight:1.6}}>Filling more shifts from your own bank is real operational value: steadier rosters, better continuity of care and less last-minute agency reliance. It is deliberately kept separate from the cash saving above and never added to it.</p>
            </div>

            <div className="callout navy">
              <p className="title">The value goes beyond the numbers</p>
              <p>These figures capture cash savings only. Smart Match also supports safer staffing, better continuity of care and a fairer, more flexible experience for your bank workers, real benefits we've deliberately not put a pound figure on.</p>
            </div>

            <div className="callout quote">
              <p className="quote-txt">“I’ve just received my first Smart Match duty offer. Clicking the notification took me straight to the shift details and I booked it straight away, so easy. You’re not constantly looking on a loop, frightened you’ll miss something.”</p>
              <p className="quote-by">Bank staff member, a community trust (Smart Match programme; anonymised)</p>
            </div>

            <div className="lead">
              <h4>Want a copy, or to pressure-test these numbers?</h4>
              <p className="sub">Leave your details and an RLDatix BankStaff specialist can validate the figures against your organisation's own bank and agency rates.</p>
              {lead.sent ? <p style={{color:C.navy,fontWeight:600,fontSize:14}}>Thanks, we'll be in touch. 👋</p> :
              <form onSubmit={submitLead}><div className="lead-grid">
                <input aria-label="Name" autoComplete="name" placeholder="Name" value={lead.name} onChange={e=>setLead(l=>({...l,name:e.target.value}))}/>
                <input type="email" required aria-label="Work email" autoComplete="email" placeholder="Work email" value={lead.email} onChange={e=>setLead(l=>({...l,email:e.target.value}))}/>
                <input aria-label="Trust or organisation" autoComplete="organization" placeholder="Trust / organisation" value={lead.org} onChange={e=>setLead(l=>({...l,org:e.target.value}))}/>
                <button className="btn primary" type="submit" disabled={!lead.consent||lead.busy}>{lead.busy?"Sending…":"Send to a specialist"}</button>
              </div>
              <label className="consent" style={{display:"flex",alignItems:"flex-start",gap:8,cursor:"pointer",marginTop:".6rem"}}><input type="checkbox" required checked={!!lead.consent} onChange={e=>setLead(l=>({...l,consent:e.target.checked}))} style={{marginTop:3}}/><span>I agree to share my name and email address so RLDatix may contact me about Smart Match; details are processed in line with RLDatix's privacy notice.</span></label>
              {lead.err==="failed" && <p className="consent" style={{color:C.rose}}>Sorry, that didn't send. Please try again, or contact your RLDatix representative.</p>}
              {lead.err==="unconfigured" && <p className="consent" style={{color:C.rose}}>Lead capture isn't switched on yet. Your RLDatix contact can enable it (HubSpot portal + form ID).</p>}
              </form>}
            </div>

            <div className="actions">
              <button className="btn primary" onClick={downloadPDF} disabled={pdfBusy}>{pdfBusy?"Generating…":"⬇ Download PDF estimate"}</button>
              <button className="btn" onClick={()=>{ if(EMBEDDED) hostScroll(null); else window.scrollTo({top:0,behavior:REDUCE_MOTION?"auto":"smooth"}); }}>↑ Adjust inputs</button>
            </div>

            <div className="assumptions">
              <h3 className="panel-title">Assumptions &amp; methodology</h3>
              <div className="arow"><span>Saving basis</span><span>Agency premium displaced (cash)</span></div>
              <div className="arow explain"><span className="albl">Why not the full shift value? <span className="conf high">CORE</span></span><span className="adesc">Filling a bank shift is expenditure. A trust only saves when a duty that would have been agency is covered by bank instead: the saving is the <b>difference</b> (the premium), not the whole shift. Gross shift value sits under Capacity.</span></div>
              <Method formula={"bank_shift_cost  = (pay / 1957.5) × hours × (1 + on-cost)\nagency_shift_cost= bank_shift_cost × (1 + premium)\ndisplaced_duties = (agency_spend / agency_shift_cost) × displaceable_share × displacement\nCASH SAVING      = displaced_duties × bank_shift_cost × premium"}
                your={<>Agency spend {fmt(r.totSpend)} · displaceable share {Math.round(r.displaceableShare*100)}% · premium {premium}%{perGroupPremium?" (default; per-group overrides on)":""} · displacement {displacement}% ({st.key}) → <b>{fmt(r.totSaving)}</b>.</>}
                source="Cash saving = agency_spend × displaceable_share × displacement × premium/(1+premium); driven by agency spend, the displaceable share, premium and displacement, not bank payroll." strength={{c:"high",t:"method"}}/>
              <div className="arow"><span>Time saved / week (co-headline)</span><span>{Math.round(r.timeSavedWeek).toLocaleString(LOCALE)} hours</span></div>
              <div className="arow explain"><span className="albl">Admin model (per person) <span className="conf low">low</span></span><span className="adesc">team size × hours/day × 5. Cash: × {ADMIN_WORKING_DAYS} working days × loaded rate. Roles: bank/temp staffing coordinators, officers and administrators (the people who do the day-to-day booking). Some teams report up to 2.5 h/day @ £18, treated as optimistic; default is a conservative 1.0 h/day. Validate locally.</span></div>
              <div className="arow"><span>Agency premium {perGroupPremium?"(per staff group)":"(single, editable)"}</span><span>{premium}%{perGroupPremium?" default":""} <span className="contested">contested</span></span></div>
              <div className="arow explain"><span className="albl">Source: premium</span><span className="adesc">~20% average (House of Commons Library CBP-10539, Mar 2026); disputed at shift level; May 2026 REC FOI data show NHS bank can cost more than price-capped agency on some shifts. Treat as a range (nursing ~35–50%, medics ~80–120%) and use your own rates.</span></div>
              <div className="arow"><span>Displaceable share of agency</span><span>{Math.round(r.displaceableShare*100)}%</span></div>
              <div className="arow explain"><span className="albl">Source: displaceable share</span><span className="adesc">Only part of agency spend can realistically move to bank: excludes break-glass / safety-critical cover and specialist roles bank can't fill. Displacement applies to this share only (benchmark default 80%, editable in Detailed).</span></div>
              <div className="arow"><span>Confidence level</span><span>{displacement}%, {st.key}</span></div>
              <div className="arow explain"><span className="albl">Source: displacement <span className="conf low">low</span></span><span className="adesc">Conservative by default. The stance % applies to the displaceable share only, so the effective whole-book rate is lower (e.g. Moderate 26% × 80% ≈ 21% of all agency). The programme saw agency fill fall 8.1%→6.0% at one community site (26% relative), the observed upper end, single-site, partly attributable to wider scheduling/engagement changes. Health-economist validation pending.</span></div>
              <div className="arow"><span>Bank-utilisation programme signal</span><span>+17% (one site)</span></div>
              <div className="arow explain"><span className="albl">Source: programme (4 trusts; 2-site data) <span className="conf low">low–mod</span></span><span className="adesc">Utilisation +17% at one community site (170→199 workers); the other reporting site was ~+1.75% (a "13%" figure in the client doc is a known error). Temp duties filled +17% (351→411) / +16%. Self-booking +26% / +15%. Engagement/coverage measures, not payroll uplift; they inform the stance, not the saving. Anonymised pending client sign-off.</span></div>
              <div className="arow"><span>Pay scale</span><span>2026/27 NHS AfC midpoints <span className="conf high">high</span></span></div>
              <div className="arow explain"><span className="albl">Source: pay</span><span className="adesc">NHS Employers 2026/27 (+3.3% confirmed from 1 Apr 2026), band midpoints: Band 2 ~£25,272; Band 3 ~£26,618; Band 5 ~£35,558 (£32,073–£39,043); Band 6 ~£44,038 (£39,959–£48,117). Medics use the SAS / specialty-doctor scale (~£52.5k–£67.5k, 2026/27); medical T&amp;Cs, not AfC: medical contracts are 40 h/week and locum supply is priced hourly, so medic duty counts are approximate (their cash saving is unaffected, being anchored to spend). Add London HCAS (Inner 20% / Outer 15% / Fringe 5%) where relevant. Band 2/3 may rise further via the pending Staff Council structure reform.</span></div>
              <div className="arow"><span>Hourly divisor / shift length</span><span>1,957.5 h/yr · {shiftHours} h</span></div>
              <div className="arow explain"><span className="albl">What pay, hours &amp; on-cost do <span className="conf high">CORE</span></span><span className="adesc">They calibrate <b>duty counts and the capacity value only</b>. The cash saving is agency_spend × displaceable_share × displacement × premium/(1+premium), it does not change with pay, shift length or on-cost. The 20% on-cost default sits below the full ~30% NHS employer rate (NI + pension) because bank-only workers often opt out of the pension; set your local loaded rate.</span></div>
              <div className="arow"><span>Licence fee (ROI denominator, G-Cloud)</span><span>{fmt(platformCost)}/yr</span></div>
              <div className="arow explain"><span className="albl">Return &amp; payback basis</span><span className="adesc">Return = net annual saving ÷ licence fee (a net multiple, not a benefit–cost ratio). Payback = licence fee ÷ gross annual benefit, shown in days. The denominator is the G-Cloud licence only (ex VAT): implementation, integration and change costs are not included; add them for a full business case.</span></div>
              {r.recruitSaving>0 && <><div className="arow"><span>Re-recruitment cost avoided (optional)</span><span>{fmt(r.recruitSaving)}</span></div>
              <div className="arow explain"><span className="albl">Source: re-recruitment <span className="conf low">low</span></span><span className="adesc">under-utilised workers × recruit/onboard cost × share avoided. Counts future replacement cost avoided by activating idle workers, sunk recruitment spend is not counted. No strong public benchmark, conservative and clearly optional.</span></div></>}
              <div className="arow explain"><span className="albl">Strategy &amp; framing</span><span className="adesc">Framed against the NHS 10 Year Plan + Workforce Paper and the Staff Health &amp; Wellbeing CQUIN. A pilot study is a small (2-site), vendor-collected sample, encouraging but indicative, not solely attributable to Smart Match, and anonymised pending client sign-off.</span></div>
            </div>
          </div>
        </div>
        )}
      </main>

      <footer><p>Built by <strong>RLDatix Smart Match</strong> · Cash saving = agency premium displaced (not gross shift value) · 2026/27 NHS AfC pay scales · Figures are <strong>indicative</strong>, conservative and editable · validate with your organisation's own rates · Pilot study = 2-site data within a 4-trust programme, anonymised pending client sign-off; outcomes vary and are not solely attributable to the platform. · <span style={{opacity:.7}}>v1.5.0</span></p></footer>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
