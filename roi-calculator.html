<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {

  html { -webkit-text-size-adjust:100%; }
  body { font-family:'DM Sans',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif; background:var(--mid-grey); color:var(--text); line-height:1.6; font-size:15px; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }

  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  .card { background:var(--white); border:1px solid var(--border); border-radius:var(--radius); padding:1.25rem; margin-bottom:12px; transition:box-shadow .2s; }

  .grp-name:hover, .grp-name:focus { outline:none; border-bottom-color:var(--border); }

  .add-group { background:var(--navy-light); border:1px dashed var(--teal-mid); color:var(--teal-mid); font-family:inherit; font-size:13px; font-weight:600; padding:12px; border-radius:var(--radius); cursor:pointer; width:100%; margin-top:12px; transition:.15s; }
  .add-group:hover { background:var(--teal-light); }
  .stance-btns { display:flex; gap:6px; margin:2px 0 10px; }
  .stance-btn { flex:1; border:1px solid var(--border); background:#fff; border-radius:8px; padding:7px 6px; font-family:inherit; font-size:12px; font-weight:700; color:var(--text-mid); cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:1px; transition:.15s; }
  .stance-btn small { font-weight:600; font-size:10px; opacity:.7; }
  .stance-btn:hover { border-color:var(--teal-mid); }
  .stance-btn.active { background:var(--navy); border-color:var(--navy); color:#fff; }
  .staff-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; flex-wrap:wrap; gap:8px; }
  .staff-title { display:flex; align-items:center; gap:10px; }
  .band-pill { font-size:11px; font-weight:600; padding:3px 9px; border-radius:20px; }
  .staff-name { font-size:14px; font-weight:600; color:var(--navy); }
  .saving-badge { font-size:13px; font-weight:600; padding:4px 12px; border-radius:var(--radius-sm); background:var(--navy-light); color:var(--navy); }
  .saving-badge-sub { font-size:10px; color:var(--text-light); margin-top:4px; line-height:1.4; text-align:right; max-width:210px; }
  .inputs-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; }
  .field { display:flex; flex-direction:column; gap:5px; }
  .field label { font-size:12px; color:var(--text-light); display:flex; align-items:center; gap:5px; }
  .field input[type=number] { border:1px solid var(--border); border-radius:var(--radius-sm); padding:8px 10px; font-family:inherit; font-size:14px; color:var(--navy); background:var(--mid-grey); width:100%; transition:border-color .15s,box-shadow .15s; }
  .field input[type=number]:focus { outline:none; border-color:var(--teal); box-shadow:0 0 0 3px rgba(15,118,110,.12); background:#fff; }
  .hint { font-size:11px; color:var(--text-light); line-height:1.5; }
  .adv-toggle { background:none; border:none; color:var(--navy-mid); font-family:inherit; font-size:12px; font-weight:600; cursor:pointer; padding:6px 0 0; text-decoration:underline; }

  .params-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; background:var(--white); border:1px solid var(--border); border-radius:var(--radius); padding:1.25rem; }
  @media (max-width:620px){ .params-grid{ grid-template-columns:1fr; } }
  .slider-ctx { display:flex; justify-content:space-between; font-size:11px; color:var(--text-light); margin-top:4px; }
  input[type=range] { width:100%; accent-color:var(--teal); margin-top:8px; height:6px; }

  .results-box { background:var(--white); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); }
  .roi-header { background:var(--navy); color:#fff; padding:1.5rem; }
  .roi-eyebrow { font-size:11px; text-transform:uppercase; letter-spacing:.1em; opacity:.7; margin-bottom:.75rem; }
  .roi-co { display:flex; gap:2.5rem; flex-wrap:wrap; }
  .roi-hero { font-family:'DM Serif Display',Georgia,serif; font-size:clamp(2.1rem,6vw,3.2rem); line-height:1; }
  .roi-hero small { font-size:1rem; opacity:.7; font-family:'DM Sans',sans-serif; }
  .roi-cap { font-size:12px; opacity:.75; margin-top:.4rem; }
  .roi-sub { font-size:13px; opacity:.85; margin-top:1rem; padding-top:1rem; border-top:1px solid rgba(255,255,255,.15); display:flex; gap:1.5rem; flex-wrap:wrap; }
  .roi-sub b { color:var(--seafoam); }

  .summary-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); border-bottom:1px solid var(--border); }
  .s-card { padding:1.1rem 1.25rem; border-right:1px solid var(--border); border-bottom:1px solid var(--border); }
  .s-card.hl { background:var(--navy-light); }
  .s-lbl { font-size:11px; color:var(--text-light); margin-bottom:4px; display:flex; align-items:center; gap:5px; }
  .s-card.hl .s-lbl { color:var(--navy-mid); }
  .s-val { font-size:20px; font-weight:700; color:var(--text); }
  .s-card.hl .s-val { color:var(--navy); }
  .s-sub { font-size:11px; color:var(--text-light); margin-top:3px; line-height:1.4; }

  .table-wrap { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; font-weight:600; font-size:11px; color:var(--text-light); padding:10px 14px; border-bottom:1px solid var(--border); white-space:nowrap; }
  td { padding:10px 14px; border-bottom:1px solid var(--border); color:var(--text); }
  .num { text-align:right; font-variant-numeric:tabular-nums; }
  tr.total-row td { background:var(--navy-light); font-weight:700; color:var(--navy); border-bottom:none; }

  .panel { padding:1.25rem 1.5rem; border-top:1px solid var(--border); }
  .panel-title { font-size:11px; font-weight:600; color:var(--text-light); margin-bottom:1rem; text-transform:uppercase; letter-spacing:.08em; }
  .bar-row { display:flex; align-items:flex-start; gap:12px; margin-bottom:12px; }
  .blbl { font-size:12px; color:var(--text-mid); width:190px; flex-shrink:0; }
  .btrack { flex:1; height:8px; background:var(--mid-grey); border-radius:4px; overflow:hidden; margin-top:4px; }
  .bfill { height:100%; border-radius:4px; animation:barGrow .6s cubic-bezier(.16,1,.3,1); transition:width .4s ease; }
  .bval { font-size:12px; font-weight:600; color:var(--navy); width:110px; text-align:right; font-variant-numeric:tabular-nums; }

  .capacity { padding:1.25rem 1.5rem; border-top:1px solid var(--border); background:repeating-linear-gradient(135deg,#F4FBF9,#F4FBF9 10px,#E9F6F2 10px,#E9F6F2 20px); }
  .cap-tag { display:inline-block; font-size:10px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--navy-mid); background:var(--navy-light); padding:2px 8px; border-radius:10px; margin-bottom:.75rem; }
  .cap-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:1rem; }
  .cap-item .cv { font-size:22px; font-weight:700; color:var(--navy); }
  .cap-item .cl { font-size:12px; color:var(--text-mid); margin-top:2px; line-height:1.4; }

  .callout { margin:1.25rem 1.5rem; padding:1.1rem 1.25rem; border-radius:var(--radius-sm); }
  .callout.navy { background:var(--navy-light); border-left:4px solid var(--teal); }
  .callout.quote { background:#fff; border:1px solid var(--border); }
  .callout p { font-size:13px; color:var(--text-mid); line-height:1.6; }
  .callout .title { font-size:13px; font-weight:700; color:var(--navy); margin-bottom:.4rem; }
  .quote-txt { font-size:14px; color:var(--navy); line-height:1.7; font-style:italic; margin-bottom:.6rem; }
  .quote-by { font-size:12px; color:var(--text-light); font-weight:600; }

  .assumptions { padding:1.25rem 1.5rem; border-top:1px solid var(--border); }
  .arow { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--border); font-size:12px; color:var(--text-mid); gap:1rem; }
  .arow:last-child { border-bottom:none; }
  .arow > span:last-child { font-weight:600; color:var(--navy); text-align:right; white-space:nowrap; }
  .arow.explain { flex-direction:column; gap:3px; }
  .arow.explain .albl { font-weight:600; color:var(--navy); font-size:12px; display:flex; align-items:center; gap:6px; }
  .arow.explain .adesc { font-size:11px; color:var(--text-light); line-height:1.5; text-align:left; font-weight:400; white-space:normal; }
  .conf { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; padding:1px 6px; border-radius:8px; }
  .conf.high { background:#E6F4EC; color:#1B7F5C; }
  .conf.med { background:#FFF4E0; color:#B7791F; }
  .conf.low { background:var(--teal-light); color:var(--teal); }
  details.method { border:1px solid var(--border); border-radius:var(--radius-sm); margin-top:.5rem; }
  details.method > summary { cursor:pointer; padding:8px 12px; font-size:12px; font-weight:600; color:var(--navy-mid); list-style:none; }
  details.method > summary::-webkit-details-marker { display:none; }
  details.method > summary::before { content:'▸ '; }
  details.method[open] > summary::before { content:'▾ '; }
  details.method .mbody { padding:0 12px 12px; font-size:12px; color:var(--text-mid); line-height:1.6; }
  code.formula { display:block; background:var(--navy-dark); color:#cfe; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:11.5px; padding:8px 10px; border-radius:6px; margin:6px 0; white-space:pre-wrap; }

  .actions { display:flex; gap:10px; flex-wrap:wrap; padding:1.25rem 1.5rem; border-top:1px solid var(--border); }
  .btn { font-family:inherit; font-size:14px; font-weight:600; padding:11px 20px; border-radius:var(--radius-sm); cursor:pointer; border:1px solid var(--border); background:#fff; color:var(--navy); transition:.15s; }
  .btn:hover { box-shadow:var(--shadow); }
  .btn.primary { background:var(--teal); color:#fff; border-color:var(--teal); }
  .btn.primary:hover { background:var(--teal-mid); }
  .btn:disabled { opacity:.6; cursor:wait; }

  .lead { margin:1.25rem 1.5rem; padding:1.25rem; border:1px dashed var(--border); border-radius:var(--radius); background:#fcfdff; }
  .lead h4 { font-family:'DM Serif Display',Georgia,serif; font-weight:400; color:var(--navy); font-size:1.05rem; margin-bottom:.25rem; }
  .lead p.sub { font-size:12px; color:var(--text-light); margin-bottom:.85rem; }
  .lead-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  @media (max-width:560px){ .lead-grid{ grid-template-columns:1fr; } }
  .lead input { border:1px solid var(--border); border-radius:var(--radius-sm); padding:9px 11px; font-family:inherit; font-size:14px; width:100%; background:#fff; }
  .lead input:focus { outline:none; border-color:var(--teal); }

  .cal-overlay { position:fixed; inset:0; background:rgba(10,47,49,.55); backdrop-filter:blur(3px); display:flex; align-items:center; justify-content:center; z-index:1000; animation:fadeIn .3s; }
  .cal-card { background:#fff; border-radius:16px; padding:2rem 2.5rem; max-width:380px; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,.3); }
  .cal-dots { display:flex; gap:5px; justify-content:center; height:32px; align-items:center; margin-bottom:1rem; }
  .cal-dots span { width:6px; height:28px; background:var(--teal); border-radius:3px; animation:pulseDot 1s ease-in-out infinite; }
  .cal-dots span:nth-child(2){animation-delay:.12s} .cal-dots span:nth-child(3){animation-delay:.24s} .cal-dots span:nth-child(4){animation-delay:.36s} .cal-dots span:nth-child(5){animation-delay:.48s}
  .cal-card h3 { font-family:'DM Serif Display',Georgia,serif; font-weight:400; color:var(--navy); font-size:1.2rem; margin-bottom:.4rem; }
  .cal-card p { font-size:13px; color:var(--text-light); margin-bottom:1rem; }
  .cal-bar { height:6px; background:var(--navy-light); border-radius:3px; overflow:hidden; }
  .cal-bar i { display:block; height:100%; background:linear-gradient(90deg,var(--teal),var(--teal-mid)); animation:calFill 1.6s ease forwards; }

  footer { background:var(--navy-dark); color:rgba(255,255,255,.5); padding:2rem; text-align:center; font-size:12px; }
  footer strong { color:var(--seafoam); }

  @media (max-width:480px){ header,main,.narrative-inner,.evidence-inner{ padding-left:1.25rem; padding-right:1.25rem; } .roi-co{ gap:1.5rem; } }
  @media print { .cal-overlay,.actions,.lead,.adv-toggle,.mode-toggle,header p{ display:none !important; } body{ background:#fff; font-size:11pt; } .results-box{ box-shadow:none; } }

<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.4/babel.min.js" crossorigin></script>
<script>

<script type="text/babel" data-presets="react">
const { useState, useMemo, useEffect, useRef } = React;

/* ===== THEME: RLDatix Galen suite (deep teal + seafoam) ===== */
const C = { navy:"#0F4146", navyMid:"#1A5459", navyLight:"#E8FAF6", teal:"#0F4146", tealMid:"#1A8A7A", tealLight:"#D6F7EE", seafoam:"#34DEC2", border:"#D4E0DD", text:"#0F4146", textMid:"#3D5A5E", textLight:"#6E8A8E" };
const RAMP = ["#0F4146","#1A8A7A","#34DEC2","#73D2E1","#8FB3AE"];

/* ===== FORMATTERS: en-GB / £ (AU-ready: swap LOCALE + SYMBOL) ===== */
const LOCALE="en-GB", SYMBOL="£";
const fmt    = n => SYMBOL + Math.round(n||0).toLocaleString(LOCALE);
const fmtK   = n => { n=n||0; return n>=1e6 ? `${SYMBOL}${(n/1e6).toFixed(2)}m` : n>=1000 ? `${SYMBOL}${Math.round(n/1000).toLocaleString(LOCALE)}k` : fmt(n); };
const fmtNum = n => Math.round(n||0).toLocaleString(LOCALE);
const pct    = n => `${Math.round(n)}%`;
const num    = (v,f=0) => { const n=parseFloat(String(v).replace(/[^0-9.\-]/g,"")); return isNaN(n)?f:n; };  // strips £, commas, spaces from pasted figures

/* ===== MODEL CONSTANTS (conservative; flagged for validation) =====
   Cash saving (corrected v9, brief §3) is the AGENCY PREMIUM DISPLACED,
   anchored to agency exposure, never bank payroll:
     bank_shift_cost   = (pay/1957.5) × hours × (1+oncost)
     agency_shift_cost = bank_shift_cost × (1+premium)
     displaced_shifts  = (agency_spend / agency_shift_cost) × displacement
     CASH SAVING       = displaced_shifts × bank_shift_cost × premium
   Admin (B) and capacity/temp-duties (C) are kept strictly separate. */
const AFC_DIVISOR = 1957.5;
const SHIFT_HOURS_DEFAULT = 8;
const BANK_ONCOST_DEFAULT = 0.20;     // affects shift counts only, not the cash headline
const PLATFORM_COST_DEFAULT = 17000;
/* Admin (Rev B): per admin/roster manager. Client said 2.5 h/day @ £18; 2.5 is optimistic, default lower. */
const ADMIN_HRS_PER_DAY_DEFAULT = 1.0;
const ADMIN_WORKING_DAYS = 225;
const ADMIN_LOADED_HOURLY = 18;
/* Simple variant embedded defaults */
const SIMPLE_SHIFTS_PER_WORKER_YR = 60;   // bank work is ad-hoc/top-up, not full-time
const SIMPLE_BLENDED_BANK_PAY = 34000;    // AfC 2026/27 band-mix weighted midpoint
const RECRUIT_COST_PER_WORKER = 1000;     // recruit + onboard a bank worker
const RECRUIT_RECOVERY_RATE = 0.10;       // share recovered by activating idle capacity

/* AfC 2026/27 England midpoints (NHS Employers, +3.3% confirmed from 1 Apr 2026).
   Per-group bank pay drives like-for-like costs; the agency PREMIUM is a single, official
   cost mechanic (default 20%, editable) applied across groups, not a per-group figure. */
const BAND_PILL = { "Band 2":["#EEF6F4","#3D5A5E"], "Band 3":["#EEF6F4","#3D5A5E"], "Band 5":["#E8FAF6","#0F4146"], "Band 5/6":["#E8FAF6","#1A5459"], "Band 6":["#D6F7EE","#0F4146"], "Band 2/3":["#EEF6F4","#3D5A5E"], "SAS / ST3+":["#0F4146","#FFFFFF"] };
const bandPill = b => { const p = BAND_PILL[b] || ["#E8FAF6","#0F4146"]; return { background:p[0], color:p[1] }; };
const G = (id,role,band,bankPay,headcount,agencySpend) => ({ id, role, band, bankPay, headcount, agencySpend });
/* Per-type organisation templates: each carries a realistic staff-group profile
   (role, band, bank pay, headcount, agency spend) summing to that type's totals.
   2026/27 AfC pay. Every value is a starting point and fully editable; the two
   size headlines (total headcount + total agency spend) rescale the mix via
   scaleGroupsTo(). */
const ORG_TYPES = {
  acute: { label:"Acute trust", desc:"~660 bank · ~£10m agency", groups:[
    G("rn","Registered nurses","Band 5",34592,240,4000000),
    G("sn","Senior nurses","Band 6",42170,120,1500000),
    G("ahp","AHPs (physio / OT)","Band 5/6",38400,100,800000),
    G("hca","Healthcare assistants","Band 2/3",25900,160,700000),
    G("doc","Medics (locum / SAS)","SAS / ST3+",60000,40,3000000),
  ]},
  community: { label:"Community / specialist", desc:"~260 bank · ~£3m agency", groups:[
    G("cn","Community / district nurses","Band 6",42170,70,900000),
    G("rn","Registered nurses","Band 5",34592,60,600000),
    G("ahp","AHPs (physio / OT / SLT)","Band 5/6",38400,80,900000),
    G("hca","Healthcare assistants","Band 2/3",25900,45,400000),
    G("doc","Medics (locum / SAS)","SAS / ST3+",60000,5,200000),
  ]},
  mental: { label:"Mental health trust", desc:"~400 bank · ~£6m agency", groups:[
    G("rmn","Mental health nurses (RMN)","Band 5",34592,140,2200000),
    G("sn","Senior nurses","Band 6",42170,70,1000000),
    G("hca","Healthcare assistants","Band 2/3",25900,150,1500000),
    G("ahp","AHPs (OT / psychology)","Band 5/6",38400,25,300000),
    G("doc","Medics (locum psych)","SAS / ST3+",60000,15,1000000),
  ]},
  ambulance: { label:"Ambulance trust", desc:"~350 bank · ~£4m agency", groups:[
    G("para","Paramedics","Band 6",42170,150,2000000),
    G("emt","EMTs / care assistants","Band 3",26618,90,600000),
    G("rn","Nurses (111 / UCC)","Band 5",34592,50,600000),
    G("call","Call handlers / dispatch","Band 3",26618,50,300000),
    G("doc","Medics (locum)","SAS / ST3+",60000,10,500000),
  ]},
  ics: { label:"ICS / provider collaborative", desc:"~2,300 bank · ~£35m agency", groups:[
    G("rn","Registered nurses","Band 5",34592,850,14000000),
    G("sn","Senior nurses","Band 6",42170,420,5500000),
    G("ahp","AHPs","Band 5/6",38400,350,3000000),
    G("hca","Healthcare assistants","Band 2/3",25900,560,2500000),
    G("doc","Medics (locum / SAS)","SAS / ST3+",60000,120,10000000),
  ]},
};
const AFC_BANDS = [["Band 2",25272],["Band 3",26618],["Band 5",34592],["Band 5/6",38400],["Band 6",42170],["Band 2/3",25900],["SAS / ST3+",60000]];
const buildOrg = key => (ORG_TYPES[key]||ORG_TYPES.acute).groups.map(g=>({ ...g }));
function scaleGroupsTo(groups,key,target){
  const vals=groups.map(g=>num(g[key])); const cur=vals.reduce((a,b)=>a+b,0);
  if(cur<=0||!(target>0))return groups;
  const unit=key==="agencySpend"?1000:1, tU=Math.round(target/unit); if(tU<=0)return groups;
  const pos=vals.map(v=>v>0), nPos=pos.filter(Boolean).length;
  if(tU<nPos){ const ord=vals.map((v,i)=>({i,v})).sort((a,b)=>b.v-a.v); const out=vals.map(()=>0); for(let j=0;j<tU;j++)out[ord[j].i]=1; return groups.map((g,i)=>({...g,[key]:out[i]*unit})); }
  const raw=vals.map(v=>(v/cur)*tU); const fl=raw.map((x,i)=>pos[i]?Math.max(1,Math.floor(x)):0);
  let rem=tU-fl.reduce((a,b)=>a+b,0);
  const ord=raw.map((x,i)=>({i,f:x-Math.floor(x),pos:pos[i]})).filter(o=>o.pos).sort((a,b)=>b.f-a.f); let k=0;
  while(rem>0&&ord.length){ fl[ord[k%ord.length].i]++; rem--; k++; }
  while(rem<0){ let bi=-1,bv=1; for(let i=0;i<fl.length;i++)if(fl[i]>bv){bv=fl[i];bi=i;} if(bi<0)break; fl[bi]--; rem++; }
  return groups.map((g,i)=>({...g,[key]:fl[i]*unit}));
}

function stance(d){
  if (d<=18) return { key:"Conservative", color:C.navy, bg:C.navyLight, note:"Conservative (≈13%): about half the pilot's measured effect. Recommended default for public/self-serve use: defensible without trust-specific evidence." };
  if (d<=30) return { key:"Pilot / Expected", color:C.navyMid, bg:C.navyLight, note:"Pilot / Expected (≈26%): the effect measured at one community site (agency fill 8.1%→6.0%). Single-site and partly attributable, so best used in a guided commercial conversation." };
  return { key:"Optimistic", color:C.teal, bg:C.tealLight, note:"Optimistic (≈35%): above the pilot result. Use only with strong, trust-specific evidence." };
}

/* ===== PURE CALC ENGINE (shared by Quick + Detailed + the kiosk variant) ===== */
function calc(input){
  const { groups, premium, displacement, shiftHours, oncost, platformCost, admin, recruit, fillRateNow, perGroupPremium } = input;
  const p=premium/100, d=displacement/100, oc=oncost/100;
  let totSpend=0, totSaving=0, totDisplaced=0, totBaseline=0, totHead=0, totCapacityValue=0;
  const rows = groups.map(g=>{
    const head=num(g.headcount), spend=num(g.agencySpend), pay=num(g.bankPay);
    const gp=((perGroupPremium && g.premium!=null)?num(g.premium):premium)/100, gd=(g.displacement!=null?num(g.displacement):displacement)/100;
    const bankShiftCost = (pay/AFC_DIVISOR) * shiftHours * (1+oc);
    const agencyShiftCost = bankShiftCost * (1+gp);
    const baseline = agencyShiftCost>0 ? spend/agencyShiftCost : 0;
    const displaced = baseline*gd;
    const saving = displaced * (agencyShiftCost - bankShiftCost);  // = displaced × bankShiftCost × group premium
    const capacityValue = displaced * bankShiftCost;               // gross bank backfill cost (NON-cash)
    totSpend+=spend; totSaving+=saving; totDisplaced+=displaced; totBaseline+=baseline; totHead+=head; totCapacityValue+=capacityValue;
    return { ...g, head, spend, bankShiftCost, agencyShiftCost, baseline, displaced, saving, capacityValue };
  });
  // B: admin (per manager/day) + time saved/week (a co-headline; shown regardless of cash toggle)
  const mgrs=num(admin.managers), hpd=num(admin.hoursPerDay);
  const timeSavedWeek = mgrs * hpd * 5;
  const adminSaving = admin.enabled ? mgrs * hpd * num(admin.workingDays) * num(admin.loadedHourly) : 0;
  // B(optional): recovered recruitment/onboarding waste
  const recruitSaving = (recruit && recruit.enabled) ? num(recruit.workers)*num(recruit.costPerWorker)*num(recruit.recoveryRate) : 0;

  const grossBenefit = totSaving + adminSaving + recruitSaving;
  const netSaving = grossBenefit - num(platformCost);
  const roiPct = platformCost>0 ? (netSaving/platformCost)*100 : 0;
  const paybackMonths = grossBenefit>0 ? platformCost/(grossBenefit/12) : null;
  const exceedsSpend = totSaving>totSpend && totSpend>0;
  const implausibleRoi = roiPct>3000;
  const fillNow=num(fillRateNow), fillAfter=fillNow*(1-d);
  return { rows, totSpend, totSaving, totDisplaced, totBaseline, totHead, totCapacityValue,
    adminSaving, recruitSaving, timeSavedWeek, grossBenefit, netSaving, roiPct, paybackMonths,
    exceedsSpend, implausibleRoi, fillNow, fillAfter };
}

/* ===== TIME PROJECTION: phased ramp + cumulative (Galen migration pattern) ===== */
const RAMP_PCTS = { 3:[0.45,0.75,1.00], 5:[0.30,0.55,0.75,0.90,1.00] };
function project(grossAnnual, platformCost, years){
  const pcts = RAMP_PCTS[years] || RAMP_PCTS[3];
  const yrGross = pcts.map(p=>grossAnnual*p);
  const yrNet   = yrGross.map(g=>g - platformCost);
  return { years, pcts, yrGross, yrNet,
    cumGross: yrGross.reduce((a,b)=>a+b,0), cumNet: yrNet.reduce((a,b)=>a+b,0) };
}

/* Build the engine input for the SIMPLE 3-input variant */
function simpleToInput(s, shared){
  const a = num(s.agencyFillRate)/100;
  const bankShifts = num(s.bankPool) * SIMPLE_SHIFTS_PER_WORKER_YR;
  const totalTemp = a<1 ? bankShifts/(1-a) : bankShifts;     // bank fills the non-agency share
  const agencyShifts = totalTemp * a;
  const bankShiftCost = (SIMPLE_BLENDED_BANK_PAY/AFC_DIVISOR) * shared.shiftHours * (1+shared.oncost/100);
  const agencyShiftCost = bankShiftCost * (1+shared.premium/100);
  const agencySpend = agencyShifts * agencyShiftCost;
  return {
    groups:[{ id:"all", role:"Whole bank pool", bankPay:SIMPLE_BLENDED_BANK_PAY, headcount:num(s.bankPool), agencySpend }],
    premium:shared.premium, displacement:shared.displacement, shiftHours:shared.shiftHours, oncost:shared.oncost,
    platformCost:shared.platformCost, fillRateNow:s.agencyFillRate,
    admin:{ enabled:s.includeAdmin!==false, managers:num(s.numManagers), hoursPerDay:ADMIN_HRS_PER_DAY_DEFAULT, workingDays:ADMIN_WORKING_DAYS, loadedHourly:ADMIN_LOADED_HOURLY },
    recruit:{ enabled:false },
  };
}

/* ===== HOOKS + SMALL COMPONENTS ===== */
function useCountUp(target, ms=900){
  const [v,setV]=useState(target); const prev=useRef(target); const raf=useRef();
  useEffect(()=>{ const from=prev.current,to=target,start=performance.now(); cancelAnimationFrame(raf.current);
    const tick=now=>{ const t=Math.min(1,(now-start)/ms),e=1-Math.pow(1-t,3); setV(from+(to-from)*e); if(t<1)raf.current=requestAnimationFrame(tick); else prev.current=to; };
    raf.current=requestAnimationFrame(tick); return ()=>cancelAnimationFrame(raf.current); },[target,ms]);
  return v;
}
const AnimMoney = ({v}) => fmt(useCountUp(v));
const AnimNum   = ({v}) => fmtNum(useCountUp(v));

function InfoTip({text}){

  return (<span style={{position:"relative",display:"inline-flex"}}>

      style={{width:16,height:16,borderRadius:"50%",border:"1px solid "+C.border,background:"#fff",color:C.textLight,fontSize:10,fontWeight:700,cursor:"pointer",lineHeight:1,padding:0}}>i</button>
    {open && <span role="tooltip" style={{position:"absolute",bottom:"130%",left:"50%",transform:"translateX(-50%)",background:C.navy,color:"#fff",fontSize:11,fontWeight:400,lineHeight:1.5,padding:"8px 10px",borderRadius:8,width:230,boxShadow:"0 8px 24px rgba(0,0,0,.25)",zIndex:50}}>{text}</span>}
  </span>);
}
function Field({label, value, onChange, min, max, step=1, prefix, info, hint}){
  const id="f_"+label.replace(/\W/g,"");
  return (<div className="field">
    <label htmlFor={id}>{label}{info && <InfoTip text={info}/>}</label>
    <div style={{position:"relative",display:"flex",alignItems:"center"}}>

      <input id={id} type="number" value={value} min={min} max={max} step={step} style={prefix?{paddingLeft:22}:null} onChange={e=>onChange(e.target.value)} onBlur={e=>{ let n=num(e.target.value); if(min!=null&&min!=="") n=Math.max(Number(min),n); if(max!=null&&max!=="") n=Math.min(Number(max),n); onChange(String(n)); }} />
    </div>
    {hint && <span className="hint">{hint}</span>}
  </div>);
}
/* Size headline input: commits on blur / Enter (not per keystroke) so typing a
   new total does not progressively rescale and collapse the staff-group mix. */
function SizeField({label, value, prefix, hint, info, onCommit}){
  const [txt,setTxt]=useState(String(value));
  useEffect(()=>{ setTxt(String(value)); },[value]);
  const commit=()=>{ const n=num(txt); if(n>0) onCommit(n); else setTxt(String(value)); };
  const id="sf_"+label.replace(/\W/g,"");
  return (<div className="field">
    <label htmlFor={id}>{label}{info && <InfoTip text={info}/>}</label>
    <div style={{position:"relative",display:"flex",alignItems:"center"}}>
      {prefix && <span style={{position:"absolute",left:10,color:C.textLight,fontSize:14}}>{prefix}</span>}
      <input id={id} type="number" value={txt} min="0" style={prefix?{paddingLeft:22}:null}
        onChange={e=>setTxt(e.target.value)} onBlur={commit} onKeyDown={e=>{ if(e.key==="Enter") e.target.blur(); }} />
    </div>
    {hint && <span className="hint">{hint}</span>}
  </div>);
}

/* ===== MAIN APP ===== */

      doc.setTextColor(27,43,75); doc.setFont("helvetica","bold"); doc.setFontSize(11); doc.text("Headline",14,y); y+=6; doc.setFont("helvetica","normal"); doc.setFontSize(10);
      [["Net annual cash saving",fmt(r.netSaving)],["Admin time saved / week",Math.round(r.timeSavedWeek).toLocaleString(LOCALE)+" hours"],
       ["Gross annual benefit",fmt(r.grossBenefit)],["Payback",r.paybackMonths?r.paybackMonths.toFixed(1)+" months":"n/a"],["ROI (net)",Math.round(r.roiPct)+"%"],
       ["Agency premium displaced",fmt(r.totSaving)],["Admin saving",fmt(r.adminSaving)],["Recruitment waste recovered",fmt(r.recruitSaving)],
       ["Total agency spend (anchor)",fmt(r.totSpend)],["Premium / displacement",premium+"% / "+displacement+"% ("+st.key+")"],["Platform cost",fmt(platformCost)+"/yr"]
      ].forEach(([k,v])=>{ doc.text(k,14,y); doc.text(String(v),196,y,{align:"right"}); y+=6; });
      if(mode==="detailed" && doc.autoTable){ y+=2; doc.setFont("helvetica","bold"); doc.text("Saving by staff group",14,y);
        doc.autoTable({ startY:y+2, head:[["Staff group","Agency spend","Duties displaced","Cash saving"]], body:r.rows.map(x=>[x.role,fmt(x.spend),fmtNum(x.displaced),fmt(x.saving)]),
          styles:{fontSize:9}, headStyles:{fillColor:[27,43,75]}, margin:{left:14,right:14} }); y=doc.lastAutoTable.finalY+8; }
      doc.setFontSize(8); doc.setTextColor(120,130,150);
      doc.text(doc.splitTextToSize("Indicative only. Cash saving = agency premium displaced when improved bank utilisation moves duties off agency; it excludes the cost of the bank shifts themselves (capacity, shown separately). 2026/27 NHS AfC midpoints; conservative, editable assumptions. Pilot figures are from 2 sites in a 4-trust programme, anonymised pending client sign-off, and are not solely attributable to the platform.",182),14,y);
      doc.save("smart-match-roi-estimate.pdf");
    } finally { setPdfBusy(false); }
  }

  const isQuick = mode==="quick";

  return (
    <div>
      {calibrating && <Calibrating/>}

      <header><div className="wrap">
        <div className="logo"><b>RLDatix</b><span className="divider">·</span>Smart Match<span className="divider">·</span>Workforce Intelligence</div>
        <h1>Your Workforce<br/><em>ROI Calculator</em></h1>
        <p>See the cash your NHS organisation could release by improving bank-staff utilisation, moving duties off expensive agency and onto your own bank. The saving is the <em>agency premium displaced</em>, not the cost of the shifts you fill.</p>
      </div></header>

      <div className="evidence-strip"><div className="wrap evidence-inner">
        <div className="ev-stat"><div className="ev-num">+17%</div><div className="ev-label">bank utilisation (one community site)</div><div className="ev-source">Smart Match programme 2025, indicative</div></div>
        <div className="ev-stat"><div className="ev-num">+17% / +16%</div><div className="ev-label">temp duties filled (two sites)</div><div className="ev-source">351→411 and equivalent, indicative</div></div>
        <div className="ev-stat"><div className="ev-num">8.1%→6.0%</div><div className="ev-label">agency fill (one community site)</div><div className="ev-source">26% relative, partly attributable</div></div>
        <div className="ev-stat"><div className="ev-num">4-trust</div><div className="ev-label">programme · data from 2 sites</div><div className="ev-source">Anonymised pending client sign-off</div></div>
      </div></div>

      <div className="strategy"><div className="wrap">
        <strong>Strategic context:</strong> reducing agency reliance and releasing workforce-management time supports the <strong>NHS 10 Year Plan</strong> and its Workforce Paper, and the staff time released aligns with the <strong>Staff Health &amp; Wellbeing CQUIN</strong>. Staff-experience benefits are a separate qualitative story, kept out of the financial figures below.
      </div></div>

      <div className="narrative"><div className="wrap narrative-inner">
        <div className="nar"><h3>The opportunity</h3><p>Every NHS organisation has a gap between the temporary duties that need filling and the bank staff who could fill them. When that gap isn't closed, they turn to agency, at a premium over their own bank rate. Closing it is both a financial and a workforce-productivity win.</p></div>
        <div className="nar"><h3>How Smart Match helps</h3><p>Smart Match uses AI to connect the right bank staff to the right duties at the right time. In an NHS programme, bank engagement rose and agency fill fell, alongside wider scheduling and engagement improvements. Outcomes vary by trust and are not solely attributable to the platform.</p></div>
        <div className="nar"><h3>An honest model</h3><p>This calculator counts only the <strong>agency premium displaced</strong> as cash. Filling a bank shift still costs money, so the gross shift value is shown separately as <strong>capacity</strong> (temp duties filled), never as a saving. Enter your own figures for the most credible result.</p></div>
      </div></div>

      <main className="wrap">
        <div className="mode-toggle" role="tablist" aria-label="Calculator mode">
          <button role="tab" aria-selected={isQuick} className={isQuick?"active":""} onClick={()=>setMode("quick")}>Quick estimate<small>For operational managers</small></button>
          <button role="tab" aria-selected={!isQuick} className={!isQuick?"active":""} onClick={()=>setMode("detailed")}>Detailed (commercial)<small>For Finance leads &amp; Workforce Directors</small></button>
        </div>

        {isQuick ? (
          <div className="section">
            <div className="step-label"><div className="step-num">1</div><h2>Three quick inputs</h2></div>
            <p className="step-sub">A fast, conservative estimate for events and web. Switch to <b>Detailed</b> to model your real agency spend by staff group.</p>
            <div className="card">
              <div className="inputs-grid">
                <Field label="Bank staff pool size" value={simple.bankPool} min="0" onChange={v=>setSimple(s=>({...s,bankPool:num(v)}))} hint="Total people on your bank" info="Total bank workers across all groups. We apply a conservative band-mix bank rate and ad-hoc shift volume."/>
                <Field label="Current agency fill rate (%)" value={simple.agencyFillRate} min="0" max="100" step={0.5} onChange={v=>setSimple(s=>({...s,agencyFillRate:num(v)}))} hint="Share of temp duties filled by agency" info="The % of temporary duties currently filled by agency. The pilot moved from 8.1% to 6.0% at one site."/>
                <Field label="Admin / roster managers" value={simple.numManagers} min="0" onChange={v=>setSimple(s=>({...s,numManagers:num(v)}))} hint="Roster mgrs, bank admins, temp/agency mgrs" info="People who spend time arranging temporary cover. Drives the time-saved-per-week and admin saving."/>
              </div>
              <label style={{display:"flex",alignItems:"center",gap:8,fontSize:13,fontWeight:600,color:C.navy,cursor:"pointer",marginTop:14}}>
                <input type="checkbox" checked={simple.includeAdmin!==false} onChange={e=>setSimple(s=>({...s,includeAdmin:e.target.checked}))}/> Include admin time saving in the cash total (on by default)
                <InfoTip text="On by default. The hours released are always shown as a per-week figure; with this on, their cash value (a conservative 1.0 h/day at a loaded £18/h) is also added to the headline. Untick to show the agency premium saving on its own."/>
              </label>
            </div>
            <div className="params-grid" style={{marginTop:12}}>
              <div className="field">
                <label>Modelling stance: {displacement}% · {st.key} <InfoTip text="Share of current agency usage that improved bank utilisation moves to bank. Driven by the Smart Match pilot: agency fill 8.1%→6.0% at one community site (26% relative). Single-site and partly attributable, so three stances are offered; public/self-serve defaults to Conservative."/></label>
                <div className="stance-btns">{[["Conservative",13],["Pilot",26],["Optimistic",35]].map(([lbl,v])=>(<button key={v} type="button" className={"stance-btn"+(displacement===v?" active":"")} onClick={()=>setDisp(v)}>{lbl}<small>{v}%</small></button>))}</div>
                <input type="range" min="8" max="40" step="1" value={displacement} onChange={e=>setDisp(num(e.target.value))} aria-label="Displacement stance, percent" aria-valuetext={displacement+"%, "+st.key}/>
                <div className="slider-ctx"><span>8% conservative</span><span>26% pilot</span><span>40% optimistic</span></div>
              </div>
              <div style={{alignSelf:"center"}}><div className="disp-note" style={{marginTop:0,background:st.bg,color:st.color}}>{st.note}</div></div>
            </div>
            <button className="adv-toggle" onClick={()=>setAdv(a=>!a)}>{showAdv?"Hide":"Show"} advanced defaults (premium, platform cost, shift length)</button>
            {showAdv && <div className="params-grid" style={{marginTop:10}}>
              <Field label="Agency premium over bank (%)" value={premium} min="0" max="150" step={5} onChange={v=>setPremium(num(v,20))} info="Default 20% (HoC Library average); contested at shift level, use your own rate." />
              <Field label="Smart Match platform cost (£/yr)" prefix="£" value={platformCost} min="0" step={1000} onChange={v=>setPC(num(v,17000))} info="ROI denominator; should include implementation, not licence alone."/>
              <Field label="Shift length (hours)" value={shiftHours} min="1" step={0.5} onChange={v=>setSH(num(v,8))}/>
              <Field label="Bank on-cost (%)" value={oncost} min="0" step={1} onChange={v=>setOncost(num(v))}/>
            </div>}
          </div>
        ) : (
        <>
          <div className="instructions">
            <h3>How to use the detailed calculator</h3>
            <div className="inst-steps">
              <div className="inst-step"><div className="inst-num">1</div><p><strong>Pick your organisation type, or build your own.</strong> Set each group's headcount, <strong>annual agency spend</strong> (the anchor for the saving) and pay; add or remove staff groups as needed.</p></div>
              <div className="inst-step"><div className="inst-num">2</div><p><strong>Set the agency premium</strong> (default 20%, the official average, contested, so use your own; tick to set it <strong>per group</strong>) and pick a <strong>displacement stance</strong> (Conservative / Pilot / Optimistic). Optionally add admin and recruitment levers.</p></div>
              <div className="inst-step"><div className="inst-num">3</div><p><strong>Read the co-headlines:</strong> net annual cash saving and admin time saved per week, with payback. Capacity (temp duties filled) is shown separately and excluded from the saving.</p></div>
            </div>
          </div>
          <div className="section">
            <div className="step-label"><div className="step-num">1</div><h2>Your organisation profile</h2></div>
            <p className="step-sub">Pick the closest profile, set your size, then fine-tune each staff group. Agency spend is the anchor for the saving, so get that right first.</p>
            <div className="presets">{Object.entries(ORG_TYPES).map(([k,p])=>(
              <button key={k} className={"preset"+(preset===k?" active":"")} onClick={()=>choosePreset(k)}><div className="pt">{p.label}</div><div className="pd">{p.desc}</div></button>))}
            </div>
            <div className="card" style={{marginBottom:"1rem"}}>
              <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:12}}>
                <strong style={{fontSize:13,color:C.navy}}>Size of your organisation</strong>
                <InfoTip text="Set your size and we rescale the staff-group mix to match. Both figures stay editable, and you can fine-tune each group below."/>
              </div>
              <div className="inputs-grid">
                <SizeField label="Total bank headcount" value={totalHead} hint="Across all staff groups; rescales the mix" onCommit={v=>setGroups(scaleGroupsTo(groups,"headcount",v))}/>
                <SizeField label="Total annual agency spend" prefix="£" value={totalSpend} info="Your trust's total yearly agency spend. This is the anchor for the saving; we rescale each group's spend proportionally, then fine-tune per group below." hint="The anchor for the saving" onCommit={v=>setGroups(scaleGroupsTo(groups,"agencySpend",v))}/>
              </div>
            </div>
            <div className="groups-grid">
            {groups.map((g,i)=>(
              <div className="card" key={g.id}>
                <div className="staff-header">
                  <div className="staff-title" style={{flex:1,minWidth:0}}><span className="band-pill" style={bandPill(g.band)}>{g.band}</span><input className="grp-name" value={g.role} onChange={e=>setG(i,"role",e.target.value)} aria-label="Staff group name"/></div>
                  <button type="button" className="grp-remove" title="Remove this group" onClick={()=>removeGroup(i)} disabled={groups.length<=1}>×</button>
                </div>
                <div className="saving-badge" style={{display:"inline-block",marginBottom:12}}>{fmt(r.rows[i]?r.rows[i].saving:0)} / yr <span style={{fontWeight:400,opacity:.75}}>· premium displaced</span></div>
                <div className="inputs-grid">
                  <Field label="Bank headcount" value={g.headcount} min="0" onChange={v=>setG(i,"headcount",v)}/>
                  <Field label="Annual agency spend" prefix="£" value={g.agencySpend} min="0" step={50000} onChange={v=>setG(i,"agencySpend",v)} info="Yearly agency spend for this group, the anchor for the saving." hint="The anchor for the saving"/>
                  <Field label="Bank pay (£/yr)" value={g.bankPay} min="0" step={500} onChange={v=>setG(i,"bankPay",v)} info="Actual bank rate preferred; or pick an AfC band below (2026/27 midpoints). Different pay per group is what makes each column's saving differ."/>
                  <div className="field"><label>AfC band: auto-fills pay</label><select className="grp-band" aria-label="AfC band (auto-fills pay)" value={AFC_BANDS.some(x=>x[1]===g.bankPay)?g.bankPay:""} onChange={e=>{const val=e.target.value; if(val){const bd=AFC_BANDS.find(x=>String(x[1])===val); setG(i,"bankPay",num(val)); if(bd) setG(i,"band",bd[0]);}}}><option value="">Custom / typed</option>{AFC_BANDS.map(([lbl,val])=>(<option key={lbl} value={val}>{lbl} · £{val.toLocaleString("en-GB")}</option>))}</select></div>
                  {perGroupPremium && <Field label="Agency premium (%)" value={g.premium!=null?g.premium:premium} min="0" max="60" step={1} onChange={v=>setG(i,"premium",v)} info="This group's agency-over-bank premium. Defaults to the global premium; raise it for hard-to-fill groups (e.g. medics) where you have trust-specific evidence."/>}
                </div>
              </div>
            ))}
            </div>
            <button type="button" className="add-group" onClick={addGroup}>+ Add a staff group</button>
          </div>
          <div className="section">
            <div className="step-label"><div className="step-num">2</div><h2>Agency parameters</h2></div>
            <div className="params-grid">
              <div>
                <Field label={perGroupPremium?"Default agency premium (%)":"Agency premium over bank (%)"} value={premium} min="0" max="60" step={1} onChange={v=>setPremium(num(v,20))} info="A single agency-over-bank premium (House of Commons Library ~20% average). Contested at shift level; REC data show NHS bank can cost more than capped agency in hard-to-fill roles. Use your trust's actual rate where possible; applies across all groups unless you override per group." hint={perGroupPremium?"Default for any group you don't override below":"Default 20% · official average · editable · contested"}/>
                <label style={{display:"flex",alignItems:"center",gap:7,fontSize:12,fontWeight:600,color:C.navy,cursor:"pointer",marginTop:8}}><input type="checkbox" checked={perGroupPremium} onChange={e=>setPGP(e.target.checked)}/> Set the agency premium per staff group <InfoTip text="Off by default, one official ~20% premium across all groups (the defensible business-case default). Tick to override the premium per column, e.g. higher for medics, where you have trust-specific agency rates."/></label>
              </div>
              <div className="field">
                <label>Displacement stance: {displacement}% · {st.key} <InfoTip text="Share of your baseline agency usage that improved bank utilisation moves to bank. Driven by the Smart Match pilot: agency fill 8.1%→6.0% at one community site (26% relative). Single-site and partly attributable; the commercial variant can show the Pilot case with a rep to frame the caveats."/></label>
                <div className="stance-btns">{[["Conservative",13],["Pilot",26],["Optimistic",35]].map(([lbl,v])=>(<button key={v} type="button" className={"stance-btn"+(displacement===v?" active":"")} onClick={()=>setDisp(v)}>{lbl}<small>{v}%</small></button>))}</div>
                <input type="range" min="8" max="40" step="1" value={displacement} onChange={e=>setDisp(num(e.target.value))} aria-label="Displacement stance, percent" aria-valuetext={displacement+"%, "+st.key}/>
                <div className="slider-ctx"><span>8% conservative</span><span>26% pilot</span><span>40% optimistic</span></div>
              </div>
            </div>
            <div className="disp-note" style={{background:st.bg,color:st.color}}>{st.note}</div>
            <div className="params-grid" style={{marginTop:12}}>
              <Field label="Smart Match platform cost (£/yr)" prefix="£" value={platformCost} min="0" step={1000} onChange={v=>setPC(num(v,17000))} info="ROI denominator. Confirm it includes implementation, not licence alone. Indicative £10,200–£36,000 by trust size." hint="Used for ROI &amp; payback"/>
              <Field label="Current agency fill rate (%)" value={fillRateNow} min="0" max="100" step={0.5} onChange={v=>setFill(num(v,8))} info="Used for the capacity narrative (agency reliance reduced)."/>
              {showAdv && <Field label="Shift length (hours)" value={shiftHours} min="1" step={0.5} onChange={v=>setSH(num(v,8))}/>}
              {showAdv && <Field label="Bank on-cost (%)" value={oncost} min="0" step={1} onChange={v=>setOncost(num(v))} info="Employer NI + pension where applicable. Affects duty counts only, not the cash headline."/>}
            </div>
            <button className="adv-toggle" onClick={()=>setAdv(a=>!a)}>{showAdv?"Hide":"Show"} advanced inputs (on-costs, shift length)</button>

            <div className="card" style={{marginTop:12}}>
              <label style={{display:"flex",alignItems:"center",gap:8,fontSize:13,fontWeight:600,color:C.navy,cursor:"pointer"}}>
                <input type="checkbox" checked={admin.enabled} onChange={e=>setAdmin(a=>({...a,enabled:e.target.checked}))}/> Include admin time saving in cash (on by default)
                <InfoTip text="On by default. Time released for roster managers, bank admins and temp/agency managers via self-booking automation. Time-saved-per-week is always shown; untick to remove its cash value from the saving total."/>
              </label>
              <div className="inputs-grid" style={{marginTop:12}}>
                <Field label="Admin / roster managers" value={admin.managers} min="0" onChange={v=>setAdmin(a=>({...a,managers:num(v)}))} info="Roster Managers, Bank Staff Administrators, Temp/Agency Managers."/>
                <Field label="Hours saved / day each" value={admin.hoursPerDay} min="0" step={0.25} onChange={v=>setAdmin(a=>({...a,hoursPerDay:num(v)}))} info="Client suggested 2.5 h/day. That's optimistic (a third of every day). Default is a conservative 1.0; validate locally."/>
                <Field label="Working days / year" value={admin.workingDays} min="0" onChange={v=>setAdmin(a=>({...a,workingDays:num(v)}))}/>
                <Field label="Loaded hourly rate (£)" prefix="£" value={admin.loadedHourly} min="0" onChange={v=>setAdmin(a=>({...a,loadedHourly:num(v)}))}/>
              </div>
            </div>

            <div className="card" style={{marginTop:12}}>
              <label style={{display:"flex",alignItems:"center",gap:8,fontSize:13,fontWeight:600,color:C.navy,cursor:"pointer"}}>
                <input type="checkbox" checked={recruit.enabled} onChange={e=>setRecruit(a=>({...a,enabled:e.target.checked}))}/> Include recovered recruitment / onboarding waste (optional)
                <InfoTip text="Cost of recruiting and onboarding bank workers who then go under-utilised. Smart Match recovers some of it by activating idle capacity. Conservative and off by default."/>
              </label>
              {recruit.enabled && <div className="inputs-grid" style={{marginTop:12}}>
                <Field label="Under-utilised bank workers" value={recruit.workers} min="0" onChange={v=>setRecruit(a=>({...a,workers:num(v)}))}/>
                <Field label="Recruit + onboard cost each (£)" prefix="£" value={recruit.costPerWorker} min="0" step={100} onChange={v=>setRecruit(a=>({...a,costPerWorker:num(v)}))}/>
                <Field label="Share recovered" value={recruit.recoveryRate} min="0" max="1" step={0.05} onChange={v=>setRecruit(a=>({...a,recoveryRate:num(v)}))} info="Fraction of that waste Smart Match recovers (e.g. 0.10 = 10%). Keep conservative."/>
              </div>}
            </div>
          </div>
        </>
        )}

        {/* RESULTS (shared) */}
        {!calculated && (
          <div className="section" style={{textAlign:"center",padding:"1.5rem 0 0"}}>
            <button className="btn primary" style={{fontSize:16,padding:"14px 34px"}} onClick={runCalc}>Calculate my savings →</button>
            <p className="step-sub" style={{margin:"12px 0 0"}}>We'll model your bank pool and agency exposure, then adjust anything and the report updates live.</p>
          </div>
        )}
        {calculated && (
        <div className="section" id="results">
          <div className="step-label"><div className="step-num">{isQuick?2:3}</div><h2>Your potential impact</h2></div>
          <div className="results-box">
            <div className="roi-header">
              <div className="roi-eyebrow">Estimated annual impact (indicative)</div>
              <div className="roi-co">
                <div><div className="roi-hero"><AnimMoney v={r.netSaving}/></div><div className="roi-cap">net cash saving / year</div></div>
                <div><div className="roi-hero">{Math.round(tswAnim).toLocaleString(LOCALE)}<small> hrs</small></div><div className="roi-cap">admin time saved / week</div></div>
              </div>
              <div style={{display:"inline-flex",alignItems:"center",gap:10,marginTop:"1rem",padding:"7px 16px",borderRadius:999,background:r.netSaving<0?"rgba(248,113,113,.15)":"rgba(52,222,194,.16)",border:"1px solid "+(r.netSaving<0?"rgba(248,113,113,.55)":"rgba(52,222,194,.5)")}}>
                <span style={{fontSize:18,fontWeight:800,letterSpacing:".02em",color:r.netSaving<0?"#FCA5A5":"#34DEC2"}}>{r.paybackMonths?r.paybackMonths.toFixed(1)+" mo":"n/a"} payback</span>
              </div>
              <div className="roi-sub">
                <span>Payback <b>{r.paybackMonths?r.paybackMonths.toFixed(1)+" mo":"n/a"}</b></span>
                <span>Gross benefit <b>{fmtK(r.grossBenefit)}</b></span>
                <span>ROI (net) <b>{r.implausibleRoi?"⚠ ":""}{Math.round(r.roiPct).toLocaleString(LOCALE)}%</b></span>
                <span>Agency premium displaced <b>{fmtK(r.totSaving)}</b></span>
              </div>
            </div>

            <div className="summary-grid">
              <div className="s-card hl"><div className="s-lbl">Net annual saving</div><div className="s-val"><AnimMoney v={r.netSaving}/></div><div className="s-sub">after {fmt(platformCost)} platform cost</div></div>
              <div className="s-card"><div className="s-lbl">Agency premium displaced</div><div className="s-val"><AnimMoney v={r.totSaving}/></div><div className="s-sub">the genuine cash saving</div></div>
              <div className="s-card"><div className="s-lbl">Admin saving {r.adminSaving>0?"":"(off)"}</div><div className="s-val"><AnimMoney v={r.adminSaving}/></div><div className="s-sub">{r.adminSaving>0?"modelled, conservative":"toggle to include"}</div></div>
              <div className="s-card"><div className="s-lbl">Time saved / week</div><div className="s-val">{Math.round(r.timeSavedWeek).toLocaleString(LOCALE)}<span style={{fontSize:13}}> hrs</span></div><div className="s-sub">across the roster/admin team</div></div>
            </div>

            <p style={{padding:"0 1.5rem",margin:"1rem 0 0",fontSize:12,color:C.textLight,lineHeight:1.6}}>
              Net saving is the agency premium displaced{r.adminSaving>0?<> plus <b style={{color:C.textMid}}>{fmtK(r.adminSaving)}</b> admin time</>:""}, less the platform cost. ROI and payback are measured against the <b style={{color:C.textMid}}>{fmt(platformCost)}/yr</b> platform cost only; the bank shifts used to deliver it are shown under Capacity, not netted here.{mode==="quick"?<> Modelled agency spend: <b style={{color:C.textMid}}>{fmtK(r.totSpend)}</b>.</>:""}
            </p>

            {r.exceedsSpend && <div className="callout navy"><p className="title">⚠ Check your inputs</p><p>The modelled saving exceeds total agency spend, which isn't possible. Lower the premium or displacement, or check the agency-spend figures.</p></div>}

            {/* SAVINGS OVER TIME (#5: phased ramp + cumulative) */}
            <div className="panel">
              <div className="panel-title" style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
                <span>Savings over time</span>
                <span style={{display:"inline-flex",gap:3,background:C.navyLight,borderRadius:999,padding:3}}>
                  {[3,5].map(y=>(<button key={y} type="button" onClick={()=>setRampYears(y)} style={{border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:700,padding:"4px 12px",borderRadius:999,background:rampYears===y?C.teal:"transparent",color:rampYears===y?"#fff":C.textMid,transition:".15s"}}>{y}-year</button>))}
                </span>
              </div>
              {(()=>{ const proj=project(r.grossBenefit,platformCost,rampYears), mx=Math.max(...proj.yrNet.map(v=>Math.abs(v)),1); return (
                <div>
                  <div style={{display:"flex",alignItems:"flex-end",gap:8,height:150}}>
                    {proj.yrNet.map((v,i)=>(<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end"}}>
                      <div style={{fontSize:11,fontWeight:700,color:v<0?C.rose:C.navy,marginBottom:5}}>{fmtK(v)}</div>
                      <div style={{width:"100%",maxWidth:50,height:Math.max(4,Math.round((Math.max(0,v)/mx)*112)),background:v<0?"#b25b76":"linear-gradient(180deg,"+C.tealMid+","+C.teal+")",borderRadius:"6px 6px 0 0",transition:"height .5s ease"}}></div>
                      <div style={{fontSize:11,color:C.textMid,marginTop:6,fontWeight:600}}>Year {i+1}</div>
                      <div style={{fontSize:9,color:C.textLight}}>{Math.round(proj.pcts[i]*100)}% ramp</div>
                    </div>))}
                  </div>
                  <div style={{display:"flex",gap:12,marginTop:16,flexWrap:"wrap"}}>
                    <div style={{flex:"1 1 150px",background:C.navyLight,borderRadius:10,padding:"12px 14px"}}><div style={{fontSize:11,color:C.navyMid}}>{rampYears}-year cumulative net</div><div style={{fontSize:22,fontWeight:700,color:C.navy}}>{fmt(proj.cumNet)}</div></div>
                    <div style={{flex:"1 1 150px",background:C.navyLight,borderRadius:10,padding:"12px 14px"}}><div style={{fontSize:11,color:C.navyMid}}>{rampYears}-year gross benefit</div><div style={{fontSize:22,fontWeight:700,color:C.navy}}>{fmt(proj.cumGross)}</div></div>
                  </div>
                  <p style={{fontSize:11.5,color:C.textLight,marginTop:12,lineHeight:1.6}}>Benefits ramp as bank utilisation improves, modelled at {proj.pcts.map(p=>Math.round(p*100)+"%").join(" → ")} of the annual run-rate, with the platform cost recurring in full each year. Phasing mirrors the Galen migration model; figures are indicative.</p>
                </div>
              ); })()}
            </div>

            {!isQuick && <div className="table-wrap"><table>
              <thead><tr><th>Staff group</th><th className="num">Bank pool</th><th className="num">Agency spend</th>{perGroupPremium && <th className="num">Premium</th>}<th className="num">Duties displaced</th><th className="num">Cash saving</th></tr></thead>
              <tbody>
                {r.rows.map(x=>(<tr key={x.id}><td>{x.role}</td><td className="num">{fmtNum(x.head)}</td><td className="num">{fmt(x.spend)}</td>{perGroupPremium && <td className="num">{(x.premium!=null?x.premium:premium)}%</td>}<td className="num">{fmtNum(x.displaced)}</td><td className="num">{fmt(x.saving)}</td></tr>))}
                <tr className="total-row"><td>Total</td><td className="num">{fmtNum(r.totHead)}</td><td className="num">{fmt(r.totSpend)}</td>{perGroupPremium && <td className="num">n/a</td>}<td className="num">{fmtNum(r.totDisplaced)}</td><td className="num">{fmt(r.totSaving)}</td></tr>
              </tbody></table></div>}

            <div className="panel">
              <div className="panel-title">{isQuick?"Saving by source":"Cash saving by staff group"}</div>
              {isQuick ? (
                [["Agency premium displaced",r.totSaving],["Admin time saving",r.adminSaving],["Recruitment waste recovered",r.recruitSaving]]
                  .filter(x=>x[1]>0).map(([lbl,val],i)=>{ const mx=Math.max(r.totSaving,r.adminSaving,r.recruitSaving,1);
                  return (<div className="bar-row" key={lbl}><div className="blbl">{lbl}</div><div className="btrack"><div className="bfill" style={{width:Math.round((val/mx)*100)+"%",background:RAMP[i%RAMP.length]}}></div></div><div className="bval">{fmt(val)}</div></div>); })
              ) : (
                r.rows.map((x,i)=>(<div className="bar-row" key={x.id}><div className="blbl">{x.role}</div><div className="btrack"><div className="bfill" style={{width:Math.round((x.saving/maxSaving)*100)+"%",background:RAMP[i%RAMP.length]}}></div></div><div className="bval">{fmt(x.saving)}</div></div>))
              )}
            </div>

            <div className="capacity">
              <span className="cap-tag">Capacity: not a cash saving</span>
              <div className="cap-grid">
                <div className="cap-item"><div className="cv"><AnimNum v={r.totDisplaced}/></div><div className="cl">additional temp duties/yr filled by your own bank (off agency)</div></div>
                <div className="cap-item"><div className="cv">{fmtK(r.totCapacityValue)}</div><div className="cl">bank backfill cost to deliver them <b>(spend, not saving)</b></div></div>
                <div className="cap-item"><div className="cv">{r.fillNow?pct(r.fillNow)+" → "+r.fillAfter.toFixed(1)+"%":"n/a"}</div><div className="cl">illustrative agency reliance reduction</div></div>
              </div>
              <p style={{fontSize:11.5,color:C.textLight,marginTop:".85rem",lineHeight:1.6}}>This is where the old "utilisation uplift" belongs: better utilisation fills more duties and builds resilience, but filling a bank shift is expenditure; only the agency-vs-bank premium above is cash saved.</p>
            </div>

            <div className="callout navy">
              <p className="title">These figures don't capture the full picture.</p>
              <p>They reflect quantifiable cash only. They exclude the wider time-releasing benefits for managers and admin teams, and the staff-experience uplift when bank workers can find and book duties that fit their skills and lives. Those benefits are real but are kept as a separate qualitative story, not added to the ROI number.</p>
            </div>

            <div className="callout quote">
              <p className="quote-txt">"I've just received my first Smart Match duty offer. Clicking the notification took me straight to the shift details and I booked it straight away, so easy. You're not constantly looking on a loop, frightened you'll miss something."</p>
              <p className="quote-by">Bank staff member, a community trust (Smart Match programme; anonymised)</p>
            </div>

            <div className="assumptions">
              <div className="panel-title">Assumptions &amp; methodology</div>
              <div className="arow"><span>Saving basis</span><span>Agency premium displaced (cash)</span></div>
              <div className="arow explain"><span className="albl">Why not the full shift value? <span className="conf high">CORE</span></span><span className="adesc">Filling a bank shift is expenditure. A trust only saves when a duty that would have been agency is covered by bank instead: the saving is the <b>difference</b> (the premium), not the whole shift. Gross shift value sits under Capacity.</span></div>
              <Method formula={"bank_shift_cost  = (pay / 1957.5) × hours × (1 + on-cost)\nagency_shift_cost= bank_shift_cost × (1 + premium)\ndisplaced_duties = (agency_spend / agency_shift_cost) × displacement\nCASH SAVING      = displaced_duties × bank_shift_cost × premium"}
                your={<>Agency spend {fmt(r.totSpend)} · premium {premium}%{perGroupPremium?" (default; per-group overrides on)":""} · displacement {displacement}% ({st.key}) → <b>{fmt(r.totSaving)}</b>.</>}
                source="Cash saving = agency_spend × displacement × premium/(1+premium); driven by agency spend, premium and displacement, not bank payroll." strength={{c:"high",t:"method"}}/>
              <div className="arow"><span>Time saved / week (co-headline)</span><span>{Math.round(r.timeSavedWeek).toLocaleString(LOCALE)} hours</span></div>
              <div className="arow explain"><span className="albl">Admin model (per manager) <span className="conf low">low</span></span><span className="adesc">managers × hours/day × 5. Cash: × {ADMIN_WORKING_DAYS} working days × loaded rate. Roles: Roster Managers, Bank Staff Administrators, Temp/Agency Managers. Client suggested 2.5 h/day @ £18, treated as optimistic; default is a conservative 1.0 h/day. Validate locally.</span></div>
              <div className="arow"><span>Agency premium {perGroupPremium?"(per staff group)":"(single, editable)"}</span><span>{premium}%{perGroupPremium?" default":""} <span className="contested">contested</span></span></div>
              <div className="arow explain"><span className="albl">Source: premium</span><span className="adesc">~20% average (House of Commons Library CBP-10539, Mar 2026); disputed at shift level; May 2026 REC FOI data show NHS bank can cost more than price-capped agency on some shifts. Treat as a range (nursing ~35–50%, medics ~80–120%) and use your own rates.</span></div>
              <div className="arow"><span>Displacement stance</span><span>{displacement}%, {st.key}</span></div>
              <div className="arow explain"><span className="albl">Source: displacement <span className="conf low">low</span></span><span className="adesc">Conservative by default. The programme saw agency fill fall 8.1%→6.0% at one community site (26% relative), the observed upper end, single-site, partly attributable to wider scheduling/engagement changes. Health-economist validation pending.</span></div>
              <div className="arow"><span>Bank-utilisation programme signal</span><span>+17% (one site)</span></div>
              <div className="arow explain"><span className="albl">Source: programme (4 trusts; 2-site data) <span className="conf low">low–mod</span></span><span className="adesc">Utilisation +17% at one community site (170→199 workers); the other reporting site was ~+1.75% (a "13%" figure in the client doc is a known error). Temp duties filled +17% (351→411) / +16%. Self-booking +26% / +15%. Engagement/coverage measures, not payroll uplift; they inform the stance, not the saving. Anonymised pending client sign-off.</span></div>
              <div className="arow"><span>Pay scale</span><span>2026/27 NHS AfC midpoints <span className="conf high">high</span></span></div>
              <div className="arow explain"><span className="albl">Source: pay</span><span className="adesc">NHS Employers 2026/27 (+3.3% confirmed from 1 Apr 2026): Band 2 ~£25,272; Band 3 ~£26,618; Band 5 mid ~£34,592; Band 6 mid ~£42,170. Medics use the SAS / specialty-doctor scale (~£52.5k–£67.5k, 2026/27); medical T&amp;Cs, not AfC. Add London HCAS (Inner 20% / Outer 15% / Fringe 5%) where relevant. Band 2/3 may rise further via the pending Staff Council structure reform.</span></div>
              <div className="arow"><span>Hourly divisor / shift length</span><span>1,957.5 h/yr · {shiftHours} h</span></div>
              <div className="arow"><span>Platform cost (ROI denominator)</span><span>{fmt(platformCost)}/yr</span></div>
              {r.recruitSaving>0 && <><div className="arow"><span>Recruitment waste recovered (optional)</span><span>{fmt(r.recruitSaving)}</span></div>
              <div className="arow explain"><span className="albl">Source: recruitment <span className="conf low">low</span></span><span className="adesc">under-utilised workers × recruit/onboard cost × recovery share. No strong public benchmark, conservative and clearly optional.</span></div></>}
              <div className="arow explain"><span className="albl">Strategy &amp; framing</span><span className="adesc">Framed against the NHS 10 Year Plan + Workforce Paper and the Staff Health &amp; Wellbeing CQUIN. Pilot is a small (2-site), vendor-collected sample, encouraging but indicative, not solely attributable to Smart Match, and anonymised pending client sign-off.</span></div>
            </div>

            <div className="lead">
              <h4>Want a copy, or to pressure-test these numbers?</h4>
              <p className="sub">Optional: the calculator and PDF are open to everyone. Leave your details and a Smart Match specialist can validate the figures against your trust's own bank and agency rates.</p>
              {lead.sent ? <p style={{color:C.navy,fontWeight:600,fontSize:14}}>Thanks, we'll be in touch. 👋</p> :
              <form onSubmit={submitLead}><div className="lead-grid">
                <input placeholder="Name" value={lead.name} onChange={e=>setLead(l=>({...l,name:e.target.value}))}/>
                <input type="email" required placeholder="Work email" value={lead.email} onChange={e=>setLead(l=>({...l,email:e.target.value}))}/>
                <input placeholder="Trust / organisation" value={lead.org} onChange={e=>setLead(l=>({...l,org:e.target.value}))}/>
                <button className="btn primary" type="submit" disabled={!lead.consent||lead.busy}>{lead.busy?"Sending…":"Send to a specialist"}</button>
              </div>
              <label className="consent" style={{display:"flex",alignItems:"flex-start",gap:8,cursor:"pointer",marginTop:".6rem"}}><input type="checkbox" required checked={!!lead.consent} onChange={e=>setLead(l=>({...l,consent:e.target.checked}))} style={{marginTop:3}}/><span>I agree RLDatix may contact me about Smart Match and process these details in line with the RLDatix privacy notice.</span></label>
              {lead.err==="failed" && <p className="consent" style={{color:"#b25b76"}}>Sorry, that didn't send. Please try again, or contact your RLDatix representative.</p>}
              {lead.err==="unconfigured" && <p className="consent" style={{color:"#b25b76"}}>Lead capture isn't switched on yet. Your RLDatix contact can enable it (HubSpot portal + form ID).</p>}
              </form>}
            </div>

            <div className="actions">
              <button className="btn primary" onClick={downloadPDF} disabled={pdfBusy}>{pdfBusy?"Generating…":"⬇ Download PDF estimate"}</button>
              <button className="btn" onClick={()=>window.scrollTo({top:0,behavior:"smooth"})}>↑ Adjust inputs</button>
            </div>
          </div>
        </div>
        )}
      </main>

      <footer><p>Built by <strong>RLDatix Smart Match</strong> · Cash saving = agency premium displaced (not gross shift value) · 2026/27 NHS AfC pay scales · Figures are <strong>indicative</strong>, conservative and editable · validate with your organisation's own rates ·Pilot = 2-site data within a 4-trust programme, anonymised pending client sign-off; outcomes vary and are not solely attributable to the platform.</p></footer>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
